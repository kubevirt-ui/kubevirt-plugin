apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-env-trigger-runner
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ci-env-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ci-env-trigger
subjects:
  - kind: ServiceAccount
    name: {{ .Values.runner.saName }}
    namespace: {{ .Values.runner.saNamespace }}

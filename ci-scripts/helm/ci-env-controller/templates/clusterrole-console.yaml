# ClusterRole for the CI test stack console ServiceAccount.
# Bound per CI run by the ci-test-stack Helm chart's ClusterRoleBinding.
#
# Permissions cover what the OpenShift console needs to proxy browser requests
# (including WebSocket watch) for KubeVirt/CDI management, plus cluster-info
# reads for the console UI chrome and overview pages.
#
# IMPORTANT: clusterrole-controller.yaml must be a SUPERSET of this file.
# Any additions here must also be added there.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ci-console
  labels:
    {{- include "ci-env-controller.labels" . | nindent 4 }}
rules:
  # Cluster info (console chrome, overview pages, cluster version banner)
  - apiGroups: ['']
    resources: ['nodes', 'namespaces']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['config.openshift.io']
    resources: ['consoles', 'clusterversions', 'ingresses', 'infrastructures', 'dnses']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['storage.k8s.io']
    resources: ['storageclasses']
    verbs: ['get', 'list', 'watch', 'create', 'patch', 'update', 'delete']

  # RBAC self-checks (console checks permissions to decide which UI buttons to show)
  - apiGroups: ['authorization.k8s.io']
    resources: ['selfsubjectaccessreviews', 'selfsubjectrulesreviews']
    verbs: ['create']

  # Operator lifecycle (HCO subscription/CSV status, console watches these via WebSocket)
  - apiGroups: ['operators.coreos.com']
    resources: ['clusterserviceversions', 'subscriptions', 'operatorgroups']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['packages.operators.coreos.com']
    resources: ['packagemanifests']
    verbs: ['get', 'list']

  # Console operator config (console watches its own operator CR)
  - apiGroups: ['operator.openshift.io']
    resources: ['consoles']
    verbs: ['get', 'list', 'watch']

  # Console UI resources (notifications, quick starts, links, plugins, YAML samples)
  - apiGroups: ['console.openshift.io']
    resources:
      - consoleplugins
      - consolenotifications
      - consolequickstarts
      - consolelinks
      - consoleyamlsamples
    verbs: ['get', 'list', 'watch']

  # User identity (console watches current user, even with disabled auth)
  - apiGroups: ['user.openshift.io']
    resources: ['users']
    verbs: ['get', 'list', 'watch']

  # Projects (self-scoped, but console needs watch for project list)
  - apiGroups: ['project.openshift.io']
    resources: ['projects']
    verbs: ['get', 'list', 'watch']

  # Core namespaced resources (VM creation, test fixtures, etc.)
  - apiGroups: ['']
    resources:
      - pods
      - pods/log
      - services
      - secrets
      - configmaps
      - events
      - serviceaccounts
      - persistentvolumeclaims
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

  # KubeVirt
  - apiGroups: ['kubevirt.io']
    resources:
      - kubevirts
      - virtualmachines
      - virtualmachineinstances
      - virtualmachineinstancemigrations
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['subresources.kubevirt.io']
    resources:
      - virtualmachines/start
      - virtualmachines/stop
      - virtualmachines/restart
      - virtualmachines/migrate
      - virtualmachineinstances/pause
      - virtualmachineinstances/unpause
      - virtualmachineinstances/console
      - virtualmachineinstances/vnc
      - virtualmachineinstances/portforward
      - virtualmachineinstances/guestosinfo
      - virtualmachineinstances/filesystemlist
      - virtualmachineinstances/userlist
    verbs: ['get', 'update']
  - apiGroups: ['instancetype.kubevirt.io']
    resources:
      - virtualmachineclusterinstancetypes
      - virtualmachineinstancetypes
      - virtualmachineclusterpreferences
      - virtualmachinepreferences
    verbs: ['get', 'list', 'watch']

  # KubeVirt templates (different from OpenShift templates)
  - apiGroups: ['template.kubevirt.io']
    resources: ['virtualmachinetemplates', 'virtualmachinetemplaterequests']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

  # VM snapshots and backups
  - apiGroups: ['snapshot.kubevirt.io']
    resources: ['virtualmachinesnapshots', 'virtualmachinesnapshotcontents', 'virtualmachinerestores']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['backup.kubevirt.io']
    resources: ['virtualmachinebackups']
    verbs: ['get', 'list', 'watch']

  # VM exports
  - apiGroups: ['export.kubevirt.io']
    resources: ['virtualmachineexports']
    verbs: ['get', 'list', 'watch', 'create', 'delete']

  # VM pools
  - apiGroups: ['pool.kubevirt.io']
    resources: ['virtualmachinepools']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

  # VM instance presets (legacy)
  - apiGroups: ['kubevirt.io']
    resources: ['virtualmachineinstancepresets']
    verbs: ['get', 'list', 'watch']

  # Storage migrations
  - apiGroups: ['migrations.kubevirt.io']
    resources: ['virtualmachinestoragemigrations']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

  # CDI
  - apiGroups: ['cdi.kubevirt.io']
    resources: ['cdis', 'cdiconfigs', 'datavolumes', 'datasources', 'dataimportcrons']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['upload.cdi.kubevirt.io']
    resources: ['uploadtokenrequests']
    verbs: ['get', 'create']

  # HCO (settings page feature gates, overview status)
  - apiGroups: ['hco.kubevirt.io']
    resources: ['hyperconvergeds']
    verbs: ['get', 'list', 'watch', 'patch']

  # HCO operand reads (version checks, overview status)
  - apiGroups: ['ssp.kubevirt.io']
    resources: ['ssps']
    verbs: ['get', 'list']
  - apiGroups: ['networkaddonsoperator.network.kubevirt.io']
    resources: ['networkaddonsconfigs']
    verbs: ['get', 'list']
  - apiGroups: ['hostpathprovisioner.kubevirt.io']
    resources: ['hostpathprovisioners']
    verbs: ['get', 'list']

  # Templates (VM creation from templates)
  - apiGroups: ['template.openshift.io']
    resources: ['templates', 'processedtemplates']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

  # VM clones
  - apiGroups: ['clone.kubevirt.io']
    resources: ['virtualmachineclones']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

  # Migration policies
  - apiGroups: ['migrations.kubevirt.io']
    resources: ['migrationpolicies']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

  # Network attachment definitions (VM networking)
  - apiGroups: ['k8s.cni.cncf.io']
    resources: ['network-attachment-definitions']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

  # Persistent volumes (storage overview)
  - apiGroups: ['']
    resources: ['persistentvolumes']
    verbs: ['get', 'list', 'watch']

  # Storage profiles (CDI storage settings)
  - apiGroups: ['cdi.kubevirt.io']
    resources: ['storageprofiles']
    verbs: ['get', 'list', 'watch']

  # Snapshots
  - apiGroups: ['snapshot.storage.k8s.io']
    resources: ['volumesnapshots']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

# Writable pid file: image runs as UID 1001 (see Dockerfile USER). start-plugin-container.sh passes -g "daemon off;".
pid /tmp/nginx.pid;
error_log /dev/stdout info;

events {
	worker_connections 1024;
}

http {
	access_log         /dev/stdout;
	include            /etc/nginx/mime.types;
	default_type       application/octet-stream;
	keepalive_timeout  65;

	add_header X-Content-Type-Options nosniff;

	server {
		# Docker often has no routable IPv6; binding [::]:9443 can prevent nginx from starting.
		listen              9080 default_server;
		root                /usr/share/nginx/html;

		# Prevent caching for plugin-manifest.json and plugin-entry.js
		# to avoid "Unexpected end of JSON input" error
		location = /plugin-manifest.json {
			add_header Cache-Control 'no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0';
			add_header Pragma 'no-cache';
			add_header Expires '0';
		}
		location = /plugin-entry.js {
			add_header Cache-Control 'no-cache, no-store, must-revalidate, proxy-revalidate, max-age=0';
			add_header Pragma 'no-cache';
			add_header Expires '0';
		}
	}
}

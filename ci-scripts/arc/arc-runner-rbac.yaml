# Grant the ARC runner scale set ServiceAccount CI permissions (oc, test namespaces, KubeVirt).
# gha-runner-scale-set creates: <RUNNER_SCALE_SET_NAME>-gha-rs-no-permission (default: kubevirt-plugin-ci-gha-rs-no-permission).
#
# Applied automatically by ci-scripts/arc/install-runner-scale-set.sh.
# Subject name + namespace substituted for RUNNER_SCALE_SET_NAME / ARC_RUNNERS_NS.
# Manual apply (defaults only):
#   oc apply -f ci-scripts/arc/arc-runner-rbac.yaml
#
# To skip cluster RBAC (custom bindings): SKIP_ARC_RUNNER_RBAC=1
#
# If RUNNER_SCALE_SET_NAME differs from defaults and you apply this file by hand, edit subjects or use:
#   oc create clusterrolebinding arc-runner-ci-custom --clusterrole=arc-runner-ci \
#     --serviceaccount=<ns>:<scale-set>-gha-rs-no-permission
#
# Alternative (cluster-admin): bind cluster-admin to the same ServiceAccount instead of arc-runner-ci.
#
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: arc-runner-ci
  labels:
    app.kubernetes.io/component: arc-runner-rbac
rules:
  # Read cluster and console config (for oc cluster-info, console URL)
  - apiGroups: ['']
    resources: ['nodes', 'namespaces']
    verbs: ['get', 'list']
  - apiGroups: ['config.openshift.io']
    resources: ['consoles', 'clusterversions', 'ingresses']
    verbs: ['get', 'list']
  # Create/delete test namespaces and manage resources for Cypress
  - apiGroups: ['']
    resources:
      [
        'namespaces',
        'pods',
        'pods/log',
        'services',
        'secrets',
        'configmaps',
        'events',
        'serviceaccounts',
        'persistentvolumeclaims',
      ]
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete', 'deletecollection']
  # Read HCO operand CRs for version logging (Log HCO and managed operator versions step)
  - apiGroups: ['operators.coreos.com']
    resources: ['clusterserviceversions']
    verbs: ['get', 'list']
  - apiGroups: ['kubevirt.io']
    resources:
      [
        'kubevirts',
        'virtualmachines',
        'virtualmachineinstances',
        'virtualmachineinstancemigrations',
      ]
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['cdi.kubevirt.io']
    resources: ['cdis', 'datavolumes']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['ssp.kubevirt.io']
    resources: ['ssps']
    verbs: ['get', 'list']
  - apiGroups: ['networkaddonsoperator.network.kubevirt.io']
    resources: ['networkaddonsconfigs']
    verbs: ['get', 'list']
  - apiGroups: ['hostpathprovisioner.kubevirt.io']
    resources: ['hostpathprovisioners']
    verbs: ['get', 'list']
  - apiGroups: ['snapshot.storage.k8s.io']
    resources: ['volumesnapshots']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['subresources.kubevirt.io']
    resources: ['virtualmachineinstances/console', 'virtualmachineinstances/vnc']
    verbs: ['get']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: arc-runner-ci
  labels:
    app.kubernetes.io/component: arc-runner-rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: arc-runner-ci
subjects:
  - kind: ServiceAccount
    name: kubevirt-plugin-ci-gha-rs-no-permission
    namespace: arc-runners

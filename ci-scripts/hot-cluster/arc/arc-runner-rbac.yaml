# Grant the ARC runner scale set ServiceAccount CI permissions.
# gha-runner-scale-set creates: <RUNNER_SCALE_SET_NAME>-gha-rs-no-permission
#   (default: kubevirt-plugin-ci-gha-rs-no-permission).
#
# Applied automatically by ci-scripts/hot-cluster/arc/install-runner-scale-set.sh.
# Subject name + namespace substituted for RUNNER_SCALE_SET_NAME / ARC_RUNNERS_NS.
# Manual apply (defaults only):
#   oc apply -f ci-scripts/hot-cluster/arc/arc-runner-rbac.yaml
#
# To skip cluster RBAC (custom bindings): SKIP_ARC_RUNNER_RBAC=1
#
# If RUNNER_SCALE_SET_NAME differs from defaults and you apply this file by hand,
# edit subjects or use:
#   oc create clusterrolebinding arc-runner-ci-custom --clusterrole=arc-runner-ci \
#     --serviceaccount=<ns>:<scale-set>-gha-rs-no-permission
#
# NOTE: The runner's ConfigMap access in the ci-env namespace is granted via a
# namespaced RoleBinding created by ci-scripts/hot-cluster/ci-env/install-ci-env-controller.sh,
# not by this ClusterRole.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: arc-runner-ci
  labels:
    app.kubernetes.io/component: arc-runner-rbac
rules:
  # --- Cluster reads (console URL, version logging) ---
  - apiGroups: ['']
    resources: ['nodes']
    verbs: ['get', 'list']

  # --- Playwright test setup: create/delete temporary namespaces.
  # Unrestricted since these dynamically-named namespaces aren't known
  # ahead of time. ---
  - apiGroups: ['']
    resources: ['namespaces']
    verbs: ['get', 'list', 'create', 'delete']

  # --- Reads the test-env console SA's UID to key onboarding-suppression
  # ConfigMaps. Read-only; ServiceAccount objects carry no token. ---
  - apiGroups: ['']
    resources: ['serviceaccounts']
    verbs: ['get', 'list']

  # --- deploy-manual-console.yml: idempotent re-apply of the one
  # long-lived "manual-console" namespace. Scoped to that resourceName
  # (not folded into the unrestricted rule above) since this ClusterRole
  # is bound cluster-wide -- an unscoped patch would let the runner SA
  # mutate any namespace, including openshift-*. `update` is omitted since
  # `oc apply`'s 3-way merge only ever issues a PATCH. ---
  - apiGroups: ['']
    resources: ['namespaces']
    verbs: ['patch']
    resourceNames: ['manual-console']
  - apiGroups: ['config.openshift.io']
    resources: ['consoles', 'clusterversions', 'ingresses']
    verbs: ['get', 'list']

  # --- Diagnostics (pod logs, events in test namespaces) ---
  - apiGroups: ['']
    resources: ['pods', 'pods/log', 'events']
    verbs: ['get', 'list']

  # --- Cypress cy.exec runs / Playwright scenario tests: VM create/patch/delete ---
  - apiGroups: ['kubevirt.io']
    resources: ['virtualmachines']
    verbs: ['get', 'list', 'watch', 'patch', 'create', 'delete']

  # NOTE on secrets: test-cleanup.sh's delete of the test secret is
  # deliberately NOT granted here, even resourceNames-restricted -- every
  # namespace has its own similarly-named secret for unrelated purposes,
  # so a cluster-wide grant would be a credential-exposure risk. The one
  # persistent-namespace case that needs this (the fixed auto-test-ns
  # Cypress namespace) instead gets a namespace-scoped Role+RoleBinding
  # from ci-env-controller.sh's provision(), re-applied fresh every run.

  # NOTE on PVCs/Snapshots/DataVolumes/DataSources/Templates/net-attach-defs/
  # VM instancetypes&preferences: test-cleanup.sh's deletes for these rely
  # entirely on the per-run, namespace-scoped ci-env-test-runner
  # RoleBinding (helm/ci-env-controller/templates/clusterrole-test-runner.yaml),
  # not an unrestricted cluster-wide grant here -- a cluster-wide grant
  # would let the runner SA delete these kinds in any namespace, including
  # shared golden-image DataSources/Templates.

  # --- E2E test setup: user-settings and feature-flag configmaps in HCO namespace ---
  - apiGroups: ['']
    resources: ['configmaps']
    verbs: ['get', 'list', 'create', 'patch']

  # --- Cypress settings tests: reads HCO's spec directly ---
  - apiGroups: ['hco.kubevirt.io']
    resources: ['hyperconvergeds']
    verbs: ['get', 'list']

  # --- test-cleanup.sh: delete cluster-scoped test leftovers created under
  # a fixed "example" name. The namespaced ci-env-test-runner RoleBinding
  # doesn't cover cluster-scoped kinds, so this needs a real
  # ClusterRoleBinding. ---
  - apiGroups: ['instancetype.kubevirt.io']
    resources: ['virtualmachineclusterinstancetypes', 'virtualmachineclusterpreferences']
    verbs: ['get', 'list', 'delete']
  - apiGroups: ['migrations.kubevirt.io']
    resources: ['migrationpolicies']
    verbs: ['get', 'list', 'delete']

  # --- Runner-diagnostics steps: HCO / operator version logging ---
  - apiGroups: ['operators.coreos.com']
    resources: ['clusterserviceversions']
    verbs: ['get', 'list']
  - apiGroups: ['kubevirt.io']
    resources: ['kubevirts']
    verbs: ['get', 'list']
  - apiGroups: ['cdi.kubevirt.io']
    resources: ['cdis']
    verbs: ['get', 'list']
  - apiGroups: ['ssp.kubevirt.io']
    resources: ['ssps']
    verbs: ['get', 'list']
  - apiGroups: ['networkaddonsoperator.network.kubevirt.io']
    resources: ['networkaddonsconfigs']
    verbs: ['get', 'list']
  - apiGroups: ['hostpathprovisioner.kubevirt.io']
    resources: ['hostpathprovisioners']
    verbs: ['get', 'list']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: arc-runner-ci
  labels:
    app.kubernetes.io/component: arc-runner-rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: arc-runner-ci
subjects:
  - kind: ServiceAccount
    name: kubevirt-plugin-ci-gha-rs-no-permission
    namespace: arc-runners

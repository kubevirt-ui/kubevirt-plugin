# Plugin (kubevirt-plugin nginx image built from the PR)
plugin:
  image: ''
  port: 9080
  replicas: 1

# Console (origin-console in off-cluster mode)
console:
  image: 'quay.io/openshift/origin-console:latest'
  port: 9000
  replicas: 1
  apiServer: ''

  route:
    enabled: true
    host: ''

  # kubevirt-apiserver-proxy endpoint (Route or internal Service URL)
  pluginProxy:
    endpoint: ''

  monitoring:
    thanosUrl: ''
    alertmanagerUrl: ''

  # User authentication mode.
  #   disabled:  bearer-token auth via the console ServiceAccount (E2E default,
  #              set by ci-env-controller for ephemeral test environments).
  #   openshift: OAuth login via an htpasswd identity provider (used by the
  #              persistent manual-console deploy path). Requires
  #              console.route.host and auth.caCert to be set.
  auth:
    mode: disabled
    redirectPath: /auth/callback
    # PEM CA bundle used to verify the OAuth server. Only consumed when
    # auth.mode=openshift; ci-env-controller passes this via --set-file.
    caCert: ''

  # BRIDGE_USER_SETTINGS_LOCATION. "localstorage" (default) keeps user
  # settings (guided-tour completion, quickstart dismissal, column prefs,
  # ...) purely in the browser -- what Playwright's seedGuidedTourState()
  # relies on. ci-env-controller only ever overrides this to "configmap" for
  # a caller that also seeds the equivalent server-side ConfigMap itself
  # (Cypress E2E, via hot-cluster-e2e-run.yml's "Seed kubevirt-user-settings
  # ConfigMap" step) -- never change this default unconditionally, or
  # Playwright's browser-side seeding silently stops having any effect.
  userSettingsLocation: localstorage

# ClusterRole created by the ci-env-controller Helm chart (clusterrole-console.yaml).
rbac:
  consoleClusterRole: cluster-admin
  # ClusterRole that grants test permissions inside the test namespace
  testRunnerClusterRole: ci-env-test-runner

# ARC runner ServiceAccount that needs namespace-scoped test permissions
runner:
  saName: kubevirt-plugin-ci-gha-rs-no-permission
  saNamespace: arc-runners

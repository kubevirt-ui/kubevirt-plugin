# Namespaced Role that allows the ARC runner SA to manage trigger ConfigMaps
# in the ci-env namespace, which is how it signals the controller to provision
# or tear down a test environment.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-env-trigger
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ci-env-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: ['']
    resources: ['configmaps']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

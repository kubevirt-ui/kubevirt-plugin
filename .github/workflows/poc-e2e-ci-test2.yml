name: POC Hot Cluster E2E CI Test 2

on:
  workflow_dispatch:
    inputs:
      test_spec:
        description: Cypress test spec to run
        required: true
        default: tests/poc-gating.cy.ts
        type: string
  workflow_call:
    inputs:
      test_spec:
        description: Cypress test spec to run
        type: string
        required: false
        default: tests/poc-gating.cy.ts

permissions:
  contents: read
  actions: read

env:
  BRIDGE_BASE_ADDRESS: http://localhost:9000
  CYPRESS_CNV_NS: kubevirt-hyperconverged
  CYPRESS_OS_IMAGES_NS: kubevirt-os-images
  CYPRESS_TEST_NS: kubevirt-plugin-ci-test-${{ github.run_id }}
  CYPRESS_TEST_SECRET_NAME: ci-test-secret

  KUBEVIRT_PLUGIN_IMAGE: 'ttl.sh/kubevirt-plugin-ci-${{ github.run_id }}-${{ github.run_number }}:2h'
  #KUBEVIRT_PLUGIN_IMAGE: ttl.sh/kubevirt-plugin-ci-1234:6h

jobs:
  check-runner:
    name: Check Runner Image
    runs-on: kubevirt-plugin-ci
    timeout-minutes: 15
    steps:
      - name: Log environment summary
        run: |
          {
            echo "<details><summary>Key Environment Variables</summary>"
            echo ""
            echo "| Variable | Value |"
            echo "| --- | --- |"
            for var in HOME USER RUNNER_NAME RUNNER_OS RUNNER_ARCH \
                       GITHUB_REPOSITORY GITHUB_REF GITHUB_SHA GITHUB_RUN_ID GITHUB_RUN_NUMBER \
                       BRIDGE_BASE_ADDRESS CYPRESS_CNV_NS CYPRESS_OS_IMAGES_NS \
                       CYPRESS_TEST_NS KUBEVIRT_PLUGIN_IMAGE KUBEVIRT_UI_PLUGIN_RUNNER; do
              echo "| \`$var\` | \`${!var:-<unset>}\` |"
            done
            echo "</details>"
            echo ""

            echo "<details><summary>Tool Availability</summary>"
            echo ""
            echo "| Tool | Available |"
            echo "| --- | --- |"
            for cmd in jq yq envsubst curl kubectl oc virtctl docker npm node; do
              if command -v "$cmd" &>/dev/null; then
                echo "| \`$cmd\` | ✅ |"
              else
                echo "| \`$cmd\` | ❌ |"
              fi
            done
            echo "</details>"
            echo ""

            echo "<details><summary>npm / Node Versions</summary>"
            echo ""
            echo "\`\`\`json"
            npm version --json 2>/dev/null || echo "npm not found"
            echo "\`\`\`"
            echo "</details>"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Log Client / Server Versions
        run: |
          {
            echo "<details><summary>Client / Server Versions</summary>"
            echo ""
            echo "| Tool | Client Version | Server Version |"
            echo "| --- | --- | --- |"
            for cmd in kubectl oc virtctl; do
              if command -v "$cmd" &>/dev/null; then
                client=""
                server=""
                version_output=$("$cmd" version 2>/dev/null || true)
                client=$(echo "$version_output" | grep -i "client" | head -1 | sed 's/^[[:space:]]*//')
                server=$(echo "$version_output" | grep -i "server" | head -1 | sed 's/^[[:space:]]*//')
                echo "| \`$cmd\` | ${client:-N/A} | ${server:-N/A} |"
              else
                echo "| \`$cmd\` | ❌ not found | — |"
              fi
            done
            echo "</details>"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Log HCO and managed operator versions
        continue-on-error: true
        run: |
          {
            echo "<details><summary>HCO & Managed Operator Versions</summary>"
            echo ""

            if ! command -v oc &>/dev/null; then
              echo "> ⚠️ \`oc\` not found — skipping cluster version checks."
            else
              # HCO itself is installed via OLM; its CSV is the authoritative version.
              echo "### HCO Version (OLM CSV)"
              echo ""
              echo "| Name | Version | Phase |"
              echo "| --- | --- | --- |"
              oc get csv -n kubevirt-hyperconverged --no-headers 2>/dev/null \
                | grep -i hyperconverged \
                | awk '{ print "| `" $1 "` | `" $2 "` | " $NF " |" }' \
                || echo "| — | HCO CSV not found | — |"
              echo ""

              # HCO labels every operand CR with app.kubernetes.io/managed-by=hco-operator.
              # Use that label + -A (all namespaces) so we never hardcode a name or namespace.
              # KubeVirt uses observedKubeVirtVersion; all others use observedVersion.
              echo "### HCO Managed Operand Versions"
              echo ""
              echo "| Operand | Version |"
              echo "| --- | --- |"

              HCO_LABEL="app.kubernetes.io/managed-by=hco-operator"

              kv_ver=$(oc get kubevirt -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedKubeVirtVersion}' 2>/dev/null || echo "")
              echo "| \`kubevirt\` | \`${kv_ver:-not found}\` |"

              cdi_ver=$(oc get cdi -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedVersion}' 2>/dev/null || echo "")
              echo "| \`cdi\` | \`${cdi_ver:-not found}\` |"

              ssp_ver=$(oc get ssp -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedVersion}' 2>/dev/null || echo "")
              echo "| \`ssp\` | \`${ssp_ver:-not found}\` |"

              cnao_ver=$(oc get networkaddonsconfig -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedVersion}' 2>/dev/null || echo "")
              echo "| \`cnao\` | \`${cnao_ver:-not found}\` |"

              hpp_ver=$(oc get hostpathprovisioner -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedVersion}' 2>/dev/null || echo "")
              echo "| \`hostpath-provisioner\` | \`${hpp_ver:-not found}\` |"
            fi
            echo "</details>"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

  build-kubevirt-plugin-image:
    name: Build Kubevirt Plugin Image
    needs: check-runner
    runs-on: ubuntu-latest
    outputs:
      kubevirt-plugin-image: ${{ env.KUBEVIRT_PLUGIN_IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check if kubevirt-plugin image exists in registry
        id: check_image
        run: |
          # Try unauthenticated first (works for public registries)
          if skopeo inspect docker://${KUBEVIRT_PLUGIN_IMAGE} &>/dev/null; then
            echo "IMAGE_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Build kubevirt-plugin image
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        run: |
          docker build -t ${KUBEVIRT_PLUGIN_IMAGE} -f Dockerfile .
          docker push ${KUBEVIRT_PLUGIN_IMAGE}

  run-gating-tests:
    name: Run Gating Tests
    needs: build-kubevirt-plugin-image
    runs-on: kubevirt-plugin-ci
    timeout-minutes: 120
    env:
      PLUGIN_IMAGE: ${{ needs.build-kubevirt-plugin-image.outputs.kubevirt-plugin-image }}
      PLUGIN_PORT: 9001
      PLUGIN_NAME: kubevirt-plugin-ci
      CONSOLE_PORT: 9000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve console image from cluster OpenShift version
        run: bash ci-scripts/resolve-console-image.sh >> "${GITHUB_ENV}"

      - name: Setup required namespaced resources
        run: |
          oc create namespace "${CYPRESS_TEST_NS}" --dry-run=client -o yaml | oc apply -f -
          # Patch the existing fixture to substitute the CI secret's namespace and name.
          yq e '.metadata.name = strenv(CYPRESS_TEST_SECRET_NAME) | .metadata.namespace = strenv(CYPRESS_TEST_NS)' \
              cypress/fixtures/secret.yaml | oc apply -f -

      - name: Start kubevirt-plugin container (mimics operator deployment with a ConfigMap + Secret)
        run: |
          ./ci-scripts/start-plugin-container.sh

          # Root URL often 403/404 (no index.html in plugin dist); manifest is always served when the bundle is present.
          echo "Waiting for plugin HTTPS on localhost:9001 (plugin-manifest.json) ..."
          for i in $(seq 1 30); do
            if curl -skSf "https://localhost:9001/plugin-manifest.json" -o /dev/null; then
              echo "Plugin responded over HTTPS."
              exit 0
            fi
            if [[ "$i" -eq 30 ]]; then
              echo "::error::Plugin did not become ready on https://localhost:9001/plugin-manifest.json"
              docker ps -a --filter "name=${PLUGIN_NAME}" || true
              docker inspect "${PLUGIN_NAME}" --format 'status={{.State.Status}} exit={{.State.ExitCode}} err={{.State.Error}}' 2>/dev/null || true
              docker logs "${PLUGIN_NAME}" 2>&1 || true
              exit 1
            fi
            sleep 2
          done

      - name: Start the "off cluster" console
        shell: bash
        run: |
          ./ci-scripts/start-console.sh

          echo "Waiting for console at ${BRIDGE_BASE_ADDRESS}..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" "${BRIDGE_BASE_ADDRESS}/" | grep -qE '200|301|302'; then
              echo "Console is responding."
              break
            fi
            if [[ "$i" -eq 60 ]]; then
              echo "::error::Console did not become ready within the wait window."
              exit 1
            fi
            sleep 5
          done

      # TODO: Add dependency caching (either use the setup-node action with caching, or add explicit caching)
      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --no-audit
          npx cypress install

      # # TODO: Replace with the cypress action?
      # - name: Run Cypress gating tests
      #   run: |
      #     npm run test-cypress-headless -- --spec="${{ inputs.test_spec }}"

      - name: Run gating tests
        uses: cypress-io/github-action@v7
        with:
          summary-title: 'Cypress gating tests'
          install: false
          browser: chrome
          working-directory: ./cypress
          env: openshift=true
          spec: '${{ inputs.test_spec }}'

      - name: Generate test report
        if: always()
        run: npm run cypress-postreport || true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-results-${{ github.run_id }}
          path: |
            cypress/gui-test-screenshots/
            cypress/videos/
            cypress/results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Capture logs, stop and rm the console and plugin containers
        if: always()
        run: |
          TMP=/tmp/e2e-ci-diagnostics/container-logs
          mkdir -p "${TMP}"

          docker logs console > "${TMP}/console.log" 2>&1 || true
          docker stop console || echo "::warning::Could not stop console container"
          docker rm -f console || true

          docker logs "${PLUGIN_NAME}" > "${TMP}/kubevirt-plugin.log" 2>&1 || true
          docker stop "${PLUGIN_NAME}" || echo "::warning::Could not stop ${PLUGIN_NAME} container"
          docker rm -f "${PLUGIN_NAME}" || true

      - name: Collect OpenShift cluster diagnostics on failure
        if: failure()
        run: |
          TMP=/tmp/e2e-ci-diagnostics/cluster
          mkdir -p "${TMP}"

          oc cluster-info dump > "${TMP}/cluster_info.json" 2>/dev/null || true
          oc get pods -n kubevirt-hyperconverged -o wide > "${TMP}/hco_pods.txt" 2>/dev/null || true
          oc get nodes -o wide > "${TMP}/nodes.txt" 2>/dev/null || true
          oc get events -n "${CYPRESS_TEST_NS}" --sort-by='.lastTimestamp' > "${TMP}/test_ns_events.txt" 2>/dev/null || true

      - name: Upload E2E diagnostics (cluster + container logs) on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-ci-diagnostics-cluster-and-containers-${{ github.run_id }}
          path: /tmp/e2e-ci-diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      # TODO: Add any other cleanup steps that are required for the test to this step
      - name: Cleanup cluster resources
        if: always()
        run: |
          ./ci-scripts/test-cleanup.sh || echo "::warning::Cleanup encountered errors (non-fatal)"
          oc delete namespace "${CYPRESS_TEST_NS}" --wait=false || true

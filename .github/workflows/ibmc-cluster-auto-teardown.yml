name: IBM Cloud Hot Cluster Auto-Teardown
run-name: "Hot Cluster Auto-Teardown [${{ inputs.cluster_name || 'all' }}]"

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Cluster name to check (leave default for all clusters)'
        required: true
        default: 'kubevirt-plugin-ci'
        type: string
      idle_threshold_minutes:
        description: 'Minutes of CI inactivity before teardown (overrides per-cluster defaults)'
        required: true
        default: '240'
        type: string
      check_frequency_minutes:
        description: 'How often to check (only affects manual runs; cron is fixed at 30 min)'
        required: false
        default: '30'
        type: string
      business_hours_only:
        description: 'Only tear down outside business hours (Sun-Thu 8am-6pm UTC+2 Israel)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  actions: write

env:
  IBM_REGION: eu-de
  IBM_RESOURCE_GROUP: cnv-ui
  BASE_DOMAIN: cnv-ui.com

jobs:
  discover-clusters:
    name: Discover Clusters
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      clusters: ${{ steps.discover.outputs.clusters }}
    steps:
      - name: Setup IBM Cloud CLI
        uses: IBM/actions-ibmcloud-cli@v2
        with:
          api_key: ${{ secrets.IC_KEY }}
          region: ${{ env.IBM_REGION }}
          group: ${{ env.IBM_RESOURCE_GROUP }}
          plugins: kubernetes-service

      - name: Install CIS plugin
        run: ibmcloud plugin install cis -f 2>/dev/null || true

      - name: Discover active clusters
        id: discover
        run: |
          CLUSTERS="[]"

          echo "=== Discovering IPI clusters via CIS DNS ==="
          CIS_CRN=$(ibmcloud cis instances --output json 2>/dev/null | jq -r '.[0].crn // empty' || true)
          if [[ -n "${CIS_CRN}" ]]; then
            ibmcloud cis instance-set "${CIS_CRN}" 2>/dev/null || true
            ZONE_ID=$(ibmcloud cis domains --output json 2>/dev/null | jq -r '.[0].id // empty' || true)
            if [[ -n "${ZONE_ID}" ]]; then
              IPI_CLUSTERS=$(ibmcloud cis dns-records "${ZONE_ID}" --output json 2>/dev/null \
                | jq -c '[.[] | select(.type == "A" or .type == "CNAME") | .name
                    | capture("^api\\.(?<name>[^.]+)\\.'"${BASE_DOMAIN}"'$") | .name] | unique' \
                || echo "[]")
              echo "IPI clusters from DNS: ${IPI_CLUSTERS}"
              CLUSTERS=$(echo "${CLUSTERS}" | jq -c --argjson ipi "${IPI_CLUSTERS}" '. + $ipi' || echo "[]")
            else
              echo "WARNING: Could not find CIS zone"
            fi
          else
            echo "WARNING: No CIS instance found"
          fi

          echo "=== Discovering ROKS clusters ==="
          ROKS_CLUSTERS=$(ibmcloud oc cluster ls --output json 2>/dev/null \
            | jq -c '[.[].name] // []' \
            || echo "[]")
          echo "ROKS clusters: ${ROKS_CLUSTERS}"
          CLUSTERS=$(echo "${CLUSTERS}" | jq -c --argjson roks "${ROKS_CLUSTERS}" '. + $roks | unique' || echo "[]")

          if [[ $(echo "${CLUSTERS}" | jq 'length') -eq 0 ]]; then
            echo "No clusters discovered — nothing to check"
            echo "clusters=[]" >> "$GITHUB_OUTPUT"
          else
            echo "Discovered clusters: ${CLUSTERS}"
            echo "clusters=${CLUSTERS}" >> "$GITHUB_OUTPUT"
          fi

  validate-input:
    name: Validate Input
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      cluster_matrix: ${{ steps.sanitize.outputs.matrix }}
    steps:
      - name: Sanitize cluster_name input
        id: sanitize
        env:
          INPUT_CLUSTER_NAME: ${{ inputs.cluster_name }}
        run: |
          if [[ ! "${INPUT_CLUSTER_NAME}" =~ ^[a-zA-Z0-9][a-zA-Z0-9._-]{0,20}$ ]]; then
            echo "::error::Invalid cluster_name: '${INPUT_CLUSTER_NAME}'. Must match [a-zA-Z0-9][a-zA-Z0-9._-]* and be at most 21 characters."
            exit 1
          fi
          echo "matrix=[\"${INPUT_CLUSTER_NAME}\"]" >> "$GITHUB_OUTPUT"

  check-and-teardown:
    name: 'Check & Teardown [${{ matrix.cluster_name }}]'
    needs: [discover-clusters, validate-input]
    if: |
      always() && (
        (github.event_name == 'schedule' && needs.discover-clusters.outputs.clusters != '[]') ||
        (github.event_name == 'workflow_dispatch' && needs.validate-input.result == 'success')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        cluster_name: ${{ github.event_name == 'schedule' && fromJSON(needs.discover-clusters.outputs.clusters) || fromJSON(needs.validate-input.outputs.cluster_matrix) }}
    env:
      CLUSTER_NAME: ${{ matrix.cluster_name }}
    steps:
      - name: Determine idle threshold for this cluster
        id: threshold
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_IDLE_THRESHOLD: ${{ inputs.idle_threshold_minutes }}
        run: |
          if [[ "${EVENT_NAME}" == "workflow_dispatch" && -n "${INPUT_IDLE_THRESHOLD}" ]]; then
            echo "minutes=${INPUT_IDLE_THRESHOLD}" >> "$GITHUB_OUTPUT"
            echo "Using workflow_dispatch override: ${INPUT_IDLE_THRESHOLD} minutes"
          elif [[ "${CLUSTER_NAME}" == "kubevirt-plugin-ci" ]]; then
            echo "minutes=240" >> "$GITHUB_OUTPUT"
            echo "Default/main cluster: 240 minutes (4h)"
          else
            echo "minutes=120" >> "$GITHUB_OUTPUT"
            echo "Release-branch cluster: 120 minutes (2h)"
          fi

      # Listing self-hosted runners needs admin access, which GITHUB_TOKEN
      # can never have -- mint a short-lived admin-scoped token from the
      # existing kubevirt-plugin-arc GitHub App instead.
      - name: Generate ARC app token for runner-busy check
        id: arc-app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ARC_GITHUB_APP_ID }}
          private-key: ${{ secrets.ARC_GITHUB_APP_PRIVATE_KEY }}
          permission-administration: read

      - name: Check CI jobs for this cluster
        id: check_ci
        uses: actions/github-script@v9
        env:
          INCLUDE_WORKFLOWS: '[".github/workflows/hot-cluster-e2e.yml", ".github/workflows/hot-cluster-e2e-run.yml", ".github/workflows/ibmc-cluster-setup.yml"]'
          CLUSTER_NAME: ${{ matrix.cluster_name }}
          RUNNER_ADMIN_TOKEN: ${{ steps.arc-app-token.outputs.token }}
        with:
          script: |
            const INCLUDE_WORKFLOWS = JSON.parse(process.env.INCLUDE_WORKFLOWS);
            const clusterName = process.env.CLUSTER_NAME;
            const clusterTag = `[${clusterName}]`;

            // A registered self-hosted runner labeled with this cluster
            // name and busy: true means a job is actively executing right
            // now -- an authoritative signal that title-matching below
            // can't provide (a run between steps or not yet reporting its
            // title could otherwise look idle). Checked first and
            // short-circuits the rest of this step when true. Needs the
            // ARC app token from the previous step since this endpoint
            // rejects the default GITHUB_TOKEN.
            let runnerBusy = false;
            try {
              if (!process.env.RUNNER_ADMIN_TOKEN) {
                throw new Error('ARC app token unavailable (see previous step)');
              }
              const runnerOctokit = require('@actions/github').getOctokit(process.env.RUNNER_ADMIN_TOKEN);
              const runners = await runnerOctokit.paginate(runnerOctokit.rest.actions.listSelfHostedRunnersForRepo, {
                ...context.repo,
                per_page: 100,
              });
              runnerBusy = runners.some(
                r => r.busy && r.labels?.some(l => l.name === clusterName)
              );
              core.info(`Runner pool for '${clusterName}': ${runnerBusy ? 'busy' : 'idle'} (${runners.length} total runners checked).`);
            } catch (err) {
              // Fail closed: this check exists specifically to catch a job
              // running right now that title-matching below can't see --
              // if we can't ask, assume busy rather than silently losing
              // that protection against tearing down an active cluster.
              core.warning(`Failed to query self-hosted runners: ${err.message} -- failing closed (treating as busy).`);
              core.setOutput('active_jobs', 'true');
              core.setOutput('last_run_time', '');
              core.summary.addList([
                `Cluster: ${clusterName}`,
                `Runner query failed: ${err.message} (failing closed -- skipping teardown for safety)`,
              ]);
              await core.summary.write();
              return;
            }

            if (runnerBusy) {
              core.setOutput('active_jobs', 'true');
              core.setOutput('last_run_time', '');
              core.summary.addList([
                `Cluster: ${clusterName}`,
                `Runner pool busy: true (skipping teardown -- job running right now)`,
              ]);
              await core.summary.write();
              return;
            }

            // hot-cluster-e2e.yml's run-name shows the raw PR base branch
            // (e.g. "release-4.20"), not the resolved cluster name, for
            // automatic pull_request_target runs -- a naive substring
            // match against clusterTag would miss these entirely and
            // report the cluster as idle when it isn't. Re-derive the
            // resolved name from the bracketed token using the same
            // release-branch mapping rule. The other two workflows always
            // show the resolved name directly, so they keep the plain
            // substring match.
            function runMatchesCluster(run, workflow) {
              const title = run.display_title || '';
              if (workflow === '.github/workflows/hot-cluster-e2e.yml') {
                const bracketed = title.match(/^Hot Cluster E2E \[([^\]]+)\]/);
                if (!bracketed) return false;
                const token = bracketed[1];
                // Token is inputs.cluster_name || github.base_ref ||
                // 'kubevirt-plugin-ci'. workflow_dispatch always supplies
                // cluster_name (its own default if not explicitly
                // overridden) -- already resolved, so use it as-is rather
                // than remapping a manually-chosen name that happens not to
                // match the known patterns down to 'kubevirt-plugin-ci'.
                // Only a pull_request_target run's base_ref token needs the
                // release-X.Y remapping below.
                let resolved;
                if (run.event === 'workflow_dispatch') {
                  resolved = token;
                } else if (token.startsWith('kubevirt-plugin-')) {
                  resolved = token;
                } else {
                  const release = token.match(/^release-(\d+)\.(\d+)$/);
                  resolved = release ? `kubevirt-plugin-${release[1]}${release[2]}` : 'kubevirt-plugin-ci';
                }
                return resolved === clusterName;
              }
              return title.includes(clusterTag);
            }

            let inProgress = 0;
            let queued = 0;
            let lastRunTime = null;

            // Bound the "completed" lookup to recent history so pagination
            // stays fast -- idle thresholds top out at a few hours.
            const lookbackDate = new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString();

            try {
              for (const workflow of INCLUDE_WORKFLOWS) {
                for (const status of ['in_progress', 'queued', 'completed']) {
                  const params = {
                    ...context.repo,
                    workflow_id: workflow,
                    status,
                    per_page: 100,
                  };
                  if (status === 'completed') {
                    params.created = `>=${lookbackDate}`;
                  }

                  // Paginate fully before filtering -- a specific cluster's
                  // tagged run can easily fall outside the first page.
                  const runs = await github.paginate(github.rest.actions.listWorkflowRuns, params);

                  const matching = runs.filter(r => runMatchesCluster(r, workflow));

                  if (status === 'in_progress') inProgress += matching.length;
                  if (status === 'queued') queued += matching.length;
                  if (status === 'completed') {
                    for (const run of matching) {
                      const t = new Date(run.updated_at);
                      if (!lastRunTime || t > lastRunTime) lastRunTime = t;
                    }
                  }
                }
              }
            } catch (err) {
              core.setFailed(`Failed to query workflow runs: ${err.message}`);
              return;
            }

            const minutesAgo = lastRunTime ? Math.floor((new Date().getTime() - lastRunTime.getTime()) / 60000) : 'N/A';
            core.summary.addList([
              `Cluster: ${clusterName}`,
              `In-progress CI runs (tagged): ${inProgress}`,
              `Queued CI runs (tagged): ${queued}`,
              `Last tagged run: ${lastRunTime ? lastRunTime.toISOString() : 'N/A'} (${minutesAgo} minutes ago)`,
            ]);
            await core.summary.write();
            core.setOutput('active_jobs', (inProgress > 0 || queued > 0) ? 'true' : 'false');
            core.setOutput('last_run_time', lastRunTime ? lastRunTime.toISOString() : '');

      - name: Check business hours
        id: check_hours
        if: steps.check_ci.outputs.active_jobs == 'false'
        env:
          BUSINESS_HOURS_ONLY: ${{ inputs.business_hours_only || 'false' }}
        run: |
          if [[ "${BUSINESS_HOURS_ONLY}" != "true" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Business hours check disabled — proceeding with idle check."
            exit 0
          fi

          HOUR_IL=$(TZ='Asia/Jerusalem' date +%H)
          DOW=$(TZ='Asia/Jerusalem' date +%u)

          if [[ ${DOW} -ge 1 && ${DOW} -le 4 && ${HOUR_IL} -ge 8 && ${HOUR_IL} -lt 18 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Business hours (Sun-Thu 8-18 Israel) — skipping teardown."
          elif [[ ${DOW} -eq 7 && ${HOUR_IL} -ge 8 && ${HOUR_IL} -lt 18 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Business hours (Sunday 8-18 Israel) — skipping teardown."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Outside business hours — proceeding with idle check."
          fi

      - name: Setup IBM Cloud CLI
        uses: IBM/actions-ibmcloud-cli@v2
        if: steps.check_ci.outputs.active_jobs == 'false' && steps.check_hours.outputs.skip != 'true'
        with:
          api_key: ${{ secrets.IC_KEY }}
          region: ${{ env.IBM_REGION }}
          group: ${{ env.IBM_RESOURCE_GROUP }}
          plugins: kubernetes-service

      - name: Check idle threshold
        id: check_idle
        if: steps.check_ci.outputs.active_jobs == 'false' && steps.check_hours.outputs.skip != 'true'
        uses: actions/github-script@v9
        env:
          LAST_RUN_TIME: ${{ steps.check_ci.outputs.last_run_time }}
          IDLE_THRESHOLD_MINUTES: ${{ steps.threshold.outputs.minutes }}
          CLUSTER_NAME: ${{ matrix.cluster_name }}
        with:
          script: |
            let lastRunTime = process.env.LAST_RUN_TIME;
            const clusterName = process.env.CLUSTER_NAME;
            const clusterTag = `[${clusterName}]`;

            if (!lastRunTime) {
              core.info('No completed tagged CI runs found, checking cluster setup time as fallback...');

              try {
                const runs = await github.rest.actions.listWorkflowRuns({
                  ...context.repo,
                  workflow_id: 'ibmc-cluster-setup.yml',
                  status: 'success',
                  per_page: 10,
                });
                const match = runs.data.workflow_runs.find(
                  r => r.display_title && r.display_title.includes(clusterTag)
                );
                if (match) {
                  lastRunTime = match.updated_at;
                  core.info(`Using last successful setup run time for ${clusterName}: ${lastRunTime}`);
                }
              } catch (err) {
                core.warning(`Failed to query setup runs: ${err.message}`);
              }
            }

            if (!lastRunTime) {
              core.info('Cannot determine last activity time, skipping teardown for safety');
              core.setOutput('recent_activity', 'true');
              core.setOutput('reason', 'Cannot determine last activity timestamp');
              return;
            }

            const lastTime = new Date(lastRunTime);
            const idleMinutes = Math.floor((Date.now() - lastTime.getTime()) / 60000);
            const threshold = parseInt(process.env.IDLE_THRESHOLD_MINUTES, 10);

            core.info(`Cluster: ${clusterName}`);
            core.info(`Last activity: ${lastRunTime}`);
            core.info(`Idle for ${idleMinutes} minutes (threshold: ${threshold} minutes)`);

            if (idleMinutes >= threshold) {
              core.setOutput('recent_activity', 'false');
              core.setOutput('reason', `CI jobs have been idle for ${idleMinutes} minutes (threshold: ${threshold})`);
            } else {
              const remaining = threshold - idleMinutes;
              core.setOutput('recent_activity', 'true');
              core.setOutput('reason', `CI jobs last ran ${idleMinutes} minutes ago, ${remaining} minutes remaining before threshold`);
            }

      - name: Check if cluster exists
        id: check_cluster
        if: steps.check_idle.outputs.recent_activity == 'false'
        run: |
          INFRA_TYPE=""

          if ibmcloud oc cluster get --cluster "${CLUSTER_NAME}" &>/dev/null; then
            STATE=$(ibmcloud oc cluster get --cluster "${CLUSTER_NAME}" --output json 2>/dev/null | jq -r '.state // "unknown"')
            PROVIDER=$(ibmcloud oc cluster get --cluster "${CLUSTER_NAME}" --output json 2>/dev/null | jq -r '.provider // "classic"')
            echo "ROKS cluster '${CLUSTER_NAME}' exists (state: ${STATE}, provider: ${PROVIDER})"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            if [[ "${PROVIDER}" == "vpc-gen2" ]]; then
              INFRA_TYPE="vpc"
            else
              INFRA_TYPE="classic"
            fi
          elif dig +short "api.${CLUSTER_NAME}.${BASE_DOMAIN}" 2>/dev/null | grep -q .; then
            echo "IPI cluster detected via DNS (api.${CLUSTER_NAME}.${BASE_DOMAIN} resolves)"
            echo "exists=true" >> "$GITHUB_OUTPUT"
            INFRA_TYPE="ipi"
          else
            echo "No cluster '${CLUSTER_NAME}' found (ROKS or IPI), nothing to do"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "infra_type=${INFRA_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Trigger teardown
        if: steps.check_idle.outputs.recent_activity == 'false' && steps.check_cluster.outputs.exists == 'true'
        uses: actions/github-script@v9
        env:
          INFRA_TYPE: ${{ steps.check_cluster.outputs.infra_type }}
          CLUSTER_NAME: ${{ matrix.cluster_name }}
        with:
          script: |
            const infraType = process.env.INFRA_TYPE || 'classic';
            const clusterName = process.env.CLUSTER_NAME;

            const inputs = {
              cluster_name: clusterName,
              infrastructure_type: infraType,
            };

            core.info(`Triggering teardown for ${infraType} cluster '${clusterName}'`);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ibmc-cluster-teardown.yml',
              ref: context.ref,
              inputs,
            });

      - name: Summary
        if: always()
        env:
          CLUSTER_EXISTS: ${{ steps.check_cluster.outputs.exists }}
          WORKFLOW_ACTIVE_JOBS: ${{ steps.check_ci.outputs.active_jobs }}
          WORKFLOW_LAST_RUN_TIME: ${{ steps.check_ci.outputs.last_run_time }}
          IDLE_RECENT_ACTIVITY: ${{ steps.check_idle.outputs.recent_activity }}
          IDLE_REASON: ${{ steps.check_idle.outputs.reason }}
          BUSINESS_HOURS_SKIP: ${{ steps.check_hours.outputs.skip }}
          IDLE_THRESHOLD_MINUTES: ${{ steps.threshold.outputs.minutes }}
        run: |
          echo "## Auto-Teardown Check: ${CLUSTER_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster | \`${CLUSTER_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Idle Threshold | \`${IDLE_THRESHOLD_MINUTES}\` min |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Business Hours Skip | \`${BUSINESS_HOURS_SKIP:-N/A}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster Exists | \`${CLUSTER_EXISTS:-(unknown)}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Active CI Jobs? | \`${WORKFLOW_ACTIVE_JOBS:-N/A}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Last CI Run | \`${WORKFLOW_LAST_RUN_TIME:-N/A}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Recent Activity? | \`${IDLE_RECENT_ACTIVITY:-N/A}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Reason | \`${IDLE_REASON:-N/A}\` |" >> "$GITHUB_STEP_SUMMARY"

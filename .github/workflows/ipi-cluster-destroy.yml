name: IPI Cluster Destroy (one-off)

on:
  workflow_dispatch:
    inputs:
      setup_run_id:
        description: 'Setup workflow run ID to download install state from'
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  destroy:
    name: Destroy IPI Cluster
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download install state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INSTALL_DIR="${RUNNER_TEMP}/ipi-destroy"
          mkdir -p "${INSTALL_DIR}"

          echo "Downloading install state from run ${{ inputs.setup_run_id }}..."
          gh run download "${{ inputs.setup_run_id }}" --repo "${{ github.repository }}" \
            --name "ipi-install-state-${{ inputs.setup_run_id }}" \
            --dir "${INSTALL_DIR}" 2>/dev/null || \
          gh run download "${{ inputs.setup_run_id }}" --repo "${{ github.repository }}" \
            --dir "${INSTALL_DIR}"

          echo "Files downloaded:"
          find "${INSTALL_DIR}" -type f

          if [[ ! -f "${INSTALL_DIR}/metadata.json" ]]; then
            echo "::error::metadata.json not found"
            exit 1
          fi

          echo "infraID: $(jq -r '.infraID' "${INSTALL_DIR}/metadata.json")"

      - name: Install openshift-install
        run: |
          curl -sL "https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-install-linux.tar.gz" \
            | tar -xz -C /usr/local/bin openshift-install

      - name: Destroy cluster
        env:
          IC_API_KEY: ${{ secrets.IC_KEY }}
          INSTALL_DIR: ${{ runner.temp }}/ipi-destroy
        run: |
          export IC_API_KEY
          echo "Destroying cluster $(jq -r '.infraID' "${INSTALL_DIR}/metadata.json")..."
          openshift-install destroy cluster --dir="${INSTALL_DIR}" --log-level=info

name: Deploy Manual Console
run-name: "Deploy Manual Console [${{ inputs.cluster_name }}] @ ${{ inputs.pr_number && format('PR#{0}', inputs.pr_number) || inputs.branch }}"

# Deploys a standalone, OAuth-protected console + kubevirt-plugin stack to an
# existing hot cluster for manual UI testing. Entirely separate from the E2E
# path: it builds its own in-cluster plugin image, uses its own trigger
# ConfigMap/action, and does not touch the CNV-managed console, HCO, or SSP.
#
# cluster-check below provisions the target cluster via "IBM Cloud Hot
# Cluster Setup" (ibmc-cluster-setup.yml) if it isn't already up -- without
# that, dispatching against a cluster with no matching ARC runner would
# leave the deploy job hanging until its own timeout instead of failing
# fast or self-provisioning.
#
# Dispatch ref matters: the dispatch branch/ref (github.ref) is what gets
# checked out for CI scripts, separately from "branch"/pr_number below,
# which only selects the plugin source to build. Dispatch from main (or
# another branch carrying current ci-scripts/manual-console/) even when
# deploying an old release branch's plugin.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: >-
          Git branch or ref to build the kubevirt-plugin image from (can be
          an old release branch). Ignored when pr_number is set. Dispatch
          this workflow itself from main/current -- see the header comment.
        required: true
        default: main
        type: string
      pr_number:
        description: 'PR number to deploy instead (works with PRs from forks -- the OWNERS-listed author check below still applies). Takes precedence over "branch" when set.'
        required: false
        default: ''
        type: string
      cluster_name:
        description: ARC runner label / hot cluster name (provisioned automatically if not already up)
        required: true
        default: kubevirt-plugin-ci
        type: string
      infrastructure_type:
        description: Infrastructure type of the target cluster (used to provision if not already up)
        required: false
        default: ipi
        type: choice
        options:
          - ipi
          - vpc
          - classic
      openshift_version:
        description: 'OpenShift version to provision if the cluster is not already up (e.g. 4.22_openshift)'
        required: false
        default: '4.22_openshift'
        type: string
      cnv_channel:
        description: CNV OLM subscription channel to install if the cluster is not already up
        required: false
        default: stable
        type: string
      cnv_pin_version:
        description: |
          "<major>.<minor>" to pin CNV to if the cluster is not already up
          (e.g. for a release branch under test). Leave empty to install
          whatever cnv_channel currently resolves to.
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: read

# Persistent environment: never cancel an in-flight deploy for the same
# cluster, since that could leave the manual console mid-provision.
concurrency:
  group: deploy-manual-console-${{ inputs.cluster_name }}
  cancel-in-progress: false

env:
  CI_ENV_NS: ci-env
  MANUAL_CONSOLE_CM: manual-console
  MANUAL_CONSOLE_NS: manual-console
  MANUAL_CONSOLE_USER: manual-console

jobs:
  # Only runs when pr_number is set (deploying a PR, possibly from a fork).
  # Mirrors hot-cluster-e2e.yml's check-trust: only PR authors listed in
  # OWNERS can have their PR deployed here, with no "ok-to-test" escape
  # hatch -- push the branch directly and use "branch" instead if needed.
  resolve-pr:
    name: Resolve PR
    if: inputs.pr_number != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      head_repo: ${{ steps.resolve.outputs.head_repo }}
    steps:
      # Pinned to the default branch explicitly: without a ref:, checkout
      # falls back to github.ref, which for workflow_dispatch is whatever
      # branch was selected in the dispatch UI -- not necessarily the
      # default branch. Reading OWNERS from an unpinned, dispatcher-chosen
      # branch would let a modified OWNERS file on that branch self-approve
      # trust for a fork PR.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Resolve PR and verify author is a trusted repo owner
        id: resolve
        uses: actions/github-script@v9
        env:
          # Passed via env, not interpolated into the script string below:
          # inputs.pr_number is a raw, unvalidated workflow_dispatch string
          # input, and substituting it directly into the JS source would let
          # a crafted value break out of the string literal and inject
          # arbitrary script.
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const author = pr.user.login;
            const headSha = pr.head.sha;
            const headRepo = pr.head.repo ? pr.head.repo.full_name : '(source repository deleted)';
            core.info(`PR #${prNumber}: author=${author}, head=${headRepo}@${headSha}`);

            let trusted = false;
            try {
              const owners = fs.readFileSync('OWNERS', 'utf8');
              trusted = new RegExp(`^\\s*-\\s*${author}\\s*$`, 'm').test(owners);
            } catch (err) {
              core.warning(`Could not read OWNERS file: ${err.message}`);
            }

            core.info(`${author} is ${trusted ? '' : 'not '}listed in OWNERS (approvers/reviewers) — ${trusted ? 'trusted' : 'untrusted'}.`);
            core.setOutput('head_sha', headSha);
            core.setOutput('head_repo', headRepo);

            if (!trusted) {
              core.setFailed(`PR #${prNumber}'s author '${author}' is not listed in OWNERS (approvers/reviewers). Only PRs from trusted repo owners can be deployed via this workflow. To deploy this PR's changes anyway, push its branch to this repository directly and use the "branch" input instead.`);
            }

  # Probes the target cluster and provisions it if it isn't up yet -- same
  # reusable workflow hot-cluster-e2e.yml already uses for this. Gated on
  # resolve-pr the same way deploy is below -- an untrusted PR author must
  # not be able to trigger real cluster provisioning (secrets: inherit)
  # just because deploy itself will later be skipped; skipped resolve-pr
  # (the plain "branch" input path, no pr_number) still runs this normally.
  # run_health_check stays false -- this isn't an E2E gating context.
  cluster-check:
    name: Cluster Check
    needs: resolve-pr
    if: always() && needs.resolve-pr.result != 'failure'
    uses: ./.github/workflows/hot-cluster-check.yml
    with:
      cluster_name: ${{ inputs.cluster_name }}
      infrastructure_type: ${{ inputs.infrastructure_type }}
      openshift_version: ${{ inputs.openshift_version }}
      cnv_channel: ${{ inputs.cnv_channel }}
      cnv_pin_version: ${{ inputs.cnv_pin_version }}
      branch_name: ${{ inputs.branch }}
    secrets: inherit

  # if: always() so this still runs when resolve-pr was skipped (no
  # pr_number given -- the plain "branch" input path), but not when
  # resolve-pr ran and failed the trust check, or the cluster never became
  # ready (cluster-check provisions it if needed; a cluster already up
  # returns ready almost immediately, so this adds no delay for the common
  # case).
  deploy:
    name: Deploy Manual Console
    needs: [resolve-pr, cluster-check]
    if: |
      always() && needs.resolve-pr.result != 'failure' &&
      needs.cluster-check.outputs.cluster_ready == 'true'
    runs-on: ${{ inputs.cluster_name }}
    timeout-minutes: 30
    steps:
      # Two checkouts, deliberately kept separate: (1) this repo's own
      # dispatch ref into $GITHUB_WORKSPACE, so CI scripts here always
      # match the workflow YAML that's actually running; (2) the plugin
      # source to actually build -- PR head, or inputs.branch -- into
      # plugin-src/, used only as setup-plugin-image.sh's BUILD_DIR below.
      # allow-unsafe-pr-checkout is not needed for either: actions/checkout
      # only enforces that guard for pull_request_target/workflow_run
      # triggers, not workflow_dispatch. The OWNERS check above (resolve-pr)
      # is this workflow's actual trust gate for fork PRs.
      - name: Checkout workflow scripts
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Checkout plugin source
        uses: actions/checkout@v7
        with:
          # Falls back to the default repository (github.repository, actions/
          # checkout's own default) both for the plain "branch" input path
          # and if the PR's source repo was deleted -- head_sha in that case
          # is a fork commit unreachable from this repo anyway, so checkout
          # would fail regardless, but this at least avoids literally passing
          # the '(source repository deleted)' sentinel as a repository name.
          repository: ${{ (needs.resolve-pr.outputs.head_repo != '' && needs.resolve-pr.outputs.head_repo != '(source repository deleted)') && needs.resolve-pr.outputs.head_repo || github.repository }}
          ref: ${{ needs.resolve-pr.outputs.head_sha || inputs.branch }}
          path: plugin-src
          persist-credentials: false

      - name: Log environment summary
        env:
          BRANCH: ${{ inputs.branch }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_REPO: ${{ needs.resolve-pr.outputs.head_repo }}
          HEAD_SHA: ${{ needs.resolve-pr.outputs.head_sha }}
          CLUSTER_NAME: ${{ inputs.cluster_name }}
        run: |
          {
            echo "## Manual Console Deploy"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            if [[ -n "${PR_NUMBER}" ]]; then
              echo "| PR | #${PR_NUMBER} (\`${HEAD_REPO}@${HEAD_SHA}\`) |"
            else
              echo "| Branch | \`${BRANCH}\` |"
            fi
            echo "| Cluster | \`${CLUSTER_NAME}\` |"
            echo "| Infrastructure | \`${{ inputs.infrastructure_type }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Build kubevirt-plugin image in-cluster
        id: build
        run: |
          NS="${MANUAL_CONSOLE_NS}"
          export NS
          # BUILD_DIR points at the plugin-src/ checkout above, not the
          # workflow-scripts checkout at $GITHUB_WORKSPACE -- see that
          # checkout step's comment for why these must stay separate.
          BUILD_DIR="${GITHUB_WORKSPACE}/plugin-src"
          export BUILD_DIR
          OUTPUT_FILE="$(mktemp)"
          bash ci-scripts/manual-console/images/setup-plugin-image.sh | tee "${OUTPUT_FILE}"
          IMAGE_REF="$(grep '^IMAGE_REF=' "${OUTPUT_FILE}" | cut -d= -f2-)"
          rm -f "${OUTPUT_FILE}"
          if [[ -z "${IMAGE_REF}" ]]; then
            echo "::error::setup-plugin-image.sh did not output IMAGE_REF="
            exit 1
          fi
          echo "image=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

      - name: Generate manual console password
        id: creds
        run: |
          PASSWORD="$(openssl rand -base64 24)"
          echo "::add-mask::${PASSWORD}"
          echo "password=${PASSWORD}" >> "${GITHUB_OUTPUT}"

      - name: Create short-lived credentials Secret
        id: secret
        env:
          MANUAL_CONSOLE_PASSWORD: ${{ steps.creds.outputs.password }}
        run: |
          SECRET_NAME="manual-console-creds-${{ github.run_id }}"
          oc create secret generic "${SECRET_NAME}" \
            --namespace="${CI_ENV_NS}" \
            --from-literal=password="${MANUAL_CONSOLE_PASSWORD}" \
            --dry-run=client -o yaml | oc apply -f -
          echo "name=${SECRET_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Provision manual console
        id: deploy
        uses: ./.github/actions/manual-console-request
        with:
          plugin-image: ${{ steps.build.outputs.image }}
          test-namespace: ${{ env.MANUAL_CONSOLE_NS }}
          configmap-name: ${{ env.MANUAL_CONSOLE_CM }}
          ci-env-namespace: ${{ env.CI_ENV_NS }}
          htpasswd-user: ${{ env.MANUAL_CONSOLE_USER }}
          htpasswd-secret-name: ${{ steps.secret.outputs.name }}

      - name: Send manual console credentials to Slack
        if: always() && steps.deploy.outcome == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CONSOLE_URL: ${{ steps.deploy.outputs.console-route }}
          MANUAL_CONSOLE_PASSWORD: ${{ steps.creds.outputs.password }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ inputs.branch }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_REPO: ${{ needs.resolve-pr.outputs.head_repo }}
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "::warning::SLACK_WEBHOOK_URL not set — skipping Slack notification"
            exit 0
          fi

          echo "::add-mask::${MANUAL_CONSOLE_PASSWORD}"

          if [[ -n "${PR_NUMBER}" ]]; then
            SOURCE_LINE="*PR:* <https://github.com/${{ github.repository }}/pull/${PR_NUMBER}|#${PR_NUMBER}> (\`${HEAD_REPO}\`)"
          else
            SOURCE_LINE="*Branch:* \`${BRANCH}\`"
          fi

          TEXT=":rocket: *Manual console ready*"
          TEXT+=$'\n'"*Triggered by:* @${ACTOR}"
          TEXT+=$'\n'"*URL:* <${CONSOLE_URL}>"
          TEXT+=$'\n'"*User:* \`${MANUAL_CONSOLE_USER}\`"
          TEXT+=$'\n'"*Password:* \`${MANUAL_CONSOLE_PASSWORD}\`"
          TEXT+=$'\n'"${SOURCE_LINE}"
          TEXT+=$'\n'"*Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"

          PAYLOAD=$(jq -n --arg text "${TEXT}" '{text: $text}')

          curl -sS -X POST -H 'Content-Type: application/json' -d "${PAYLOAD}" "${SLACK_WEBHOOK_URL}"
          echo "Slack notification sent."

      - name: Write final job summary
        if: always()
        env:
          CONSOLE_URL: ${{ steps.deploy.outputs.console-route }}
        run: |
          {
            echo ""
            echo "### Result"
            echo ""
            if [[ -n "${CONSOLE_URL}" ]]; then
              echo "Console URL: ${CONSOLE_URL}"
              echo ""
              echo "Login credentials were sent to Slack (if \`SLACK_WEBHOOK_URL\` is configured)."
            else
              echo ":x: Deploy did not complete successfully — see logs above."
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # Defense-in-depth: ci-env-controller already deletes this Secret once
      # it reads the password during provisioning, but only if it gets that
      # far (e.g. not if cluster discovery or the htpasswd upsert fails
      # first, or the controller pod is unavailable). Without this, a failed
      # or timed-out provisioning run would leave a Secret with a plaintext
      # password behind indefinitely. if: always() guarantees this runs on
      # every exit path, including job failure; --ignore-not-found makes it
      # a no-op on the normal path where the controller already deleted it.
      - name: Clean up credentials Secret
        if: always()
        run: |
          SECRET_NAME="manual-console-creds-${{ github.run_id }}"
          oc delete secret "${SECRET_NAME}" --namespace="${CI_ENV_NS}" --ignore-not-found

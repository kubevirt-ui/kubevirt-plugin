name: Hot Cluster E2E

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, labeled]
  workflow_dispatch:
    inputs:
      test_project:
        description: Playwright project to run (setup runs automatically as dependency)
        required: true
        default: gating
        type: choice
        options:
          - gating
          - features
      cluster_name:
        description: Cluster name
        required: true
        default: kubevirt-plugin-ci
        type: string
      infrastructure_type:
        description: Infrastructure type used for the cluster
        required: true
        default: ipi
        type: choice
        options:
          - ipi
          - vpc
          - classic
      ipi_setup_run_id:
        description: Setup workflow run ID (required for IPI to download install state)
        required: false
        default: ''
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: hot-cluster-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CLUSTER_NAME: ${{ inputs.cluster_name || 'kubevirt-plugin-ci' }}
  INFRASTRUCTURE_TYPE: ${{ inputs.infrastructure_type || 'ipi' }}
  IBM_REGION: eu-de
  IBM_RESOURCE_GROUP: cnv-ui
  BASE_DOMAIN: cnv-ui.com

jobs:
  cluster-health-check:
    name: Cluster Health Check
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ROKS health check (classic/vpc)
      - name: Setup IBM Cloud CLI
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        uses: IBM/actions-ibmcloud-cli@v1
        with:
          api_key: ${{ secrets.IC_KEY }}
          region: ${{ env.IBM_REGION }}
          group: ${{ env.IBM_RESOURCE_GROUP }}
          plugins: kubernetes-service

      - name: Install oc client (ROKS)
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        run: |
          CLUSTER_JSON="$(ibmcloud oc cluster get --cluster "${CLUSTER_NAME}" --output json)"
          export CLUSTER_JSON
          bash ./ci-scripts/install-oc-client.sh

      - name: Configure kubeconfig (ROKS)
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        run: |
          ibmcloud oc cluster config --cluster "${CLUSTER_NAME}" --admin
          oc cluster-info
          oc get nodes -o wide

      # IPI health check
      - name: Download IPI kubeconfig
        if: env.INFRASTRUCTURE_TYPE == 'ipi'
        env:
          GH_TOKEN: ${{ github.token }}
          SETUP_RUN_ID: ${{ inputs.ipi_setup_run_id }}
        run: |
          INSTALL_DIR="${RUNNER_TEMP}/ipi-install"
          mkdir -p "${INSTALL_DIR}"

          if [[ -n "${SETUP_RUN_ID}" ]]; then
            echo "Downloading kubeconfig from setup run ${SETUP_RUN_ID}..."
            gh run download "${SETUP_RUN_ID}" --repo "${{ github.repository }}" \
              --name "ipi-install-state-${SETUP_RUN_ID}" \
              --dir "${INSTALL_DIR}"
          else
            echo "No setup run ID provided. Trying latest setup run artifact..."
            LATEST_RUN=$(gh run list --repo "${{ github.repository }}" \
              --workflow="IBM Cloud Hot Cluster Setup" --status=success --limit=1 \
              --json databaseId -q '.[0].databaseId' 2>/dev/null || true)
            if [[ -n "${LATEST_RUN}" ]]; then
              echo "Using latest successful setup run: ${LATEST_RUN}"
              gh run download "${LATEST_RUN}" --repo "${{ github.repository }}" \
                --name "ipi-install-state-${LATEST_RUN}" \
                --dir "${INSTALL_DIR}"
            else
              echo "::error::No IPI setup run found. Run IBM Cloud Hot Cluster Setup first, then provide the run ID."
              exit 1
            fi
          fi

          if [[ ! -f "${INSTALL_DIR}/auth/kubeconfig" ]]; then
            echo "::error::kubeconfig not found in install state artifact"
            exit 1
          fi

          export KUBECONFIG="${INSTALL_DIR}/auth/kubeconfig"
          echo "KUBECONFIG=${KUBECONFIG}" >> "$GITHUB_ENV"

          curl -sL "https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz" \
            | tar -xz -C /usr/local/bin oc kubectl

          oc cluster-info
          oc get nodes -o wide

      - name: Run health checks
        run: ./ci-scripts/check-cluster-health.sh

      - name: Health check summary
        if: always()
        run: |
          echo "## Cluster Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infrastructure | \`${INFRASTRUCTURE_TYPE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster | \`${CLUSTER_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "All health checks **passed**. Invoking Playwright gating tests on the hot cluster." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Health checks **failed**. E2E workflow was not invoked." >> "$GITHUB_STEP_SUMMARY"
          fi

  run-e2e-tests:
    name: Run E2E Tests
    needs: cluster-health-check
    if: needs.cluster-health-check.result == 'success'
    uses: ./.github/workflows/hot-cluster-e2e-run.yml
    with:
      test_project: ${{ inputs.test_project || 'gating' }}
    secrets: inherit

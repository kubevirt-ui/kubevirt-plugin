# Single source of truth for the hot-cluster pipeline. pull_request_target
# and workflow_dispatch share every job here rather than being split into
# separate files, to avoid duplicating the core job graph (prepare,
# cluster-check, progress updates, run-e2e-tests, verify) -- a shared
# reusable pipeline wouldn't avoid that duplication either, since a
# workflow_dispatch-only job (e.g. the manual health check, folded into
# cluster-check's own result job below) would still render as a
# permanently-skipped row for pull_request_target callers regardless of
# which file defines it. `uses:` composes the reusable pieces that don't
# need trigger-specific job graphs: hot-cluster-check.yml,
# hot-cluster-e2e-run.yml, and the composite actions under
# .github/actions/hot-cluster/ (steps, not jobs).
name: Hot Cluster E2E
run-name: "Hot Cluster E2E [${{ inputs.base_ref || inputs.cluster_name || github.base_ref || 'kubevirt-plugin-ci' }}] @ ${{ inputs.pr_number != '' && format('PR#{0} retest', inputs.pr_number) || github.head_ref || github.ref_name }}${{ (github.event.action == 'labeled' && github.event.label.name != 'ok-to-test') && ' (skipped: irrelevant label)' || '' }}"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      test_project:
        description: Playwright project to run (setup runs automatically as dependency)
        required: true
        default: gating
        type: choice
        options:
          - gating
          - features
      cluster_name:
        description: 'Cluster name (max 21 chars — IBM Cloud IPI limit, longer names get silently truncated)'
        required: true
        default: kubevirt-plugin-ci
        type: string
      infrastructure_type:
        description: Infrastructure type used for the cluster
        required: true
        default: ipi
        type: choice
        options:
          - ipi
          - vpc
          - classic
      runner_label:
        description: ARC runner label (defaults to cluster_name)
        required: false
        default: ''
        type: string
      openshift_version:
        description: 'OpenShift version (e.g. 4.22_openshift)'
        required: false
        default: '4.22_openshift'
        type: string
      test_engine:
        description: |
          E2E test engine to run. 'auto' detects from the base branch --
          see ci-scripts/README.md ("Cluster & Test-Engine Resolution").
          Override explicitly when manually testing a Cypress-era branch.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - playwright
          - cypress
      cnv_channel:
        description: |
          Explicit CNV OLM subscription channel override. Leave empty to
          use the resolver default. See ci-scripts/README.md ("Cluster &
          Test-Engine Resolution") for the channel/pin behavior.
        required: false
        default: ''
        type: string
      pr_number:
        description: |
          PR number to retest merged with the current base branch tip,
          instead of a plain manual run. Used by retest-stale-gating.yml
          to re-validate merge-pool PRs after main advances. Leave empty
          for a normal manual dispatch.
        required: false
        default: ''
        type: string
      base_ref:
        description: |
          PR base branch for cluster/test_engine auto-selection on
          workflow_dispatch (e.g. release-4.20). Forwarded by
          retest-e2e.yml's /retest-e2e fallback. Leave empty otherwise.
        required: false
        default: ''
        type: string
      skip_pool_check:
        description: |
          Skip the lgtm+approved (no hold) merge-pool requirement for a
          pr_number retest. Used by /retest-e2e's fallback dispatch, which
          retests on demand regardless of review state.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

concurrency:
  # Irrelevant label events (lgtm, approved, jira/valid-reference, ...) get
  # their own run-id-unique group so they can't be mistaken for -- or
  # delay -- the real per-PR group's result. inputs.pr_number is checked
  # before the ref+cluster_name fallback so /retest-e2e and
  # retest-stale-gating.yml dispatches (which carry no
  # github.event.pull_request.number) still group by the PR they target.
  group: ${{ (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test') && format('hot-cluster-e2e-{0}', github.event.pull_request.number || inputs.pr_number || format('{0}-{1}', github.ref, inputs.cluster_name || 'kubevirt-plugin-ci')) || format('hot-cluster-e2e-noop-{0}', github.run_id) }}
  cancel-in-progress: true

env:
  INFRASTRUCTURE_TYPE: ${{ inputs.infrastructure_type || 'ipi' }}
  IBM_REGION: eu-de
  IBM_RESOURCE_GROUP: cnv-ui
  BASE_DOMAIN: cnv-ui.com

jobs:
  # Resolves cluster config, hot-cluster CI trust, and (for a pr_number
  # retest) the PR's current context, then posts the first "Hot Cluster
  # E2E Progress" update -- as steps of one job rather than four separate
  # ones, since every top-level job is its own PR merge-box row. See the
  # composite actions under .github/actions/hot-cluster/ for per-step
  # detail. Every step after Checkout carries its own `always()` guard
  # plus continue-on-error so one concern failing can't skip the others.
  prepare:
    name: Prepare
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      statuses: write
      pull-requests: read
    outputs:
      cluster_name: ${{ steps.resolve-config.outputs.cluster-name }}
      openshift_version: ${{ steps.resolve-config.outputs.openshift-version }}
      test_engine: ${{ steps.resolve-config.outputs.test-engine }}
      branch_name: ${{ steps.resolve-config.outputs.branch-name }}
      cnv_channel: ${{ steps.resolve-config.outputs.cnv-channel }}
      cnv_pin_version: ${{ steps.resolve-config.outputs.cnv-pin-version }}
      # Empty unless pull_request_target. Feeds cluster-check's should_run
      # and verify-gating-tests' TRUSTED check below.
      trusted: ${{ steps.check-trust.outputs.trusted }}
      # Empty unless dispatched with pr_number set. Feed run-e2e-tests'
      # guard and verify-gating-tests' retest-result reporting below.
      pr_head_sha: ${{ steps.resolve-pr-context.outputs.head-sha }}
      pr_mergeable: ${{ steps.resolve-pr-context.outputs.mergeable }}
      pr_still_in_pool: ${{ steps.resolve-pr-context.outputs.still-in-pool }}
      pr_trusted: ${{ steps.resolve-pr-context.outputs.trusted }}
      # success/failure/skipped/cancelled outcome of Resolve PR context --
      # lets verify-gating-tests distinguish "ran and failed" from "never ran".
      pr_context_outcome: ${{ steps.resolve-pr-context.outcome }}
      # Single source of truth for every "Hot Cluster E2E Progress" posting
      # in this run -- see resolve-progress-context.
      progress_head_sha: ${{ steps.resolve-progress.outputs.head-sha }}
      progress_status_context: ${{ steps.resolve-progress.outputs.status-context }}
      is_irrelevant_label: ${{ steps.resolve-progress.outputs.is-irrelevant-label }}
    steps:
      # No ref override: pull_request_target checks out the base branch
      # (never the PR's own code), so a PR can't self-approve OWNERS trust.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve cluster config
        id: resolve-config
        if: always()
        continue-on-error: true
        uses: ./.github/actions/hot-cluster/resolve-cluster-config
        with:
          base-ref: ${{ inputs.base_ref || github.base_ref }}
          cluster-name: ${{ inputs.cluster_name }}
          openshift-version: ${{ inputs.openshift_version }}
          test-engine: ${{ inputs.test_engine }}
          cnv-channel: ${{ inputs.cnv_channel }}

      # OWNERS (approvers/reviewers) is the single source of truth for
      # trust, same as Prow's /lgtm and /approve.
      - name: Check trusted author
        id: check-trust
        if: always() && github.event_name == 'pull_request_target'
        continue-on-error: true
        uses: ./.github/actions/hot-cluster/check-trust
        with:
          author: ${{ github.event.pull_request.user.login }}

      # Looked up fresh via the API (not trusted from any caller-supplied
      # SHA) so checkout and the eventual "Run Gating Tests" result always
      # reflect the PR's actual current state. Trust is re-checked here too
      # since this workflow_dispatch path has no pull_request payload for
      # cluster-check's own should_run trust gate to use.
      - name: Resolve PR context
        id: resolve-pr-context
        if: always() && github.event_name == 'workflow_dispatch' && inputs.pr_number != ''
        continue-on-error: true
        uses: ./.github/actions/hot-cluster/resolve-pr-context
        with:
          pr-number: ${{ inputs.pr_number }}
          skip-pool-check: ${{ inputs.skip_pool_check }}

      - name: Resolve progress status context
        id: resolve-progress
        if: always()
        uses: ./.github/actions/hot-cluster/resolve-progress-context
        with:
          resolved-head-sha: ${{ steps.resolve-pr-context.outputs.head-sha }}
          pr-number: ${{ inputs.pr_number }}

      # No posting for the irrelevant-label no-op path -- "Hot Cluster E2E
      # Progress" is a plain commit status, so the last real state (pending
      # or a completed result) simply stands untouched; posting a
      # differently-named entry here would just add a permanent extra row
      # to nearly every PR (bots label PRs almost immediately).
      - name: Post initial progress status (waiting for cluster)
        if: always() && steps.resolve-progress.outputs.is-irrelevant-label != 'true'
        uses: ./.github/actions/hot-cluster/post-progress-status
        with:
          head-sha: ${{ steps.resolve-progress.outputs.head-sha }}
          status-context: ${{ steps.resolve-progress.outputs.status-context }}
          state: pending
          description: Waiting for cluster to be built

      # GitHub shows whichever "Run Gating Tests" check-run reported most
      # recently for this SHA (see ci-scripts/README.md, "Check-Run & Retest
      # Model") -- if an older run already failed for this SHA, that stays
      # the "current" result while this fresh run is still in progress.
      # Superseding it immediately closes that window; verify-gating-tests'
      # own check-run naturally supersedes this one again once it completes.
      # Skipped for a bare ad-hoc dispatch (posts under a different name)
      # and if Resolve PR context failed (its head-sha would be wrong).
      - name: Supersede stale "Run Gating Tests" check for this run
        if: |
          always() &&
          steps.resolve-progress.outputs.is-irrelevant-label != 'true' &&
          steps.resolve-progress.outputs.head-sha != '' &&
          !(github.event_name == 'workflow_dispatch' && inputs.pr_number == '') &&
          steps.resolve-pr-context.outcome != 'failure' &&
          steps.resolve-pr-context.outcome != 'cancelled'
        continue-on-error: true
        uses: ./.github/actions/publish-gating-check
        with:
          head-sha: ${{ steps.resolve-progress.outputs.head-sha }}
          status: in_progress
          title: Hot Cluster E2E is running
          summary: A fresh Hot Cluster E2E run has started for this commit -- see the "Hot Cluster E2E Progress" check for live status.
          details-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # if: always() unconditionally -- a job-level `if:` skip reports a bare
  # `cluster-check` context instead of the nested `cluster-check / probe`
  # etc. this always-run path gives every event, so the check name stays
  # stable regardless of trigger. The actual gating decision lives in
  # should_run instead. run_health_check only applies to workflow_dispatch
  # -- folded into hot-cluster-check.yml's own `result` job (rather than a
  # separate top-level job here) so pull_request_target runs never show a
  # permanently-skipped "Manual Cluster Health Check" row.
  cluster-check:
    needs: [prepare]
    if: always()
    uses: ./.github/workflows/hot-cluster-check.yml
    with:
      cluster_name: ${{ needs.prepare.outputs.cluster_name }}
      infrastructure_type: ${{ inputs.infrastructure_type || 'ipi' }}
      openshift_version: ${{ needs.prepare.outputs.openshift_version }}
      cnv_channel: ${{ needs.prepare.outputs.cnv_channel }}
      cnv_pin_version: ${{ needs.prepare.outputs.cnv_pin_version }}
      branch_name: ${{ needs.prepare.outputs.branch_name || github.ref_name }}
      should_run: ${{ (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test') && (github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository || needs.prepare.outputs.trusted == 'true' || (github.event.action == 'labeled' && github.event.label.name == 'ok-to-test')) }}
      run_health_check: ${{ github.event_name == 'workflow_dispatch' }}
      # ibm_region/ibm_resource_group/base_domain aren't passed explicitly --
      # the `env` context isn't available in a `uses:` job's `with:` block,
      # so this relies on hot-cluster-check.yml's own input defaults
      # matching the env block above (same pattern base_domain already used).
    secrets: inherit

  # Advances progress to its second phase once the cluster is confirmed
  # ready, or completes it as a failure if it never became ready.
  progress-check-running-tests:
    name: Update Progress Check
    needs: [prepare, cluster-check]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      statuses: write
    outputs:
      # Threaded into run-e2e-tests below (and from there into
      # hot-cluster-e2e-run.yml) for its own "Running gating tests" update.
      head-sha: ${{ steps.post-status.outputs.head-sha }}
      status-context: ${{ steps.post-status.outputs.status-context }}
    steps:
      - name: Post progress status
        id: post-status
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          HEAD_SHA: ${{ needs.prepare.outputs.progress_head_sha }}
          STATUS_CONTEXT: ${{ needs.prepare.outputs.progress_status_context }}
          IS_IRRELEVANT_LABEL: ${{ needs.prepare.outputs.is_irrelevant_label }}
        with:
          script: |
            if (process.env.IS_IRRELEVANT_LABEL === 'true') {
              core.info('Irrelevant label event — progress status already completed as a no-op.');
              return;
            }

            const headSha = process.env.HEAD_SHA;
            const statusContext = process.env.STATUS_CONTEXT;

            // The manual health check only runs for workflow_dispatch (folded
            // into cluster-check's own `result` job), so a failed health check
            // fails that job overall -- checking both the output and the
            // job's own result catches that in addition to a plain
            // not-ready cluster.
            const clusterReady = context.eventName === 'workflow_dispatch'
              ? '${{ needs.cluster-check.outputs.cluster_ready }}' === 'true' && '${{ needs.cluster-check.result }}' === 'success'
              : '${{ needs.cluster-check.outputs.cluster_ready }}' === 'true';

            if (clusterReady) {
              core.setOutput('head-sha', headSha);
              core.setOutput('status-context', statusContext);
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: headSha,
              context: statusContext,
              state: clusterReady ? 'pending' : 'failure',
              description: clusterReady
                ? 'Building plugin image'
                : 'Cluster not ready -- gating tests not run',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  run-e2e-tests:
    name: Run E2E Tests
    needs: [prepare, cluster-check, progress-check-running-tests]
    # Job-level permissions OVERRIDE the workflow-level defaults, so this
    # keeps contents/actions plus the new statuses: write (needed by
    # hot-cluster-e2e-run.yml's own progress update).
    permissions:
      contents: read
      actions: write
      statuses: write
    # mergeable/still_in_pool/trusted only ever block the pr_number retest
    # path (prepare's Resolve PR Context step is empty, not 'false', for
    # every other trigger). pr_context_outcome guards against that step
    # itself erroring/cancelling rather than cleanly resolving to false.
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && needs.cluster-check.result == 'success' && needs.cluster-check.outputs.cluster_ready == 'true') ||
        (github.event_name != 'workflow_dispatch' && needs.cluster-check.outputs.cluster_ready == 'true')
      ) &&
      needs.prepare.outputs.pr_context_outcome != 'failure' &&
      needs.prepare.outputs.pr_context_outcome != 'cancelled' &&
      needs.prepare.outputs.pr_mergeable != 'false' &&
      needs.prepare.outputs.pr_still_in_pool != 'false' &&
      needs.prepare.outputs.pr_trusted != 'false'
    uses: ./.github/workflows/hot-cluster-e2e-run.yml
    with:
      test_project: ${{ inputs.test_project || 'gating' }}
      test_engine: ${{ needs.prepare.outputs.test_engine }}
      runner_label: ${{ inputs.runner_label || needs.prepare.outputs.cluster_name }}
      cluster_name: ${{ needs.prepare.outputs.cluster_name }}
      cnv_pin_version: ${{ needs.prepare.outputs.cnv_pin_version }}
      # Priority: pr_number retest merges with the current base tip;
      # base_ref alone (release-branch dispatch) builds/tests that branch;
      # otherwise empty, falling through to the PR head / github.ref default.
      checkout_ref: ${{ inputs.pr_number != '' && format('refs/pull/{0}/merge', inputs.pr_number) || inputs.base_ref || '' }}
      is_reusable_call: true
      progress_status_sha: ${{ needs.progress-check-running-tests.outputs.head-sha }}
      progress_status_context: ${{ needs.progress-check-running-tests.outputs.status-context }}
    secrets: inherit

  # Single source of truth for the gating-test outcome. if: excludes the
  # irrelevant-label no-op path entirely (rather than just naming around
  # it) so it collapses into the merge box's unobtrusive "N skipped" bucket
  # instead of persisting as a distinctly-named, confusing "successful"
  # row -- see retest-e2e.yml's run-name-based no-op detection, which
  # replaces the old job-name-substring contract this used to require.
  #
  # This job's own native check-run is informational only (name below is
  # deliberately never the literal "Run Gating Tests" string) -- the actual
  # required branch-protection check is published explicitly below via
  # publish-gating-check, which persists correctly across re-triggers
  # regardless of what any single run's job names are.
  verify-gating-tests:
    name: ${{ (github.event_name == 'workflow_dispatch' && inputs.pr_number == '') && 'Verify Gating Tests (manual dispatch)' || 'Verify Gating Tests' }}
    needs: [prepare, cluster-check, run-e2e-tests, progress-check-running-tests]
    if: always() && !(github.event.action == 'labeled' && github.event.label.name != 'ok-to-test')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      statuses: write
      checks: write
      issues: write
    steps:
      - name: Verify hot cluster E2E ran and passed
        id: verify
        env:
          TRUSTED: ${{ needs.prepare.outputs.trusted }}
          E2E_RESULT: ${{ needs.run-e2e-tests.result }}
          RESOLVE_PR_CONTEXT_RESULT: ${{ needs.prepare.outputs.pr_context_outcome }}
          IS_RETEST: ${{ inputs.pr_number != '' }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MERGEABLE: ${{ needs.prepare.outputs.pr_mergeable }}
          STILL_IN_POOL: ${{ needs.prepare.outputs.pr_still_in_pool }}
          RETEST_TRUSTED: ${{ needs.prepare.outputs.pr_trusted }}
        run: |
          if [[ "${IS_RETEST}" == "true" && ( "${RESOLVE_PR_CONTEXT_RESULT}" == "failure" || "${RESOLVE_PR_CONTEXT_RESULT}" == "cancelled" ) ]]; then
            echo "::error::Could not resolve PR #${PR_NUMBER}'s context (head SHA / labels / mergeability) -- prepare's Resolve PR Context step ended in '${RESOLVE_PR_CONTEXT_RESULT}'. See the 'Prepare' job for details."
            echo "reason=resolve-context-failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "run-e2e-tests result: ${E2E_RESULT}"

          if [[ "${E2E_RESULT}" == "success" ]]; then
            echo "Hot cluster gating tests passed."
            echo "reason=passed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${IS_RETEST}" == "true" && "${MERGEABLE}" == "false" ]]; then
            echo "::error::PR #${PR_NUMBER} no longer merges cleanly with the current base branch tip -- resolve the conflict and push an update (this will trigger a normal gating run)."
            echo "reason=merge-conflict" >> "$GITHUB_OUTPUT"
          elif [[ "${IS_RETEST}" == "true" && "${STILL_IN_POOL}" == "false" ]]; then
            echo "::error::PR #${PR_NUMBER} no longer carries the lgtm+approved (no hold) labels required for the merge pool, re-checked fresh at run time -- skipping the retest."
            echo "reason=left-pool" >> "$GITHUB_OUTPUT"
          elif [[ "${IS_RETEST}" == "true" && "${RETEST_TRUSTED}" == "false" ]]; then
            echo "::error::PR #${PR_NUMBER} is not from OWNERS, not from a same-repo branch, and does not currently carry the 'ok-to-test' label -- skipping the retest (re-checked fresh at run time)."
            echo "reason=untrusted-retest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "pull_request_target" && "${TRUSTED}" != "true" ]]; then
            echo "::error::Hot cluster E2E has not run for this PR because the author is not listed in OWNERS. A maintainer must add the 'ok-to-test' label to trigger it (it is removed again on each new push)."
            echo "reason=untrusted" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Hot cluster gating tests did not pass (run-e2e-tests result: '${E2E_RESULT}'). See the 'Run E2E Tests' job for details, or use /retest-e2e once fixed."
            echo "reason=test-failed" >> "$GITHUB_OUTPUT"
          fi
          exit 1

      - name: Complete progress status
        if: always()
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          HEAD_SHA: ${{ needs.prepare.outputs.progress_head_sha }}
          STATUS_CONTEXT: ${{ needs.prepare.outputs.progress_status_context }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const passed = process.env.JOB_STATUS === 'success';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.HEAD_SHA,
              context: process.env.STATUS_CONTEXT,
              state: passed ? 'success' : 'failure',
              description: passed
                ? 'Hot cluster gating tests passed'
                : 'Hot cluster gating tests did not pass',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      # Maps verify's `reason` output to a PR-facing title/summary so a
      # retest failure explains why (merge conflict, left pool, etc.).
      - name: Determine retest result details
        id: result-details
        if: always() && inputs.pr_number != '' && needs.prepare.outputs.pr_head_sha != ''
        env:
          REASON: ${{ steps.verify.outputs.reason }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MAIN_SHA: ${{ github.sha }}
        run: |
          case "${REASON}" in
            passed)
              echo "conclusion=success" >> "$GITHUB_OUTPUT"
              echo "title=Hot Cluster E2E: gating tests passed (retest after main advanced)" >> "$GITHUB_OUTPUT"
              echo "summary=Re-validated PR #${PR_NUMBER} merged with the current main tip (${MAIN_SHA}) after main advanced." >> "$GITHUB_OUTPUT"
              ;;
            merge-conflict)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              echo "title=Hot Cluster E2E: PR no longer merges cleanly with main (retest after main advanced)" >> "$GITHUB_OUTPUT"
              echo "summary=PR #${PR_NUMBER} no longer merges cleanly with the current main tip (${MAIN_SHA}) -- resolve the conflict and push an update, which will trigger a normal gating run." >> "$GITHUB_OUTPUT"
              ;;
            left-pool)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              echo "title=Hot Cluster E2E: no longer in the merge pool (retest after main advanced)" >> "$GITHUB_OUTPUT"
              echo "summary=PR #${PR_NUMBER} no longer carries the lgtm+approved (no hold) labels required for the merge pool, re-checked fresh when this retest ran against main tip ${MAIN_SHA} -- the cluster run was skipped." >> "$GITHUB_OUTPUT"
              ;;
            untrusted-retest)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              echo "title=Hot Cluster E2E: not CI-trusted for a retest (retest after main advanced)" >> "$GITHUB_OUTPUT"
              echo "summary=PR #${PR_NUMBER} is not from OWNERS, not from a same-repo branch, and does not currently carry 'ok-to-test' (re-checked fresh when this retest ran against main tip ${MAIN_SHA}) -- the cluster run was skipped. A maintainer can add 'ok-to-test' to allow it." >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              echo "title=Hot Cluster E2E: gating tests did not pass (retest after main advanced)" >> "$GITHUB_OUTPUT"
              echo "summary=Re-validated PR #${PR_NUMBER} merged with the current main tip (${MAIN_SHA}) after main advanced -- tests did not pass. See the workflow run for details." >> "$GITHUB_OUTPUT"
              ;;
          esac

      # The pr_number retest path has no pull_request payload, so GitHub
      # can't auto-associate this job's own check-run with the PR being
      # retested -- publish it manually onto the PR's real head SHA.
      - name: Checkout
        if: always() && inputs.pr_number != '' && needs.prepare.outputs.pr_head_sha != ''
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Publish result for retested PR
        if: always() && inputs.pr_number != '' && needs.prepare.outputs.pr_head_sha != ''
        continue-on-error: true
        uses: ./.github/actions/publish-gating-check
        with:
          head-sha: ${{ needs.prepare.outputs.pr_head_sha }}
          status: completed
          conclusion: ${{ steps.result-details.outputs.conclusion }}
          title: ${{ steps.result-details.outputs.title }}
          summary: ${{ steps.result-details.outputs.summary }}
          details-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # The literal "Run Gating Tests" required check, for the normal PR
      # trigger path -- published explicitly rather than relying on this
      # job's own native check-run (see the header comment above).
      # github.event.pull_request.head.sha (not github.sha, which is the
      # base branch tip under pull_request_target) is the PR's real commit.
      - name: Publish result for PR
        if: always() && github.event_name == 'pull_request_target'
        continue-on-error: true
        uses: ./.github/actions/publish-gating-check
        with:
          head-sha: ${{ github.event.pull_request.head.sha }}
          status: completed
          conclusion: ${{ job.status == 'success' && 'success' || 'failure' }}
          title: "${{ job.status == 'success' && 'Hot Cluster E2E: gating tests passed' || 'Hot Cluster E2E: gating tests did not pass' }}"
          summary: >-
            ${{ job.status == 'success' && 'Hot cluster gating tests passed for this PR at this commit.' ||
              format('Hot cluster gating tests did not pass (reason: `{0}`). See the Run E2E Tests job for details, or comment /retest-e2e once fixed.', steps.verify.outputs.reason) }}
          details-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Resolve PR Context erroring/cancelling (not just resolving to
      # false) leaves no head SHA to publish against -- a PR comment is
      # the only channel still available for that case.
      - name: Report unresolvable PR context on the PR
        if: |
          always() && inputs.pr_number != '' && (
            needs.prepare.outputs.pr_context_outcome == 'failure' ||
            needs.prepare.outputs.pr_context_outcome == 'cancelled'
          )
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: [
                '⚠️ The automatic retest triggered after `main` advanced could not resolve this PR\'s context ' +
                  '(head SHA / labels / mergeability) and did not run.',
                '',
                'The existing "Run Gating Tests" result may be stale -- please comment `/retest-e2e` for a fresh result before merging.',
                '',
                `See the failed run for details: ${runUrl}`,
              ].join('\n'),
            });

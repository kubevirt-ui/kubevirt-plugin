name: Hot Cluster E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_project:
        description: Playwright project to run (setup runs automatically as dependency)
        required: true
        default: gating
        type: choice
        options:
          - gating
          - features
      cluster_name:
        description: IBM Cloud cluster name
        required: true
        default: kubevirt-plugin-ci
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: hot-cluster-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CLUSTER_NAME: ${{ inputs.cluster_name || 'kubevirt-plugin-ci' }}

jobs:
  # Fork PRs do not receive org secrets (IC_KEY). Same-repo PRs and workflow_dispatch can log in.
  fork-pr-notice:
    name: Fork PR — secrets unavailable
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Explain why Hot Cluster E2E cannot run
        run: |
          echo "::error::Hot Cluster E2E needs the IC_KEY secret, which GitHub does not pass to pull_request workflows from forks."
          echo "Push your branch to kubevirt-ui/kubevirt-plugin and open a same-repo PR, or run this workflow manually (workflow_dispatch) from an upstream branch."
          exit 1

  cluster-health-check:
    name: Cluster Health Check
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup IBM Cloud CLI
        uses: IBM/actions-ibmcloud-cli@v1
        with:
          api_key: ${{ secrets.IC_KEY }}
          region: eu-de
          group: cnv-ui
          plugins: kubernetes-service

      - name: Install oc client
        run: |
          CLUSTER_JSON="$(ibmcloud oc cluster get --cluster "${CLUSTER_NAME}" --output json)"
          export CLUSTER_JSON
          bash ./ci-scripts/install-oc-client.sh

      - name: Configure kubeconfig
        run: |
          ibmcloud oc cluster config --cluster "${CLUSTER_NAME}" --admin
          oc cluster-info
          oc get nodes -o wide

      - name: Run health checks
        run: ./ci-scripts/check-cluster-health.sh

      - name: Health check summary
        if: always()
        run: |
          echo "## Cluster Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "All health checks **passed**. Invoking Playwright gating tests on the hot cluster." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Health checks **failed**. E2E workflow was not invoked." >> "$GITHUB_STEP_SUMMARY"
          fi

  run-e2e-tests:
    name: Run E2E Tests
    needs: cluster-health-check
    if: needs.cluster-health-check.result == 'success'
    uses: ./.github/workflows/hot-cluster-e2e-run.yml
    with:
      test_project: ${{ inputs.test_project || 'gating' }}
    secrets: inherit

name: Hot Cluster E2E
run-name: "Hot Cluster E2E [${{ inputs.cluster_name || github.head_ref || github.base_ref || 'kubevirt-plugin-ci' }}]"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      test_project:
        description: Playwright project to run (setup runs automatically as dependency)
        required: true
        default: gating
        type: choice
        options:
          - gating
          - features
      cluster_name:
        description: 'Cluster name (max 21 chars — IBM Cloud IPI limit, longer names get silently truncated)'
        required: true
        default: kubevirt-plugin-ci
        type: string
      infrastructure_type:
        description: Infrastructure type used for the cluster
        required: true
        default: ipi
        type: choice
        options:
          - ipi
          - vpc
          - classic
      runner_label:
        description: ARC runner label (defaults to cluster_name)
        required: false
        default: ''
        type: string
      openshift_version:
        description: 'OpenShift version (e.g. 4.22_openshift)'
        required: false
        default: '4.22_openshift'
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  # Irrelevant label events (lgtm, approved, jira/valid-reference, ...) get
  # their own run-id-unique group instead of sharing the real per-PR group.
  # Sharing the group with cancel-in-progress: false (an earlier attempt at
  # this) queues them behind a real in-progress run instead of cancelling
  # it — which is an improvement, but means the queued run only evaluates
  # (and skips) its jobs *after* the real run finishes, so its "skipped"
  # Run Gating Tests can complete with a later timestamp than the real
  # run's genuine success/failure, making GitHub treat the harmless skip as
  # the latest, authoritative result. A fully isolated group avoids this
  # entirely: the irrelevant-label run never shares a queue slot with the
  # real one, so it always executes (and skips) immediately.
  group: ${{ (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test') && format('hot-cluster-e2e-{0}', github.event.pull_request.number || format('{0}-{1}', github.ref, inputs.cluster_name || 'kubevirt-plugin-ci')) || format('hot-cluster-e2e-noop-{0}', github.run_id) }}
  cancel-in-progress: true

env:
  INFRASTRUCTURE_TYPE: ${{ inputs.infrastructure_type || 'ipi' }}
  IBM_REGION: eu-de
  IBM_RESOURCE_GROUP: cnv-ui
  BASE_DOMAIN: cnv-ui.com

jobs:
  # Resolves cluster_name/openshift_version for this run. workflow_dispatch
  # always uses its own inputs unchanged. Automatic pull_request_target runs
  # against a release-4.X branch get a dedicated, version-matched cluster
  # (kubevirt-plugin-<major><minor>) instead of silently colliding with
  # main's kubevirt-plugin-ci cluster; any other base branch falls back to
  # the same default as today.
  resolve-cluster-config:
    name: Resolve Cluster Config
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      cluster_name: ${{ steps.resolve.outputs.cluster_name }}
      openshift_version: ${{ steps.resolve.outputs.openshift_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve cluster_name/openshift_version for this branch
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          INPUT_CLUSTER_NAME: ${{ inputs.cluster_name }}
          INPUT_OPENSHIFT_VERSION: ${{ inputs.openshift_version }}
        run: ./ci-scripts/hot-cluster/resolve-cluster-config.sh >> "$GITHUB_OUTPUT"

  check-trust:
    name: Check Trusted Author
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      # No ref override: for pull_request_target this checks out the base branch,
      # so a PR can't add itself to OWNERS to self-approve trust.
      - name: Checkout
        uses: actions/checkout@v7

      # OWNERS (approvers/reviewers) is the single source of truth for trust —
      # the same source Prow uses for /lgtm, /approve. author_association and
      # org membership are unreliable proxies (misreport private membership,
      # need extra token scope), so we don't use them here.
      #
      # No elevated token needed: this script only reads the local OWNERS
      # file, it never calls the GitHub API, so the default GITHUB_TOKEN is
      # sufficient (a bot/app token would be unused dead weight here).
      - name: Determine if PR author is a trusted repo owner
        id: check
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const author = context.payload.pull_request.user.login;

            let trusted = false;
            try {
              const owners = fs.readFileSync('OWNERS', 'utf8');
              trusted = new RegExp(`^\\s*-\\s*${author}\\s*$`, 'm').test(owners);
            } catch (err) {
              core.warning(`Could not read OWNERS file: ${err.message}`);
            }

            core.info(`${author} is ${trusted ? '' : 'not '}listed in OWNERS (approvers/reviewers) — ${trusted ? 'trusted' : 'untrusted'}.`);
            core.setOutput('trusted', trusted ? 'true' : 'false');

  cluster-check:
    needs: [check-trust, resolve-cluster-config]
    if: |
      always() &&
      (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test') &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.head.repo.full_name == github.repository ||
        needs.check-trust.outputs.trusted == 'true' ||
        (github.event.action == 'labeled' && github.event.label.name == 'ok-to-test')
      )
    uses: ./.github/workflows/hot-cluster-check.yml
    with:
      cluster_name: ${{ needs.resolve-cluster-config.outputs.cluster_name }}
      infrastructure_type: ${{ inputs.infrastructure_type || 'ipi' }}
      openshift_version: ${{ needs.resolve-cluster-config.outputs.openshift_version }}
    secrets: inherit

  cluster-health-check:
    name: Manual Cluster Health Check
    needs: [cluster-check, resolve-cluster-config]
    if: github.event_name == 'workflow_dispatch' && needs.cluster-check.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLUSTER_NAME: ${{ needs.resolve-cluster-config.outputs.cluster_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # ROKS health check (classic/vpc)
      - name: Setup IBM Cloud CLI
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        uses: IBM/actions-ibmcloud-cli@v2
        with:
          api_key: ${{ secrets.IC_KEY }}
          region: ${{ env.IBM_REGION }}
          group: ${{ env.IBM_RESOURCE_GROUP }}
          plugins: kubernetes-service

      - name: Install oc client (ROKS)
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        run: |
          CLUSTER_JSON="$(ibmcloud oc cluster get --cluster "${CLUSTER_NAME}" --output json)"
          export CLUSTER_JSON
          bash ./ci-scripts/hot-cluster/install-oc-client.sh

      - name: Configure kubeconfig (ROKS)
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        run: |
          ibmcloud oc cluster config --cluster "${CLUSTER_NAME}" --admin
          oc cluster-info
          oc get nodes -o wide

      # IPI health check (kubeconfig not available from artifacts for security)
      - name: IPI cluster health check (DNS probe)
        if: env.INFRASTRUCTURE_TYPE == 'ipi'
        run: |
          API_HOST="api.${CLUSTER_NAME}.${BASE_DOMAIN}"
          echo "Probing IPI cluster via DNS: ${API_HOST}..."

          if dig +short "${API_HOST}" 2>/dev/null | grep -q .; then
            echo "API DNS resolves — cluster is alive"
            API_IP=$(dig +short "${API_HOST}" 2>/dev/null | head -1)
            echo "  ${API_HOST} -> ${API_IP}"
          else
            echo "::error::API DNS does not resolve for ${API_HOST}. Cluster may not exist."
            exit 1
          fi

          echo "Checking API reachability (HTTPS)..."
          if curl -sk --connect-timeout 10 "https://${API_HOST}:6443/healthz" 2>/dev/null | grep -q ok; then
            echo "API server is healthy"
          else
            echo "::warning::API server did not respond to /healthz — cluster may be initializing"
          fi

      - name: Health check summary
        if: always()
        run: |
          echo "## Manual Cluster Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infrastructure | \`${INFRASTRUCTURE_TYPE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster | \`${CLUSTER_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "All health checks **passed**. Invoking Playwright gating tests on the hot cluster." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Health checks **failed**. E2E workflow was not invoked." >> "$GITHUB_STEP_SUMMARY"
          fi

  run-e2e-tests:
    name: Run E2E Tests
    needs: [cluster-check, cluster-health-check, resolve-cluster-config]
    if: |
      always() && (
        needs.cluster-check.result == 'success' ||
        needs.cluster-health-check.result == 'success'
      )
    uses: ./.github/workflows/hot-cluster-e2e-run.yml
    with:
      test_project: ${{ inputs.test_project || 'gating' }}
      runner_label: ${{ inputs.runner_label || needs.resolve-cluster-config.outputs.cluster_name }}
      cluster_name: ${{ needs.resolve-cluster-config.outputs.cluster_name }}
    secrets: inherit

  # Single source of truth for the "Run Gating Tests" required status check.
  # A top-level job (unlike run-e2e-tests, which is a `uses:` reusable-workflow
  # call) posts its check-run under its own bare name — no composite prefix —
  # so this is the job branch protection can actually match. if: always()
  # guarantees it reports a real success/failure for every meaningful push,
  # even when upstream jobs are skipped (e.g. untrusted author, no ok-to-test
  # label), so Tide can never merge on a silently-vanished check again.
  #
  # IMPORTANT: an `if:` guard alone does NOT stop this job from posting a
  # check-run under its `name` — GitHub still reports skipped jobs as
  # `<name>: skipped` for the commit SHA. Two separate workflow runs (the
  # real one, and a noop run from an irrelevant label like jira/valid-
  # reference) both create a "Run Gating Tests" check-run for the same SHA;
  # GitHub's merge box always shows whichever reported most recently,
  # regardless of Actions concurrency grouping (that only prevents execution
  # contention, not duplicate check-run names). Since the noop run finishes
  # in seconds while the real run takes 15-20+ minutes, its "skipped" result
  # is misleadingly the only thing visible for most of the real run's
  # lifetime. The conditional `name:` below fixes this at the source: only
  # the relevant-event path ever reports under the literal "Run Gating
  # Tests" context that branch protection/Tide requires, so an irrelevant
  # label event doesn't touch that check at all (leaving it correctly
  # `expected`/pending until the real run reports).
  verify-gating-tests:
    name: ${{ (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test') && 'Run Gating Tests' || 'Run Gating Tests (skipped - irrelevant label event)' }}
    needs: [check-trust, cluster-check, cluster-health-check, run-e2e-tests]
    if: |
      always() &&
      (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify hot cluster E2E ran and passed
        env:
          TRUSTED: ${{ needs.check-trust.outputs.trusted }}
          E2E_RESULT: ${{ needs.run-e2e-tests.result }}
        run: |
          echo "run-e2e-tests result: ${E2E_RESULT}"

          if [[ "${E2E_RESULT}" == "success" ]]; then
            echo "Hot cluster gating tests passed."
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request_target" && "${TRUSTED}" != "true" ]]; then
            echo "::error::Hot cluster E2E has not run for this PR because the author is not listed in OWNERS. A maintainer must add the 'ok-to-test' label to trigger it (it is removed again on each new push)."
          else
            echo "::error::Hot cluster gating tests did not pass (run-e2e-tests result: '${E2E_RESULT}'). See the 'Run E2E Tests' job for details, or use /retest-e2e once fixed."
          fi
          exit 1

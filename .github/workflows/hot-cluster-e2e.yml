name: Hot Cluster E2E
run-name: "Hot Cluster E2E [${{ inputs.cluster_name || 'kubevirt-plugin-ci' }}]"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      test_project:
        description: Playwright project to run (setup runs automatically as dependency)
        required: true
        default: gating
        type: choice
        options:
          - gating
          - features
      cluster_name:
        description: Cluster name
        required: true
        default: kubevirt-plugin-ci
        type: string
      infrastructure_type:
        description: Infrastructure type used for the cluster
        required: true
        default: ipi
        type: choice
        options:
          - ipi
          - vpc
          - classic
      runner_label:
        description: ARC runner label (defaults to cluster_name)
        required: false
        default: ''
        type: string
      openshift_version:
        description: 'OpenShift version (e.g. 4.22_openshift)'
        required: false
        default: '4.22_openshift'
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: hot-cluster-e2e-${{ github.event.pull_request.number || format('{0}-{1}', github.ref, inputs.cluster_name || 'kubevirt-plugin-ci') }}
  cancel-in-progress: true

env:
  CLUSTER_NAME: ${{ inputs.cluster_name || 'kubevirt-plugin-ci' }}
  INFRASTRUCTURE_TYPE: ${{ inputs.infrastructure_type || 'ipi' }}
  IBM_REGION: eu-de
  IBM_RESOURCE_GROUP: cnv-ui
  BASE_DOMAIN: cnv-ui.com

jobs:
  check-trust:
    name: Check Trusted Author
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      # author_association only reflects PUBLICLY visible org membership. Members
      # with private membership (Settings > Organizations > "Publicize") are
      # misreported as CONTRIBUTOR, so fall back to an explicit org membership
      # check via the API before requiring the 'ok-to-test' label.
      - name: Determine if PR author is a trusted org member
        id: check
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.BOT_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const association = context.payload.pull_request.author_association;
            const trustedAssociations = ['MEMBER', 'OWNER', 'COLLABORATOR'];
            const author = context.payload.pull_request.user.login;

            if (trustedAssociations.includes(association)) {
              core.info(`${author} has author_association=${association} — trusted.`);
              core.setOutput('trusted', 'true');
              return;
            }

            try {
              await github.rest.orgs.checkMembershipForUser({
                org: context.repo.owner,
                username: author,
              });
              core.info(`${author} is a member of ${context.repo.owner} (author_association was '${association}', likely private membership) — trusted.`);
              core.setOutput('trusted', 'true');
            } catch (err) {
              core.info(`${author} is not a member of ${context.repo.owner} (author_association='${association}') — untrusted.`);
              core.setOutput('trusted', 'false');
            }

  cluster-check:
    needs: check-trust
    if: |
      always() &&
      (github.event.action != 'labeled' || github.event.label.name == 'ok-to-test') &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.head.repo.full_name == github.repository ||
        needs.check-trust.outputs.trusted == 'true' ||
        (github.event.action == 'labeled' && github.event.label.name == 'ok-to-test')
      )
    uses: ./.github/workflows/hot-cluster-check.yml
    with:
      cluster_name: ${{ inputs.cluster_name || 'kubevirt-plugin-ci' }}
      infrastructure_type: ${{ inputs.infrastructure_type || 'ipi' }}
      openshift_version: ${{ inputs.openshift_version || '4.22_openshift' }}
    secrets: inherit

  cluster-health-check:
    name: Cluster Health Check
    needs: cluster-check
    if: github.event_name == 'workflow_dispatch' && needs.cluster-check.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # ROKS health check (classic/vpc)
      - name: Setup IBM Cloud CLI
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        uses: IBM/actions-ibmcloud-cli@v2
        with:
          api_key: ${{ secrets.IC_KEY }}
          region: ${{ env.IBM_REGION }}
          group: ${{ env.IBM_RESOURCE_GROUP }}
          plugins: kubernetes-service

      - name: Install oc client (ROKS)
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        run: |
          CLUSTER_JSON="$(ibmcloud oc cluster get --cluster "${CLUSTER_NAME}" --output json)"
          export CLUSTER_JSON
          bash ./ci-scripts/hot-cluster/install-oc-client.sh

      - name: Configure kubeconfig (ROKS)
        if: env.INFRASTRUCTURE_TYPE != 'ipi'
        run: |
          ibmcloud oc cluster config --cluster "${CLUSTER_NAME}" --admin
          oc cluster-info
          oc get nodes -o wide

      # IPI health check (kubeconfig not available from artifacts for security)
      - name: IPI cluster health check (DNS probe)
        if: env.INFRASTRUCTURE_TYPE == 'ipi'
        run: |
          API_HOST="api.${CLUSTER_NAME}.${BASE_DOMAIN}"
          echo "Probing IPI cluster via DNS: ${API_HOST}..."

          if dig +short "${API_HOST}" 2>/dev/null | grep -q .; then
            echo "API DNS resolves — cluster is alive"
            API_IP=$(dig +short "${API_HOST}" 2>/dev/null | head -1)
            echo "  ${API_HOST} -> ${API_IP}"
          else
            echo "::error::API DNS does not resolve for ${API_HOST}. Cluster may not exist."
            exit 1
          fi

          echo "Checking API reachability (HTTPS)..."
          if curl -sk --connect-timeout 10 "https://${API_HOST}:6443/healthz" 2>/dev/null | grep -q ok; then
            echo "API server is healthy"
          else
            echo "::warning::API server did not respond to /healthz — cluster may be initializing"
          fi

      - name: Health check summary
        if: always()
        run: |
          echo "## Cluster Health Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Infrastructure | \`${INFRASTRUCTURE_TYPE}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster | \`${CLUSTER_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "All health checks **passed**. Invoking Playwright gating tests on the hot cluster." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Health checks **failed**. E2E workflow was not invoked." >> "$GITHUB_STEP_SUMMARY"
          fi

  run-e2e-tests:
    name: Run E2E Tests
    needs: [cluster-check, cluster-health-check]
    if: |
      always() && (
        needs.cluster-check.result == 'success' ||
        needs.cluster-health-check.result == 'success'
      )
    uses: ./.github/workflows/hot-cluster-e2e-run.yml
    with:
      test_project: ${{ inputs.test_project || 'gating' }}
      runner_label: ${{ inputs.runner_label || inputs.cluster_name || 'kubevirt-plugin-ci' }}
      cluster_name: ${{ inputs.cluster_name || 'kubevirt-plugin-ci' }}
    secrets: inherit

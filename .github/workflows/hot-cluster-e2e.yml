# Single source of truth for the hot-cluster pipeline. workflow_dispatch is its
# only trigger (ad-hoc, or via a gate/retest dispatcher), so its job graph
# never lands natively on a PR. Composes hot-cluster-check.yml,
# hot-cluster-e2e-run.yml, and .github/actions/hot-cluster/ via `uses:`.
name: Hot Cluster E2E
run-name: "Hot Cluster E2E [${{ inputs.base_ref || inputs.cluster_name || github.base_ref || 'kubevirt-plugin-ci' }}] @ ${{ inputs.pr_number != '' && format('PR#{0} retest', inputs.pr_number) || github.head_ref || github.ref_name }}"

# No PR events trigger this directly -- ok-to-test-gate.yml and
# hot-cluster-e2e-pr-gate.yml dispatch it via workflow_dispatch instead.
on:
  workflow_dispatch:
    inputs:
      test_project:
        description: Playwright project to run (setup runs automatically as dependency)
        required: true
        default: gating
        type: choice
        options:
          - gating
          - features
      cluster_name:
        description: 'Cluster name (max 21 chars — IBM Cloud IPI limit, longer names get silently truncated)'
        required: true
        default: kubevirt-plugin-ci
        type: string
      infrastructure_type:
        description: Infrastructure type used for the cluster
        required: true
        default: ipi
        type: choice
        options:
          - ipi
          - vpc
          - classic
      runner_label:
        description: ARC runner label (defaults to cluster_name)
        required: false
        default: ''
        type: string
      openshift_version:
        description: 'OpenShift version (e.g. 4.22_openshift)'
        required: false
        default: '4.22_openshift'
        type: string
      test_engine:
        description: |
          E2E test engine to run. 'auto' detects from the base branch --
          see ci-scripts/README.md ("Cluster & Test-Engine Resolution").
          Override explicitly when manually testing a Cypress-era branch.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - playwright
          - cypress
      cnv_channel:
        description: |
          Explicit CNV OLM subscription channel override. Leave empty to
          use the resolver default. See ci-scripts/README.md ("Cluster &
          Test-Engine Resolution") for the channel/pin behavior.
        required: false
        default: ''
        type: string
      pr_number:
        description: |
          PR number to retest merged with the current base branch tip,
          instead of a plain manual run. Used by retest-stale-gating.yml
          to re-validate merge-pool PRs after main advances. Leave empty
          for a normal manual dispatch.
        required: false
        default: ''
        type: string
      base_ref:
        description: |
          PR base branch for cluster/test_engine auto-selection on
          workflow_dispatch (e.g. release-4.20). Forwarded by
          retest-e2e.yml's /retest-e2e fallback. Leave empty otherwise.
        required: false
        default: ''
        type: string
      skip_pool_check:
        description: |
          Skip the lgtm+approved (no hold) merge-pool requirement for a
          pr_number retest. Used by /retest-e2e's fallback dispatch, which
          retests on demand regardless of review state.
        required: false
        default: false
        type: boolean
      is_pool_retest:
        description: |
          True only for a merge-pool staleness retest dispatched by
          retest-stale-gating.yml or retest-on-pool-entry.yml after main
          advances. Selects "(retest after main advanced)" wording for the
          Run Gating Tests result; every other pr_number dispatch (PR gate,
          ok-to-test, /retest-e2e) leaves this false for normal PR wording.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

# No workflow-level concurrency -- a uses: job's cancellation never lands, so
# a new run would sit pending. Cancellation is per-job instead, only on the
# two jobs that cost real cluster time.
env:
  INFRASTRUCTURE_TYPE: ${{ inputs.infrastructure_type || 'ipi' }}
  IBM_REGION: eu-de
  IBM_RESOURCE_GROUP: cnv-ui
  BASE_DOMAIN: cnv-ui.com

jobs:
  # Resolves cluster config, PR context, and progress status in one job to
  # keep the merge box small. Each step's own always()+continue-on-error
  # keeps one failure from skipping the rest.
  prepare:
    name: Prepare
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      statuses: write
      pull-requests: read
      checks: write
    outputs:
      cluster_name: ${{ steps.resolve-config.outputs.cluster-name }}
      openshift_version: ${{ steps.resolve-config.outputs.openshift-version }}
      test_engine: ${{ steps.resolve-config.outputs.test-engine }}
      branch_name: ${{ steps.resolve-config.outputs.branch-name }}
      cnv_channel: ${{ steps.resolve-config.outputs.cnv-channel }}
      cnv_pin_version: ${{ steps.resolve-config.outputs.cnv-pin-version }}
      # Empty unless dispatched with pr_number.
      pr_head_sha: ${{ steps.resolve-pr-context.outputs.head-sha }}
      pr_mergeable: ${{ steps.resolve-pr-context.outputs.mergeable }}
      pr_still_in_pool: ${{ steps.resolve-pr-context.outputs.still-in-pool }}
      pr_trusted: ${{ steps.resolve-pr-context.outputs.trusted }}
      # Distinguishes "ran and failed" from "never ran".
      pr_context_outcome: ${{ steps.resolve-pr-context.outcome }}
      # Source of truth for this run's "Hot Cluster E2E Progress" postings.
      progress_head_sha: ${{ steps.resolve-progress.outputs.head-sha }}
      progress_status_context: ${{ steps.resolve-progress.outputs.status-context }}
      # id of the in_progress "Run Gating Tests" check-run below, if any --
      # threaded to verify-gating-tests (updates it to the final result) and
      # close-gating-check-on-cancel (closes it if cancelled), so neither has
      # to create a second, separate entry that's then left orphaned forever.
      gating_check_run_id: ${{ steps.supersede-gating-check.outputs.check-run-id }}
    steps:
      # Base branch only, so a PR can't self-approve OWNERS trust.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve cluster config
        id: resolve-config
        if: always()
        continue-on-error: true
        uses: ./.github/actions/hot-cluster/resolve-cluster-config
        with:
          base-ref: ${{ inputs.base_ref || github.base_ref }}
          cluster-name: ${{ inputs.cluster_name }}
          openshift-version: ${{ inputs.openshift_version }}
          test-engine: ${{ inputs.test_engine }}
          cnv-channel: ${{ inputs.cnv_channel }}

      # Looked up fresh via the API, never trusted from caller input, so
      # should_run reflects the PR's current state.
      - name: Resolve PR context
        id: resolve-pr-context
        if: always() && github.event_name == 'workflow_dispatch' && inputs.pr_number != ''
        continue-on-error: true
        uses: ./.github/actions/hot-cluster/resolve-pr-context
        with:
          pr-number: ${{ inputs.pr_number }}
          skip-pool-check: ${{ inputs.skip_pool_check }}

      - name: Resolve progress status context
        id: resolve-progress
        if: always()
        uses: ./.github/actions/hot-cluster/resolve-progress-context
        with:
          resolved-head-sha: ${{ steps.resolve-pr-context.outputs.head-sha }}
          pr-number: ${{ inputs.pr_number }}

      # No PR event triggers this directly, so no separate no-op check is needed.
      - name: Post initial progress status (waiting for cluster)
        if: always()
        uses: ./.github/actions/hot-cluster/post-progress-status
        with:
          head-sha: ${{ steps.resolve-progress.outputs.head-sha }}
          status-context: ${{ steps.resolve-progress.outputs.status-context }}
          state: pending
          description: Waiting for cluster to be built

      # Closes the window where an older failed check would stay "current" while
      # this run is in progress -- verify-gating-tests supersedes it again on
      # completion. Skipped for a bare ad-hoc dispatch or a failed PR context lookup.
      - name: Supersede stale "Run Gating Tests" check for this run
        id: supersede-gating-check
        if: |
          always() &&
          steps.resolve-progress.outputs.head-sha != '' &&
          !(github.event_name == 'workflow_dispatch' && inputs.pr_number == '') &&
          steps.resolve-pr-context.outcome != 'failure' &&
          steps.resolve-pr-context.outcome != 'cancelled'
        continue-on-error: true
        uses: ./.github/actions/publish-gating-check
        with:
          head-sha: ${{ steps.resolve-progress.outputs.head-sha }}
          status: in_progress
          title: Hot Cluster E2E is running
          summary: A fresh Hot Cluster E2E run has started for this commit -- see the "Hot Cluster E2E Progress" check for live status.
          details-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # should_run gates an untrusted PR dispatch (ad-hoc dispatches always run);
  # run_health_check is ad-hoc-only too, so PR dispatches skip its cost. Folded
  # into hot-cluster-check.yml's result job to avoid a permanently-skipped row.
  cluster-check:
    needs: [prepare]
    if: always()
    # Cancels a same-PR push/retest's stale cluster check.
    concurrency:
      group: hot-cluster-check-${{ inputs.pr_number || format('{0}-{1}', github.ref, inputs.cluster_name || 'kubevirt-plugin-ci') }}
      cancel-in-progress: true
    uses: ./.github/workflows/hot-cluster-check.yml
    with:
      cluster_name: ${{ needs.prepare.outputs.cluster_name }}
      infrastructure_type: ${{ inputs.infrastructure_type || 'ipi' }}
      openshift_version: ${{ needs.prepare.outputs.openshift_version }}
      cnv_channel: ${{ needs.prepare.outputs.cnv_channel }}
      cnv_pin_version: ${{ needs.prepare.outputs.cnv_pin_version }}
      branch_name: ${{ needs.prepare.outputs.branch_name || github.ref_name }}
      should_run: ${{ inputs.pr_number == '' || needs.prepare.outputs.pr_trusted == 'true' }}
      run_health_check: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number == '' }}
      # ibm_region/ibm_resource_group/base_domain rely on hot-cluster-check.yml's
      # own defaults -- env context isn't available in a uses: job's with: block.
    secrets: inherit

  # Advances progress once the cluster is ready, or fails it otherwise. Skipped
  # if cluster-check was cancelled, to avoid a misleading "Cluster not ready"
  # failure for what's really a supersession.
  progress-check-running-tests:
    name: Update Progress Check
    needs: [prepare, cluster-check]
    if: always() && needs.cluster-check.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      statuses: write
    outputs:
      # Threaded into run-e2e-tests for its own progress update.
      head-sha: ${{ steps.post-status.outputs.head-sha }}
      status-context: ${{ steps.post-status.outputs.status-context }}
    steps:
      - name: Post progress status
        id: post-status
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          HEAD_SHA: ${{ needs.prepare.outputs.progress_head_sha }}
          STATUS_CONTEXT: ${{ needs.prepare.outputs.progress_status_context }}
        with:
          script: |
            const headSha = process.env.HEAD_SHA;
            const statusContext = process.env.STATUS_CONTEXT;

            // Manual health check can fail cluster-check's own job too, so
            // check both the output and the job result.
            const clusterReady = context.eventName === 'workflow_dispatch'
              ? '${{ needs.cluster-check.outputs.cluster_ready }}' === 'true' && '${{ needs.cluster-check.result }}' === 'success'
              : '${{ needs.cluster-check.outputs.cluster_ready }}' === 'true';

            if (clusterReady) {
              core.setOutput('head-sha', headSha);
              core.setOutput('status-context', statusContext);
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: headSha,
              context: statusContext,
              state: clusterReady ? 'pending' : 'failure',
              description: clusterReady
                ? 'Building plugin image'
                : 'Cluster not ready -- gating tests not run',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

  run-e2e-tests:
    name: Run E2E Tests
    needs: [prepare, cluster-check, progress-check-running-tests]
    # Overrides workflow defaults -- adds statuses: write for the progress update.
    permissions:
      contents: read
      actions: write
      statuses: write
    # mergeable/still_in_pool/trusted only ever block the pr_number retest path
    # (empty otherwise); pr_context_outcome guards against that step erroring.
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && needs.cluster-check.result == 'success' && needs.cluster-check.outputs.cluster_ready == 'true') ||
        (github.event_name != 'workflow_dispatch' && needs.cluster-check.outputs.cluster_ready == 'true')
      ) &&
      needs.prepare.outputs.pr_context_outcome != 'failure' &&
      needs.prepare.outputs.pr_context_outcome != 'cancelled' &&
      needs.prepare.outputs.pr_mergeable != 'false' &&
      needs.prepare.outputs.pr_still_in_pool != 'false' &&
      needs.prepare.outputs.pr_trusted != 'false'
    # Own group, same reasoning as cluster-check's concurrency.
    concurrency:
      group: hot-cluster-run-e2e-${{ inputs.pr_number || format('{0}-{1}', github.ref, inputs.cluster_name || 'kubevirt-plugin-ci') }}
      cancel-in-progress: true
    uses: ./.github/workflows/hot-cluster-e2e-run.yml
    with:
      test_project: ${{ inputs.test_project || 'gating' }}
      test_engine: ${{ needs.prepare.outputs.test_engine }}
      runner_label: ${{ inputs.runner_label || needs.prepare.outputs.cluster_name }}
      cluster_name: ${{ needs.prepare.outputs.cluster_name }}
      cnv_pin_version: ${{ needs.prepare.outputs.cnv_pin_version }}
      # pr_number takes priority in hot-cluster-e2e-run.yml (merges PR head onto
      # the base tip there). base_ref == 'main' maps to empty so checkout-for-retest
      # falls back to github.sha -- pinning main's tip precisely, since this
      # workflow always dispatches at ref: main. A release branch has no such
      # shortcut, so it's passed through as-is.
      checkout_ref: ${{ (inputs.base_ref != 'main' && inputs.base_ref) || '' }}
      pr_number: ${{ inputs.pr_number }}
      is_reusable_call: true
      progress_status_sha: ${{ needs.progress-check-running-tests.outputs.head-sha }}
      progress_status_context: ${{ needs.progress-check-running-tests.outputs.status-context }}
    secrets: inherit

  # Single source of truth for the gating-test outcome. Its own check-run is
  # informational only -- "Run Gating Tests" is published explicitly below via
  # publish-gating-check. name: is static (a skipped job's dynamic name renders
  # as raw text -- actions/runner#1215). Skipped if cluster-check/run-e2e-tests
  # was cancelled by a newer trigger, to avoid a misleading test-failed result.
  verify-gating-tests:
    name: Verify Gating Tests
    needs: [prepare, cluster-check, run-e2e-tests, progress-check-running-tests]
    if: |
      always() &&
      needs.cluster-check.result != 'cancelled' && needs.run-e2e-tests.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      statuses: write
      checks: write
      issues: write
      pull-requests: read
    steps:
      - name: Verify hot cluster E2E ran and passed
        id: verify
        env:
          E2E_RESULT: ${{ needs.run-e2e-tests.result }}
          RESOLVE_PR_CONTEXT_RESULT: ${{ needs.prepare.outputs.pr_context_outcome }}
          IS_RETEST: ${{ inputs.pr_number != '' }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MERGEABLE: ${{ needs.prepare.outputs.pr_mergeable }}
          STILL_IN_POOL: ${{ needs.prepare.outputs.pr_still_in_pool }}
          RETEST_TRUSTED: ${{ needs.prepare.outputs.pr_trusted }}
        run: |
          if [[ "${IS_RETEST}" == "true" && ( "${RESOLVE_PR_CONTEXT_RESULT}" == "failure" || "${RESOLVE_PR_CONTEXT_RESULT}" == "cancelled" ) ]]; then
            echo "::error::Could not resolve PR #${PR_NUMBER}'s context (head SHA / labels / mergeability) -- prepare's Resolve PR Context step ended in '${RESOLVE_PR_CONTEXT_RESULT}'. See the 'Prepare' job for details."
            echo "reason=resolve-context-failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "run-e2e-tests result: ${E2E_RESULT}"

          if [[ "${E2E_RESULT}" == "success" ]]; then
            echo "Hot cluster gating tests passed."
            echo "reason=passed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${IS_RETEST}" == "true" && "${MERGEABLE}" == "false" ]]; then
            echo "::error::PR #${PR_NUMBER} no longer merges cleanly with the current base branch tip -- resolve the conflict and push an update (this will trigger a normal gating run)."
            echo "reason=merge-conflict" >> "$GITHUB_OUTPUT"
          elif [[ "${IS_RETEST}" == "true" && "${STILL_IN_POOL}" == "false" ]]; then
            echo "::error::PR #${PR_NUMBER} no longer carries the lgtm+approved (no hold) labels required for the merge pool, re-checked fresh at run time -- skipping the retest."
            echo "reason=left-pool" >> "$GITHUB_OUTPUT"
          elif [[ "${IS_RETEST}" == "true" && "${RETEST_TRUSTED}" == "false" ]]; then
            echo "::error::PR #${PR_NUMBER} is not from OWNERS, not from a same-repo branch, and does not currently carry the 'ok-to-test' label -- skipping the retest (re-checked fresh at run time)."
            echo "reason=untrusted-retest" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Hot cluster gating tests did not pass (run-e2e-tests result: '${E2E_RESULT}'). See the 'Run E2E Tests' job for details, or use /retest-e2e once fixed."
            echo "reason=test-failed" >> "$GITHUB_OUTPUT"
          fi
          exit 1

      - name: Complete progress status
        if: always()
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          HEAD_SHA: ${{ needs.prepare.outputs.progress_head_sha }}
          STATUS_CONTEXT: ${{ needs.prepare.outputs.progress_status_context }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const passed = process.env.JOB_STATUS === 'success';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.HEAD_SHA,
              context: process.env.STATUS_CONTEXT,
              state: passed ? 'success' : 'failure',
              description: passed
                ? 'Hot cluster gating tests passed'
                : 'Hot cluster gating tests did not pass',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      # Fresh, live check right before publishing any real result. Closes a
      # race /hold-e2e's own cancellation can't: if cluster-check/run-e2e-tests
      # already finished by the time a hold lands, there's nothing left in
      # their concurrency groups to cancel, and this job would otherwise
      # publish a real pass/fail over top of /hold-e2e's neutral marker.
      # continue-on-error + defaulting to "not held" on failure: an API
      # hiccup here must never block a normal, unheld run from publishing.
      - name: Check for active /hold-e2e hold
        id: check-hold
        if: always() && inputs.pr_number != ''
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({ ...context.repo, pull_number: prNumber });
            const held = (pr.labels || []).some((label) => label.name === 'e2e-hold');
            core.info(`PR #${prNumber} e2e-hold label present: ${held}`);
            core.setOutput('held', held ? 'true' : 'false');

      # Maps verify's reason to a PR-facing title/summary. is_pool_retest picks
      # "(retest after main advanced)" wording; every other dispatch gets plain PR wording.
      - name: Determine retest result details
        id: result-details
        if: always() && inputs.pr_number != '' && needs.prepare.outputs.pr_head_sha != ''
        env:
          REASON: ${{ steps.verify.outputs.reason }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MAIN_SHA: ${{ github.sha }}
          IS_POOL_RETEST: ${{ inputs.is_pool_retest }}
          HELD: ${{ steps.check-hold.outputs.held }}
        run: |
          # Held wins over any real result -- re-checked live here rather
          # than trusted from earlier in this run, since the hold may have
          # landed after cluster-check/run-e2e-tests already started.
          if [[ "${HELD}" == "true" ]]; then
            echo "conclusion=neutral" >> "$GITHUB_OUTPUT"
            if [[ "${IS_POOL_RETEST}" == "true" ]]; then
              echo "title=Hot Cluster E2E: held via /hold-e2e (retest after main advanced)" >> "$GITHUB_OUTPUT"
            else
              echo "title=Hot Cluster E2E: held via /hold-e2e" >> "$GITHUB_OUTPUT"
            fi
            echo "summary=PR #${PR_NUMBER} is on hold via /hold-e2e (re-checked fresh as this run finished) -- its real result is suppressed so it can't re-green the required check out from under the hold. Comment /retest-e2e to lift the hold and get a fresh result." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "${REASON}" in
            passed)
              echo "conclusion=success" >> "$GITHUB_OUTPUT"
              if [[ "${IS_POOL_RETEST}" == "true" ]]; then
                echo "title=Hot Cluster E2E: gating tests passed (retest after main advanced)" >> "$GITHUB_OUTPUT"
                echo "summary=Re-validated PR #${PR_NUMBER} merged with the current main tip (${MAIN_SHA}) after main advanced." >> "$GITHUB_OUTPUT"
              else
                echo "title=Hot Cluster E2E: gating tests passed" >> "$GITHUB_OUTPUT"
                echo "summary=Hot cluster gating tests passed for PR #${PR_NUMBER} at this commit." >> "$GITHUB_OUTPUT"
              fi
              ;;
            merge-conflict)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              if [[ "${IS_POOL_RETEST}" == "true" ]]; then
                echo "title=Hot Cluster E2E: PR no longer merges cleanly with main (retest after main advanced)" >> "$GITHUB_OUTPUT"
                echo "summary=PR #${PR_NUMBER} no longer merges cleanly with the current main tip (${MAIN_SHA}) -- resolve the conflict and push an update, which will trigger a normal gating run." >> "$GITHUB_OUTPUT"
              else
                echo "title=Hot Cluster E2E: PR does not merge cleanly with the base branch" >> "$GITHUB_OUTPUT"
                echo "summary=PR #${PR_NUMBER} does not merge cleanly with the current base branch tip -- resolve the conflict and push an update to trigger a fresh run." >> "$GITHUB_OUTPUT"
              fi
              ;;
            left-pool)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              if [[ "${IS_POOL_RETEST}" == "true" ]]; then
                echo "title=Hot Cluster E2E: no longer in the merge pool (retest after main advanced)" >> "$GITHUB_OUTPUT"
                echo "summary=PR #${PR_NUMBER} no longer carries the lgtm+approved (no hold) labels required for the merge pool, re-checked fresh when this retest ran against main tip ${MAIN_SHA} -- the cluster run was skipped." >> "$GITHUB_OUTPUT"
              else
                echo "title=Hot Cluster E2E: not in the merge pool" >> "$GITHUB_OUTPUT"
                echo "summary=PR #${PR_NUMBER} does not carry the lgtm+approved (no hold) labels required for the merge pool, re-checked fresh at run time -- the cluster run was skipped." >> "$GITHUB_OUTPUT"
              fi
              ;;
            untrusted-retest)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              if [[ "${IS_POOL_RETEST}" == "true" ]]; then
                echo "title=Hot Cluster E2E: not CI-trusted for a retest (retest after main advanced)" >> "$GITHUB_OUTPUT"
                echo "summary=PR #${PR_NUMBER} is not from OWNERS, not from a same-repo branch, and does not currently carry 'ok-to-test' (re-checked fresh when this retest ran against main tip ${MAIN_SHA}) -- the cluster run was skipped. A maintainer can add 'ok-to-test' to allow it." >> "$GITHUB_OUTPUT"
              else
                echo "title=Hot Cluster E2E: gating tests did not run (not CI-trusted)" >> "$GITHUB_OUTPUT"
                echo "summary=Hot cluster E2E has not run for PR #${PR_NUMBER} because the author is not listed in OWNERS, is not from a same-repo branch, and does not currently carry 'ok-to-test' (re-checked fresh at run time). A maintainer can add the 'ok-to-test' label to trigger it." >> "$GITHUB_OUTPUT"
              fi
              ;;
            *)
              echo "conclusion=failure" >> "$GITHUB_OUTPUT"
              if [[ "${IS_POOL_RETEST}" == "true" ]]; then
                echo "title=Hot Cluster E2E: gating tests did not pass (retest after main advanced)" >> "$GITHUB_OUTPUT"
                echo "summary=Re-validated PR #${PR_NUMBER} merged with the current main tip (${MAIN_SHA}) after main advanced -- tests did not pass. See the workflow run for details." >> "$GITHUB_OUTPUT"
              else
                echo "title=Hot Cluster E2E: gating tests did not pass" >> "$GITHUB_OUTPUT"
                echo "summary=Hot cluster gating tests did not pass for PR #${PR_NUMBER} (reason: \`${REASON}\`). See the Run E2E Tests job for details, or comment /retest-e2e once fixed." >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac

      # Needed to resolve the local publish-gating-check action below --
      # skipped only for a bare ad-hoc dispatch, which publishes nothing.
      - name: Checkout
        if: always() && !(github.event_name == 'workflow_dispatch' && inputs.pr_number == '')
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # The literal "Run Gating Tests" required check -- the single publish path
      # for every real PR trigger. Updates prepare's own in_progress check-run
      # in place (same-run update, always permitted) instead of creating a
      # second entry, which would leave the first stuck in_progress forever.
      # Empty check-run-id falls back to creating a fresh one.
      - name: Publish result for PR
        id: publish-result
        if: always() && inputs.pr_number != '' && needs.prepare.outputs.pr_head_sha != ''
        continue-on-error: true
        uses: ./.github/actions/publish-gating-check
        with:
          head-sha: ${{ needs.prepare.outputs.pr_head_sha }}
          check-run-id: ${{ needs.prepare.outputs.gating_check_run_id }}
          status: completed
          conclusion: ${{ steps.result-details.outputs.conclusion }}
          title: ${{ steps.result-details.outputs.title }}
          summary: ${{ steps.result-details.outputs.summary }}
          details-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Best-effort, cross-run safety net for a "Run Gating Tests" check-run left
      # open by a genuinely different, older run (e.g. one that crashed before
      # reaching this step -- close-gating-check-on-cancel handles the cancelled
      # case via a same-run update instead). Gated on publish-result having
      # actually succeeded with a real id, so a failed/empty publish can't
      # trigger closing every open check for the SHA. Only closes check-runs
      # with a lower id than the one just published (ids are creation-ordered),
      # so a concurrent sibling's still-in-flight marker (created after ours)
      # is never touched.
      - name: Close out older open "Run Gating Tests" check-runs for this commit
        if: |
          always() && inputs.pr_number != '' && needs.prepare.outputs.pr_head_sha != '' &&
          steps.publish-result.outcome == 'success' &&
          steps.publish-result.outputs.check-run-id != ''
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          HEAD_SHA: ${{ needs.prepare.outputs.pr_head_sha }}
          PUBLISHED_CHECK_RUN_ID: ${{ steps.publish-result.outputs.check-run-id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const headSha = process.env.HEAD_SHA;
            const publishedId = Number(process.env.PUBLISHED_CHECK_RUN_ID);
            const runUrl = process.env.RUN_URL;

            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              ...context.repo,
              ref: headSha,
              check_name: 'Run Gating Tests',
              per_page: 100,
            });

            const orphans = checkRuns.filter(
              (run) => run.status !== 'completed' && run.id < publishedId,
            );

            for (const run of orphans) {
              core.warning(`Completing orphaned "Run Gating Tests" check-run ${run.id} (status: ${run.status}) for ${headSha} -- superseded by check-run ${publishedId}.`);
              await github.rest.checks.update({
                ...context.repo,
                check_run_id: run.id,
                status: 'completed',
                conclusion: 'neutral',
                completed_at: new Date().toISOString(),
                details_url: runUrl,
                output: {
                  title: 'Hot Cluster E2E: superseded',
                  summary: `This check-run was superseded by a newer "Run Gating Tests" result for this commit -- see ${runUrl}.`,
                },
              }).catch((err) => {
                core.warning(`Could not complete orphaned check-run ${run.id}: ${err.message || err}`);
              });
            }

      # No head SHA to publish against if Resolve PR Context failed -- a
      # PR comment is the only channel left.
      - name: Report unresolvable PR context on the PR
        if: |
          always() && inputs.pr_number != '' && (
            needs.prepare.outputs.pr_context_outcome == 'failure' ||
            needs.prepare.outputs.pr_context_outcome == 'cancelled'
          )
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          IS_POOL_RETEST: ${{ inputs.is_pool_retest }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const trigger = process.env.IS_POOL_RETEST === 'true'
              ? 'The automatic retest triggered after `main` advanced'
              : 'This Hot Cluster E2E run';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: [
                `⚠️ ${trigger} could not resolve this PR's context ` +
                  '(head SHA / labels / mergeability) and did not run.',
                '',
                'The existing "Run Gating Tests" result may be stale -- please comment `/retest-e2e` for a fresh result before merging.',
                '',
                `See the failed run for details: ${runUrl}`,
              ].join('\n'),
            });

  # verify-gating-tests skips entirely on a cancelled cluster-check/run-e2e-tests
  # (a newer same-PR trigger superseded it) to avoid a misleading test-failed
  # result -- but that also leaves prepare's own in_progress check-run stuck,
  # since nothing else updates it on that path. This job closes it in place
  # (same-run update) whenever a cancellation is what skipped verify-gating-tests.
  close-gating-check-on-cancel:
    name: Close Gating Check (Cancelled)
    needs: [prepare, cluster-check, run-e2e-tests]
    if: |
      always() &&
      (needs.cluster-check.result == 'cancelled' || needs.run-e2e-tests.result == 'cancelled') &&
      needs.prepare.outputs.gating_check_run_id != ''
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      checks: write
    steps:
      # Needed to resolve the local publish-gating-check action below.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Close prepare's check-run as superseded
        continue-on-error: true
        uses: ./.github/actions/publish-gating-check
        with:
          check-run-id: ${{ needs.prepare.outputs.gating_check_run_id }}
          status: completed
          conclusion: neutral
          title: 'Hot Cluster E2E: superseded'
          summary: This run was cancelled -- superseded by a newer Hot Cluster E2E run for this PR. See the newer run for the current result.

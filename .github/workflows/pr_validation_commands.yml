name: PR Validation Commands

on:
  issue_comment:
    types: [created]

jobs:
  command:
    name: pr-validation-command
    # Skip bot comments so report guidance that mentions trigger commands
    # (e.g. "/recheck-jira") doesn't re-trigger this job.
    if: >-
      github.event.issue.pull_request != null &&
      !endsWith(github.event.comment.user.login, '[bot]') &&
      (contains(github.event.comment.body, '/recheck-jira') ||
       contains(github.event.comment.body, '/ai-approved') ||
       contains(github.event.comment.body, '/ci-approved') ||
       contains(github.event.comment.body, '/lgtm') ||
       contains(github.event.comment.body, '/approve') ||
       contains(github.event.comment.body, '/hold cancel') ||
       contains(github.event.comment.body, '/hold ') ||
       endsWith(github.event.comment.body, '/hold') ||
       (contains(github.event.comment.body, '/hold') && !contains(github.event.comment.body, '/hold-e2e')))
    permissions:
      contents: read
      statuses: write
      checks: write
    runs-on: ubuntu-latest
    # Not cancel-in-progress: rapid successive commands (e.g. /lgtm then
    # /approve) must both finish applying labels, not race/clobber each other.
    concurrency:
      group: pr-validation-cmd-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - name: Resolve PR context
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('author', pr.user.login);

      # Needed so the local setup-gh-scripts action can resolve. issue_comment
      # already loads this workflow from the default branch.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Pin scripts to default branch; release-branch bases may predate the
      # current layout. BASE_BRANCH below still carries the PR's real base.
      - name: Setup validation scripts
        uses: ./.github/actions/setup-gh-scripts
        with:
          ref: ${{ github.event.repository.default_branch }}

      # Bot app token required (see ci-scripts/README.md). continue-on-error
      # so a bad credential still lets the step below report what it can.
      - name: Generate bot token
        id: bot-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: write

      # GITHUB_TOKEN: bot (issues/PRs). STATUS_GITHUB_TOKEN: ambient token
      # for commit statuses and OWNERS reads. See createStatusOctokit.
      - name: Run validation command
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}
          STATUS_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_ref }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: npx tsx src/validation/commands/index.ts

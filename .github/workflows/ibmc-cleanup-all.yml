name: IBM Cloud Cleanup All Resources

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: 'Cluster name prefix to clean (deletes ALL matching resources)'
        required: true
        default: 'kubevirt-plugin-ci'
        type: string
      dry_run:
        description: 'Dry run (list resources without deleting)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      clean_vpc:
        description: 'Also clean VPC, subnets, and gateways'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      expected_cluster_count:
        description: >-
          Safety gate (destructive runs only): cluster_name is a PREFIX match, and
          with multiple concurrent hot clusters (e.g. kubevirt-plugin-ci-91 also
          starts with kubevirt-plugin-ci) it can silently match more than one
          cluster. Set this to how many distinct clusters you expect to match; the
          run fails before deleting anything if the actual count differs.
        required: true
        default: '1'
        type: string

permissions:
  actions: read
  contents: read

env:
  CLUSTER_NAME: ${{ inputs.cluster_name || 'kubevirt-plugin-ci' }}
  DRY_RUN: ${{ inputs.dry_run || 'true' }}

jobs:
  cleanup:
    name: Clean All IBM Cloud Resources
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate cluster_name format
        run: |
          if [[ ! "${CLUSTER_NAME}" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "::error::Invalid cluster_name: '${CLUSTER_NAME}'. Must start with a lower-case letter/digit and contain only lower-case letters, digits, and hyphens (matches real cluster naming). No length cap here since it's used as a prefix filter, not a single cluster's literal name."
            exit 1
          fi

      - name: Setup IBM Cloud CLI
        uses: IBM/actions-ibmcloud-cli@v2
        with:
          api_key: ${{ secrets.IC_KEY }}
          region: us-south
          group: cnv-ui
          plugins: kubernetes-service, vpc-infrastructure

      - name: Install CIS plugin
        run: ibmcloud plugin install cis -f 2>/dev/null || true

      - name: Detect distinct clusters matching prefix
        id: detect_clusters
        run: |
          CIS_ID=$(ibmcloud cis instances --output json 2>/dev/null | jq -r '.[0].crn // empty' || true)

          DNS_CLUSTERS="[]"
          if [[ -n "${CIS_ID}" ]]; then
            ibmcloud cis instance-set "${CIS_ID}" 2>/dev/null || true
            for zone_id in $(ibmcloud cis domains --output json 2>/dev/null | jq -r '.[].id' || true); do
              ZONE_CLUSTERS=$(ibmcloud cis dns-records "${zone_id}" --output json 2>/dev/null \
                | jq -c --arg cn "${CLUSTER_NAME}" \
                  '[.[] | select(.type == "A" or .type == "CNAME") | .name
                    | capture("^api\\.(?<name>[^.]+)\\.") | .name
                    | select(startswith($cn))] | unique' \
                2>/dev/null || echo "[]")
              DNS_CLUSTERS=$(echo "${DNS_CLUSTERS}" | jq -c --argjson z "${ZONE_CLUSTERS}" '. + $z | unique' 2>/dev/null || echo "${DNS_CLUSTERS}")
            done
          fi

          ROKS_CLUSTERS=$(ibmcloud oc cluster ls --output json 2>/dev/null \
            | jq -c --arg cn "${CLUSTER_NAME}" '[.[] | select(.name | startswith($cn)) | .name] // []' \
            || echo "[]")

          ALL_CLUSTERS=$(jq -cn --argjson a "${DNS_CLUSTERS}" --argjson b "${ROKS_CLUSTERS}" '($a + $b) | unique')
          COUNT=$(echo "${ALL_CLUSTERS}" | jq 'length')
          DETECTION_AVAILABLE="true"
          if [[ -z "${CIS_ID}" ]]; then
            echo "::warning::No CIS instance found — IPI cluster detection via DNS is unavailable (ROKS-only detection still applied). Safety gate will be skipped; proceed carefully."
            if [[ "${COUNT}" -eq 0 ]]; then
              DETECTION_AVAILABLE="false"
            fi
          fi

          echo "Distinct clusters matching prefix '${CLUSTER_NAME}': ${ALL_CLUSTERS}"
          echo "clusters=$(echo "${ALL_CLUSTERS}" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "detection_available=${DETECTION_AVAILABLE}" >> "$GITHUB_OUTPUT"

      - name: Enforce expected cluster count
        if: env.DRY_RUN == 'false' && steps.detect_clusters.outputs.detection_available == 'true'
        env:
          EXPECTED_COUNT: ${{ inputs.expected_cluster_count || '1' }}
          ACTUAL_COUNT: ${{ steps.detect_clusters.outputs.count }}
          MATCHED_CLUSTERS: ${{ steps.detect_clusters.outputs.clusters }}
        run: |
          if [[ "${ACTUAL_COUNT}" != "${EXPECTED_COUNT}" ]]; then
            echo "::error::cluster_name '${CLUSTER_NAME}' matches ${ACTUAL_COUNT} distinct cluster(s): ${MATCHED_CLUSTERS} — but expected_cluster_count=${EXPECTED_COUNT}."
            echo "::error::Narrow cluster_name to target one cluster precisely, or set expected_cluster_count=${ACTUAL_COUNT} to confirm you intend to sweep all of them."
            exit 1
          fi
          echo "Confirmed: cluster_name matches exactly ${ACTUAL_COUNT} distinct cluster(s), as expected."

      - name: Check for active CI jobs on matched clusters
        if: env.DRY_RUN == 'false' && steps.detect_clusters.outputs.detection_available == 'true'
        uses: actions/github-script@v9
        env:
          MATCHED_CLUSTERS: ${{ steps.detect_clusters.outputs.clusters }}
        with:
          script: |
            const clusters = JSON.parse(process.env.MATCHED_CLUSTERS || '[]');
            const workflows = [
              '.github/workflows/hot-cluster-e2e.yml',
              '.github/workflows/hot-cluster-e2e-run.yml',
              '.github/workflows/ibmc-cluster-setup.yml',
            ];
            const busy = new Set();

            for (const clusterName of clusters) {
              const tag = `[${clusterName}]`;
              for (const workflow of workflows) {
                for (const status of ['in_progress', 'queued']) {
                  const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                    ...context.repo,
                    workflow_id: workflow,
                    status,
                    per_page: 100,
                  });
                  if (runs.some(r => r.display_title && r.display_title.includes(tag))) {
                    busy.add(clusterName);
                  }
                }
              }
            }

            if (busy.size > 0) {
              core.setFailed(`Refusing to clean up — these matched clusters have active CI jobs: ${[...busy].join(', ')}. Wait for them to finish, or narrow cluster_name to exclude them.`);
            } else {
              core.info('No active CI jobs found on any matched cluster — safe to proceed.');
            }

      - name: Find and delete VMs
        run: |
          echo "=== Virtual Server Instances ==="
          INSTANCES=$(ibmcloud is instances --output json 2>/dev/null \
            | jq -r --arg cn "${CLUSTER_NAME}" 'if type == "array" then .[] | select(type == "object") | select(.name | startswith($cn)) | "\(.id)\t\(.name)\t\(.status)" else empty end' || true)

          if [[ -z "${INSTANCES}" ]]; then
            echo "No VMs found matching '${CLUSTER_NAME}*'"
          else
            echo "${INSTANCES}" | column -t
            if [[ "${DRY_RUN}" == "false" ]]; then
              echo "${INSTANCES}" | while IFS=$'\t' read -r id name status; do
                echo "  Deleting: ${name} (${id})"
                ibmcloud is instance-delete "${id}" -f 2>/dev/null || true
              done
              echo "Waiting for deletions..."
              sleep 60
            fi
          fi

      - name: Find and delete load balancers
        run: |
          echo "=== Load Balancers ==="
          LBS=$(ibmcloud is lbs --output json 2>/dev/null \
            | jq -r --arg cn "${CLUSTER_NAME}" 'if type == "array" then .[] | select(type == "object") | select(.name | startswith($cn)) | "\(.id)\t\(.name)\t\(.provisioning_status)" else empty end' || true)

          if [[ -z "${LBS}" ]]; then
            echo "No LBs found matching '${CLUSTER_NAME}*'"
          else
            echo "${LBS}" | column -t
            if [[ "${DRY_RUN}" == "false" ]]; then
              echo "${LBS}" | while IFS=$'\t' read -r id name status; do
                echo "  Deleting: ${name} (${id})"
                ibmcloud is load-balancer-delete "${id}" -f 2>/dev/null || true
              done
              sleep 30
            fi
          fi

      - name: Wait for LB deletions
        if: inputs.dry_run == 'false'
        run: |
          echo "=== Waiting for LB deletions to complete ==="
          for i in $(seq 1 12); do
            REMAINING=$(ibmcloud is lbs --output json 2>/dev/null \
              | jq -r --arg cn "${CLUSTER_NAME}" 'if type == "array" then [.[] | select(type == "object") | select((.name | startswith($cn)) or (.name | startswith("kube-" + $cn)))] | length else 0 end' 2>/dev/null || echo 0)
            if [[ "${REMAINING}" -eq 0 || "${REMAINING}" == "null" ]]; then
              echo "  All LBs deleted."
              break
            fi
            echo "  ${REMAINING} LB(s) still deleting... (${i}/12)"
            sleep 30
          done

      - name: Detach gateways and delete subnets
        run: |
          echo "=== Detach gateways from subnets, then delete subnets ==="
          SUBS=$(ibmcloud is subnets --output json 2>/dev/null \
            | jq -r --arg cn "${CLUSTER_NAME}" 'if type == "array" then .[] | select(type == "object") | select(.name | startswith($cn)) | "\(.id)\t\(.name)\t\(.public_gateway.id // "none")" else empty end' || true)

          if [[ -z "${SUBS}" ]]; then
            echo "No subnets found matching '${CLUSTER_NAME}*'"
          else
            echo "${SUBS}" | column -t
            if [[ "${DRY_RUN}" == "false" ]]; then
              echo "${SUBS}" | while IFS=$'\t' read -r id name pgw; do
                if [[ "${pgw}" != "none" ]]; then
                  echo "  Detaching gateway from subnet: ${name}"
                  ibmcloud is subnet-public-gateway-detach "${id}" -f 2>/dev/null || true
                fi
              done
              sleep 10
              echo "${SUBS}" | while IFS=$'\t' read -r id name pgw; do
                echo "  Deleting subnet: ${name} (${id})"
                ibmcloud is subnet-delete "${id}" -f 2>/dev/null || true
              done
              sleep 30
            fi
          fi

      - name: Find and delete public gateways
        run: |
          echo "=== Public Gateways ==="
          PGS=$(ibmcloud is public-gateways --output json 2>/dev/null \
            | jq -r --arg cn "${CLUSTER_NAME}" 'if type == "array" then .[] | select(type == "object") | select(.name | startswith($cn)) | "\(.id)\t\(.name)\t\(.zone.name)" else empty end' || true)

          if [[ -z "${PGS}" ]]; then
            echo "No public gateways found matching '${CLUSTER_NAME}*'"
          else
            echo "${PGS}" | column -t
            if [[ "${DRY_RUN}" == "false" ]]; then
              echo "${PGS}" | while IFS=$'\t' read -r id name zone; do
                echo "  Deleting: ${name} (${id})"
                ibmcloud is public-gateway-delete "${id}" -f 2>/dev/null || true
              done
              sleep 10
            fi
          fi

      - name: Find and delete floating IPs
        run: |
          echo "=== Floating IPs ==="
          FIPS=$(ibmcloud is ips --output json 2>/dev/null \
            | jq -r --arg cn "${CLUSTER_NAME}" 'if type == "array" then .[] | select(type == "object") | select(.name | startswith($cn)) | "\(.id)\t\(.name)\t\(.status)" else empty end' || true)

          if [[ -z "${FIPS}" ]]; then
            echo "No floating IPs found matching '${CLUSTER_NAME}*'"
          else
            echo "${FIPS}" | column -t
            if [[ "${DRY_RUN}" == "false" ]]; then
              echo "${FIPS}" | while IFS=$'\t' read -r id name status; do
                echo "  Releasing: ${name} (${id})"
                ibmcloud is floating-ip-release "${id}" -f 2>/dev/null || true
              done
            fi
          fi

      - name: Find and delete security groups
        run: |
          echo "=== Security Groups ==="
          SGS=$(ibmcloud is sgs --output json 2>/dev/null \
            | jq -r --arg cn "${CLUSTER_NAME}" 'if type == "array" then .[] | select(type == "object") | select(.name | startswith($cn)) | "\(.id)\t\(.name)" else empty end' || true)

          if [[ -z "${SGS}" ]]; then
            echo "No security groups found matching '${CLUSTER_NAME}*'"
          else
            echo "${SGS}" | column -t
            if [[ "${DRY_RUN}" == "false" ]]; then
              echo "${SGS}" | while IFS=$'\t' read -r id name; do
                echo "  Deleting: ${name} (${id})"
                ibmcloud is security-group-delete "${id}" -f 2>/dev/null || true
              done
            fi
          fi

      - name: Find and delete DNS records
        run: |
          echo "=== DNS Records ==="
          CIS_ID=$(ibmcloud cis instances --output json 2>/dev/null | jq -r '.[0].crn // empty' || true)
          if [[ -z "${CIS_ID}" ]]; then
            echo "No CIS instance found."
            exit 0
          fi

          ibmcloud cis instance-set "${CIS_ID}" 2>/dev/null || true
          for zone_id in $(ibmcloud cis domains --output json 2>/dev/null | jq -r '.[].id' || true); do
            RECORDS=$(ibmcloud cis dns-records "${zone_id}" --output json 2>/dev/null \
              | jq -r --arg cn "${CLUSTER_NAME}" 'if type == "array" then .[] | select(type == "object") | select(.name | contains($cn)) | "\(.id)\t\(.name)\t\(.type)\t\(.content)" else empty end' || true)
            if [[ -n "${RECORDS}" ]]; then
              echo "${RECORDS}" | column -t
              if [[ "${DRY_RUN}" == "false" ]]; then
                echo "${RECORDS}" | while IFS=$'\t' read -r id name type content; do
                  echo "  Deleting: ${name} (${id})"
                  ibmcloud cis dns-record-delete "${zone_id}" "${id}" 2>/dev/null || true
                done
              fi
            else
              echo "No DNS records found matching '${CLUSTER_NAME}'."
            fi
          done

      - name: Find and delete VPC resources
        if: inputs.clean_vpc == 'true'
        env:
          VPC_NAME: ${{ inputs.cluster_name || 'kubevirt-plugin-ci' }}-vpc
        run: |
          echo "=== VPC Resources ==="
          VPC_ID=$(ibmcloud is vpcs --output json 2>/dev/null \
            | jq -r --arg n "${VPC_NAME}" 'if type == "array" then .[] | select(type == "object") | select(.name == $n) | .id // empty else empty end' || true)

          if [[ -z "${VPC_ID}" ]]; then
            echo "No VPC '${VPC_NAME}' found."
            exit 0
          fi

          echo "VPC: ${VPC_NAME} (${VPC_ID})"

          echo "Subnets:"
          ibmcloud is subnets --output json 2>/dev/null \
            | jq -r --arg vpc "${VPC_ID}" 'if type == "array" then .[] | select(type == "object") | select(.vpc.id == $vpc) | "  \(.id)\t\(.name)" else empty end' | column -t || true

          echo "Public Gateways:"
          ibmcloud is public-gateways --output json 2>/dev/null \
            | jq -r --arg vpc "${VPC_ID}" 'if type == "array" then .[] | select(type == "object") | select(.vpc.id == $vpc) | "  \(.id)\t\(.name)" else empty end' | column -t || true

          if [[ "${DRY_RUN}" == "false" ]]; then
            echo "Deleting public gateways..."
            for gw_id in $(ibmcloud is public-gateways --output json 2>/dev/null | jq -r --arg vpc "${VPC_ID}" 'if type == "array" then .[] | select(type == "object") | select(.vpc.id == $vpc) | .id else empty end' || true); do
              for sub_id in $(ibmcloud is subnets --output json 2>/dev/null | jq -r --arg gw "${gw_id}" 'if type == "array" then .[] | select(type == "object") | select(.public_gateway.id == $gw) | .id else empty end' || true); do
                ibmcloud is subnet-public-gateway-detach "${sub_id}" -f 2>/dev/null || true
              done
              ibmcloud is public-gateway-delete "${gw_id}" -f 2>/dev/null || true
            done

            echo "Deleting subnets..."
            for sub_id in $(ibmcloud is subnets --output json 2>/dev/null | jq -r --arg vpc "${VPC_ID}" 'if type == "array" then .[] | select(type == "object") | select(.vpc.id == $vpc) | .id else empty end' || true); do
              ibmcloud is subnet-delete "${sub_id}" -f 2>/dev/null || true
            done

            sleep 30

            echo "Deleting VPC..."
            ibmcloud is vpc-delete "${VPC_ID}" -f 2>/dev/null || true
          fi

      - name: Find ROKS clusters
        run: |
          echo "=== ROKS Clusters ==="
          ibmcloud oc cluster ls 2>&1 | rg "${CLUSTER_NAME}" || echo "No ROKS clusters matching '${CLUSTER_NAME}'."

      # Reuses the existing kubevirt-plugin-arc GitHub App (already scoped to
      # exactly `administration: write`, the permission runner
      # registration/deregistration needs).
      - name: Generate ARC app token for ghost-runner cleanup
        id: arc-app-token
        if: env.DRY_RUN == 'false'
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ARC_GITHUB_APP_ID }}
          private-key: ${{ secrets.ARC_GITHUB_APP_PRIVATE_KEY }}
          permission-administration: write

      - name: Clean up ghost runners for matched clusters
        if: env.DRY_RUN == 'false'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.arc-app-token.outputs.token }}
          MATCHED_CLUSTERS: ${{ steps.detect_clusters.outputs.clusters }}
        run: |
          echo "=== Offline Self-Hosted Runners ==="
          CLUSTERS_JSON="${MATCHED_CLUSTERS:-[]}"
          # Fall back to the raw prefix if detection found nothing (e.g. no CIS
          # instance / non-IPI cluster), so ghost-runner cleanup still runs.
          if [[ "${CLUSTERS_JSON}" == "[]" || -z "${CLUSTERS_JSON}" ]]; then
            CLUSTERS_JSON=$(jq -cn --arg cn "${CLUSTER_NAME}" '[$cn]')
          fi

          echo "${CLUSTERS_JSON}" | jq -r '.[]' | while read -r name; do
            echo "Checking for offline self-hosted runners with label '${name}'..."
            # gh api's --jq only accepts a single jq-expression string (no --arg
            # support), so interpolate the already-validated/detected name directly.
            RUNNERS=$(gh api "/repos/${{ github.repository }}/actions/runners" --jq ".runners[] | select(.status == \"offline\") | select(.labels[].name == \"${name}\") | .id" 2>/dev/null || true)
            if [[ -z "${RUNNERS}" ]]; then
              echo "  No offline '${name}' runners found"
            else
              for runner_id in ${RUNNERS}; do
                echo "  Deleting offline runner ${runner_id} (label: ${name})..."
                gh api -X DELETE "/repos/${{ github.repository }}/actions/runners/${runner_id}" || echo "  Failed to delete runner ${runner_id}"
              done
            fi
          done

      - name: Summary
        if: always()
        env:
          MATCHED_CLUSTERS: ${{ steps.detect_clusters.outputs.clusters }}
          MATCHED_COUNT: ${{ steps.detect_clusters.outputs.count }}
          DETECTION_AVAILABLE: ${{ steps.detect_clusters.outputs.detection_available }}
        run: |
          echo "## IBM Cloud Resource Cleanup" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster prefix | \`${CLUSTER_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | \`${DRY_RUN}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Clean VPC | \`${{ inputs.clean_vpc }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detected distinct clusters | \`${MATCHED_COUNT:-N/A} (${MATCHED_CLUSTERS:-unavailable})\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Expected cluster count | \`${{ inputs.expected_cluster_count }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${DETECTION_AVAILABLE}" != "true" ]]; then
            echo "⚠️ Cluster-count/active-job safety checks were **skipped** (detection unavailable — no CIS instance and no matching ROKS clusters found)." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "**Dry run** — no resources were deleted. Set dry_run to false to delete." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Resources matching \`${CLUSTER_NAME}\` have been **deleted**." >> "$GITHUB_STEP_SUMMARY"
          fi

name: Retest Stale Gating Checks

# Tide-equivalent staleness guard: when main advances, any open PR's
# already-completed "Run Gating Tests" check was validated against a base
# tip that no longer exists, and the hot-cluster workflow only reacts to
# the PR's own push/relabel/comment events. See ci-scripts/README.md
# ("Check-Run & Retest Model").
#
# Two tiers, bounded for cost on the single shared hot cluster:
#   - Cheap pass (every open PR targeting main): mark the existing check
#     as stale/queued -- a plain Checks API call, no cluster time spent.
#   - Real retest (merge-pool PRs only): dispatch hot-cluster-e2e.yml's
#     pr_number path, which tests the PR merged with the new main tip and
#     publishes the result onto the same check. Pool membership is
#     re-verified fresh inside that dispatched run, not trusted from this
#     workflow's earlier snapshot.
on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: write
  actions: write

jobs:
  list-open-prs:
    name: List Open PRs Targeting main
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      pool_pr_numbers: ${{ steps.list.outputs.pool_pr_numbers }}
      all_pr_numbers: ${{ steps.list.outputs.all_pr_numbers }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: List open PRs and classify merge-pool membership
        id: list
        uses: actions/github-script@v9
        with:
          script: |
            const { isMergePoolPr } = require('./ci-scripts/hot-cluster/js/is-merge-pool-pr.cjs');

            const prs = await github.paginate(github.rest.pulls.list, {
              ...context.repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            const all = prs.map((pr) => pr.number);
            const pool = prs.filter((pr) => isMergePoolPr(pr.labels)).map((pr) => pr.number);

            core.info(`Open PRs targeting main: ${all.length} total, ${pool.length} in the merge pool.`);
            core.info(`Pool PRs: ${pool.join(', ') || '(none)'}`);

            core.setOutput('all_pr_numbers', JSON.stringify(all));
            core.setOutput('pool_pr_numbers', JSON.stringify(pool));

  # One matrix job per PR (rather than one job looping over all PRs) so
  # publish-gating-check can run as a normal step and one PR's failure
  # (e.g. a deleted fork branch) is isolated and visible on its own.
  mark-stale:
    name: Mark Stale (PR #${{ matrix.pr_number }})
    needs: list-open-prs
    if: needs.list-open-prs.outputs.all_pr_numbers != '[]'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJson(needs.list-open-prs.outputs.all_pr_numbers) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Skips PRs whose most recent check-run is still in flight from a
      # real run. Refreshes our own prior stale marker (rather than
      # freezing its "main advanced to <SHA>" text) as long as the PR
      # hasn't gotten a fresh real result yet.
      - name: Determine whether to (re-)mark this PR stale
        id: check
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ matrix.pr_number }}
          POOL_PR_NUMBERS: ${{ needs.list-open-prs.outputs.pool_pr_numbers }}
          STALE_MARKER_TITLE: 'Hot Cluster E2E: stale -- main has advanced since this ran'
          STALE_MARKER_TITLE_LEGACY: 'Stale -- main has advanced since this ran'
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({ ...context.repo, pull_number: prNumber });
            core.setOutput('head_sha', pr.head.sha);

            // /hold-e2e's own marker is more specific than the generic
            // stale one below -- leave it alone so the PR still points at
            // "comment /retest-e2e to lift the hold" rather than the
            // stale-after-main-advanced wording. It's already a completed/
            // neutral terminal state, so merge stays blocked either way.
            const isHeld = (pr.labels || []).some((label) => label.name === 'e2e-hold');
            if (isHeld) {
              core.info(`PR #${prNumber} is held via /hold-e2e -- leaving its check-run alone.`);
              core.setOutput('should_mark', 'false');
              return;
            }

            const inPool = JSON.parse(process.env.POOL_PR_NUMBERS).includes(prNumber);
            core.setOutput('summary', [
              `\`main\` advanced to ${context.sha} since this check last completed.`,
              inPool
                ? 'This PR is in the merge pool -- a real retest against the new base tip has been dispatched separately.'
                : "This PR is not currently in the merge pool (needs both 'lgtm' and 'approved', no hold) -- push a commit, relabel, or comment `/retest-e2e` for a fresh result before merging.",
            ].join('\n\n'));

            const { data: existing } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: pr.head.sha,
              check_name: 'Run Gating Tests',
            });
            const [latest] = existing.check_runs.sort(
              (a, b) => new Date(b.started_at) - new Date(a.started_at),
            );

            if (!latest) {
              core.info(`PR #${prNumber}: no existing "Run Gating Tests" check-run yet, nothing to mark stale.`);
              core.setOutput('should_mark', 'false');
              return;
            }

            const isOwnStaleMarker = latest.output?.title === process.env.STALE_MARKER_TITLE ||
              latest.output?.title === process.env.STALE_MARKER_TITLE_LEGACY;
            if (latest.status !== 'completed' && !isOwnStaleMarker) {
              core.info(`PR #${prNumber}: check-run ${latest.id} is ${latest.status} from a real run -- leaving it alone.`);
              core.setOutput('should_mark', 'false');
              return;
            }

            core.info(`PR #${prNumber}: marking stale (superseding check-run ${latest.id}, isOwnStaleMarker=${isOwnStaleMarker}).`);
            core.setOutput('should_mark', 'true');

      # status: completed/neutral (not queued): a `queued` marker can never
      # transition to any other state by a later real result once posted
      # (see publish-gating-check), so it would sit forever looking like an
      # active block. completed/neutral is a proper non-passing terminal
      # state instead.
      - name: Mark check stale
        if: steps.check.outputs.should_mark == 'true'
        uses: ./.github/actions/publish-gating-check
        with:
          head-sha: ${{ steps.check.outputs.head_sha }}
          status: completed
          conclusion: neutral
          title: 'Hot Cluster E2E: stale -- main has advanced since this ran'
          summary: ${{ steps.check.outputs.summary }}

  # Real retest, merge-pool PRs only. Dispatches hot-cluster-e2e.yml's
  # pr_number path (against main) rather than reusing /retest-e2e's
  # reRunWorkflow -- a re-run reuses the original cached event payload
  # (same head SHA), so it would silently re-test the same commit instead
  # of merging with the new base tip.
  #
  # needs: mark-stale so every stale marker is created before any retest
  # is dispatched, or a delayed marker could land after a fast real retest
  # and mask its result. if: always() lets one PR's stale-marking failure
  # not block retesting the others -- but that also disables the implicit
  # success() wrapping, so list-open-prs' own result is checked explicitly.
  retest-pool-prs:
    name: Retest Merge-Pool PRs (PR #${{ matrix.pr_number }})
    needs: [list-open-prs, mark-stale]
    if: |
      always() &&
      needs.list-open-prs.result == 'success' &&
      needs.list-open-prs.outputs.pool_pr_numbers != '[]'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJson(needs.list-open-prs.outputs.pool_pr_numbers) }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Dispatch hot-cluster-e2e.yml retest
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ matrix.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);

            // base_ref is required, not just an optimization: without it,
            // checkout-for-retest falls back to github.sha (main's tip) and
            // would merge a release-branch PR onto main instead of its own
            // base -- resolve-cluster-config.sh also needs it to pick the
            // right cluster/test-engine for a release PR.
            const { data: pr } = await github.rest.pulls.get({ ...context.repo, pull_number: prNumber });

            await github.rest.actions.createWorkflowDispatch({
              ...context.repo,
              workflow_id: 'hot-cluster-e2e.yml',
              ref: 'main',
              inputs: {
                pr_number: String(prNumber),
                base_ref: pr.base.ref,
                is_pool_retest: 'true',
              },
            });
            core.info(`PR #${prNumber}: dispatched a real retest against the new main tip (base_ref=${pr.base.ref}).`);

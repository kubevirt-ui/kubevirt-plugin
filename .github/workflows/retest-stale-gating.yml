name: Retest Stale Gating Checks

# Tide-equivalent staleness guard: main advancing invalidates any open PR's
# completed "Run Gating Tests" result, but the hot-cluster workflow only
# reacts to the PR's own events. See ci-scripts/README.md ("Check-Run &
# Retest Model").
#
# Two tiers, bounded for cost on the shared hot cluster:
#   - Cheap: mark every open PR's check stale (Checks API only, no cluster time).
#   - Real: dispatch a retest for merge-pool PRs only, merged with the new
#     main tip. Pool membership is re-verified fresh in that dispatched run.
on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: write
  actions: write

jobs:
  list-open-prs:
    name: List Open PRs Targeting main
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      pool_pr_numbers: ${{ steps.list.outputs.pool_pr_numbers }}
      all_pr_numbers: ${{ steps.list.outputs.all_pr_numbers }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: List open PRs and classify merge-pool membership
        id: list
        uses: actions/github-script@v9
        with:
          script: |
            const { isMergePoolPr } = require('./ci-scripts/hot-cluster/js/is-merge-pool-pr.cjs');

            const prs = await github.paginate(github.rest.pulls.list, {
              ...context.repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            const all = prs.map((pr) => pr.number);
            const pool = prs.filter((pr) => isMergePoolPr(pr.labels)).map((pr) => pr.number);

            core.info(`Open PRs targeting main: ${all.length} total, ${pool.length} in the merge pool.`);
            core.info(`Pool PRs: ${pool.join(', ') || '(none)'}`);

            core.setOutput('all_pr_numbers', JSON.stringify(all));
            core.setOutput('pool_pr_numbers', JSON.stringify(pool));

  # One matrix job per PR (not a loop) so publish-gating-check runs as a
  # normal step and one PR's failure (e.g. a deleted fork branch) stays isolated.
  mark-stale:
    name: Mark Stale (PR #${{ matrix.pr_number }})
    needs: list-open-prs
    if: needs.list-open-prs.outputs.all_pr_numbers != '[]'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJson(needs.list-open-prs.outputs.all_pr_numbers) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # Skips PRs still in flight from a real run. Refreshes our own prior
      # stale marker (SHA text and all) until a fresh real result lands.
      - name: Determine whether to (re-)mark this PR stale
        id: check
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ matrix.pr_number }}
          POOL_PR_NUMBERS: ${{ needs.list-open-prs.outputs.pool_pr_numbers }}
          STALE_MARKER_TITLE: 'Hot Cluster E2E: stale -- main has advanced since this ran'
          STALE_MARKER_TITLE_LEGACY: 'Stale -- main has advanced since this ran'
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({ ...context.repo, pull_number: prNumber });
            core.setOutput('head_sha', pr.head.sha);

            // /hold-e2e's marker is more specific than the stale one below --
            // leave it alone so the PR still says "comment /retest-e2e to
            // lift the hold", not the generic stale wording. Merge stays
            // blocked either way (already a completed/neutral state).
            const isHeld = (pr.labels || []).some((label) => label.name === 'e2e-hold');
            if (isHeld) {
              core.info(`PR #${prNumber} is held via /hold-e2e -- leaving its check-run alone.`);
              core.setOutput('should_mark', 'false');
              return;
            }

            const inPool = JSON.parse(process.env.POOL_PR_NUMBERS).includes(prNumber);
            core.setOutput('summary', [
              `\`main\` advanced to ${context.sha} since this check last completed.`,
              inPool
                ? 'This PR is in the merge pool -- a real retest against the new base tip has been dispatched separately.'
                : "This PR is not currently in the merge pool (needs both 'lgtm' and 'approved', no hold) -- push a commit, relabel, or comment `/retest-e2e` for a fresh result before merging.",
            ].join('\n\n'));

            const { data: existing } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: pr.head.sha,
              check_name: 'Run Gating Tests',
            });
            const [latest] = existing.check_runs.sort(
              (a, b) => new Date(b.started_at) - new Date(a.started_at),
            );

            if (!latest) {
              core.info(`PR #${prNumber}: no existing "Run Gating Tests" check-run yet, nothing to mark stale.`);
              core.setOutput('should_mark', 'false');
              return;
            }

            const isOwnStaleMarker = latest.output?.title === process.env.STALE_MARKER_TITLE ||
              latest.output?.title === process.env.STALE_MARKER_TITLE_LEGACY;
            if (latest.status !== 'completed' && !isOwnStaleMarker) {
              core.info(`PR #${prNumber}: check-run ${latest.id} is ${latest.status} from a real run -- leaving it alone.`);
              core.setOutput('should_mark', 'false');
              return;
            }

            core.info(`PR #${prNumber}: marking stale (superseding check-run ${latest.id}, isOwnStaleMarker=${isOwnStaleMarker}).`);
            core.setOutput('should_mark', 'true');

      # completed/neutral, not queued: a `queued` marker can never be
      # superseded by a later real result (see publish-gating-check), so it
      # would sit stuck forever instead of a proper non-passing terminal state.
      - name: Mark check stale
        if: steps.check.outputs.should_mark == 'true'
        uses: ./.github/actions/publish-gating-check
        with:
          head-sha: ${{ steps.check.outputs.head_sha }}
          status: completed
          conclusion: neutral
          title: 'Hot Cluster E2E: stale -- main has advanced since this ran'
          summary: ${{ steps.check.outputs.summary }}

      # e2e-passed/e2e-failed mirror the *last real* result (ci-scripts/README.md).
      # Once the check above is marked stale, neither label is valid for the
      # new base tip -- clear both on the same should_mark condition instead
      # of leaving a stale "passed" claim. Shared with
      # hot-cluster-e2e-pr-gate.yml via clear-e2e-result-labels (a composite
      # action's steps run inline, so no new check appears in the merge box).
      - name: Generate bot token
        id: bot-token
        if: steps.check.outputs.should_mark == 'true'
        uses: ./.github/actions/create-bot-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Clear stale e2e-passed/e2e-failed
        if: steps.check.outputs.should_mark == 'true'
        continue-on-error: true
        uses: ./.github/actions/clear-e2e-result-labels
        with:
          pr-number: ${{ matrix.pr_number }}
          github-token: ${{ steps.bot-token.outputs.token || github.token }}

  # Real retest, merge-pool PRs only. Dispatches fresh (pr_number path,
  # against main) rather than reRunWorkflow, which would reuse the cached
  # head SHA and silently re-test the same commit instead of the new base tip.
  #
  # needs: mark-stale so every stale marker lands before any retest, or a
  # delayed marker could mask a fast retest's result. if: always() keeps one
  # PR's stale-marking failure from blocking the rest, so list-open-prs'
  # result is checked explicitly instead of relying on implicit success().
  retest-pool-prs:
    name: Retest Merge-Pool PRs (PR #${{ matrix.pr_number }})
    needs: [list-open-prs, mark-stale]
    if: |
      always() &&
      needs.list-open-prs.result == 'success' &&
      needs.list-open-prs.outputs.pool_pr_numbers != '[]'
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJson(needs.list-open-prs.outputs.pool_pr_numbers) }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Dispatch hot-cluster-e2e.yml retest
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ matrix.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);

            // base_ref is required, not optional: without it,
            // checkout-for-retest falls back to main's tip and merges a
            // release-branch PR onto the wrong base; resolve-cluster-config.sh
            // also needs it to pick the right cluster/test-engine.
            const { data: pr } = await github.rest.pulls.get({ ...context.repo, pull_number: prNumber });

            await github.rest.actions.createWorkflowDispatch({
              ...context.repo,
              workflow_id: 'hot-cluster-e2e.yml',
              ref: 'main',
              inputs: {
                pr_number: String(prNumber),
                base_ref: pr.base.ref,
                is_pool_retest: 'true',
              },
            });
            core.info(`PR #${prNumber}: dispatched a real retest against the new main tip (base_ref=${pr.base.ref}).`);

name: Code Checks
on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code-checks:
    name: Code Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            i18n:
              - 'src/**'
              - 'locales/**'
              - 'i18n-scripts/**'
              - 'i18next-parser.config.js'
            workflows:
              - '.github/workflows/**'
            build:
              - '**'
              - '!.github/**'
              - '!.cursor/**'
              - '!.husky/**'
              - '!.vscode/**'
              - '!playwright/**'
              - '!ci-scripts/**'
              - '!i18n-scripts/**'
              - '!locales/**'
              - '!scripts/**'
            package-lock:
              - package-lock.json
            scripts:
              - '.github/scripts/**'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # ── i18n ──────────────────────────────────────────────
      - name: Check i18n
        id: i18n
        if: github.event_name == 'push' || steps.filter.outputs.i18n == 'true'
        continue-on-error: true
        shell: bash
        run: |
          npm run i18n
          GIT_STATUS="$(git status --short --untracked-files locales)"
          if [ -n "$GIT_STATUS" ]; then
            echo "i18n files are not up to date. Commit them to fix."
            git diff
            exit 1
          fi

      # ── actionlint ────────────────────────────────────────
      - name: Install actionlint
        if: github.event_name == 'push' || steps.filter.outputs.workflows == 'true'
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run actionlint
        id: actionlint
        if: github.event_name == 'push' || steps.filter.outputs.workflows == 'true'
        continue-on-error: true
        run: actionlint -color -shellcheck= -pyflakes=

      # ── lint + build ──────────────────────────────────────
      - name: Lint
        id: lint
        if: github.event_name == 'push' || steps.filter.outputs.build == 'true'
        continue-on-error: true
        run: npm run lint

      - name: Build
        id: build
        if: github.event_name == 'push' || steps.filter.outputs.build == 'true'
        continue-on-error: true
        run: npm run build

      - name: Prefetch npm dependencies with Hermeto
        id: hermeto
        if: (github.event_name == 'push' || steps.filter.outputs.build == 'true') && steps.filter.outputs.package-lock == 'true'
        continue-on-error: true
        run: |
          git checkout -- package.json package-lock.json
          rm -rf node_modules hermeto-output
          HERMETO_OUTPUT="${{ github.workspace }}/hermeto-output"
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            ghcr.io/hermetoproject/hermeto:latest \
            fetch-deps --source "${{ github.workspace }}" --output "$HERMETO_OUTPUT" npm
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            ghcr.io/hermetoproject/hermeto:latest \
            inject-files "$HERMETO_OUTPUT" --for-output-dir "$HERMETO_OUTPUT"

      - name: Verify offline install
        id: offline
        if: (github.event_name == 'push' || steps.filter.outputs.build == 'true') && steps.filter.outputs.package-lock == 'true'
        continue-on-error: true
        run: |
          HUSKY=0 npm ci --offline --ignore-scripts --no-audit

      # ── unit tests ────────────────────────────────────────
      - name: Run unit tests
        id: test
        continue-on-error: true
        run: npm run test-cov

      - name: Coverage upload
        if: always()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      # ── workflow script checks ────────────────────────────
      - name: Install workflow script dependencies
        if: github.event_name == 'push' || steps.filter.outputs.scripts == 'true'
        working-directory: .github/scripts
        run: npm ci

      - name: Check workflow script types
        id: script_types
        if: github.event_name == 'push' || steps.filter.outputs.scripts == 'true'
        continue-on-error: true
        working-directory: .github/scripts
        run: npm run check-types

      - name: Run workflow script tests
        id: script_tests
        if: github.event_name == 'push' || steps.filter.outputs.scripts == 'true'
        continue-on-error: true
        working-directory: .github/scripts
        run: npm test

      # ── final verdict ─────────────────────────────────────
      - name: Check all results
        if: always()
        run: |
          failed=""
          [ "${{ steps.i18n.outcome }}" = "failure" ] && failed="${failed} i18n"
          [ "${{ steps.actionlint.outcome }}" = "failure" ] && failed="${failed} actionlint"
          [ "${{ steps.lint.outcome }}" = "failure" ] && failed="${failed} lint"
          [ "${{ steps.build.outcome }}" = "failure" ] && failed="${failed} build"
          [ "${{ steps.hermeto.outcome }}" = "failure" ] && failed="${failed} hermeto"
          [ "${{ steps.offline.outcome }}" = "failure" ] && failed="${failed} offline-install"
          [ "${{ steps.test.outcome }}" = "failure" ] && failed="${failed} test"
          [ "${{ steps.script_types.outcome }}" = "failure" ] && failed="${failed} script-types"
          [ "${{ steps.script_tests.outcome }}" = "failure" ] && failed="${failed} script-tests"

          if [ -n "$failed" ]; then
            echo "::error::Failed checks:${failed}"
            exit 1
          fi
          echo "All checks passed"

name: CI
on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  i18n:
    name: i18n
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Detect i18n-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            i18n:
              - 'src/**'
              - 'locales/**'
              - 'i18n-scripts/**'
              - 'i18next-parser.config.js'

      - name: Skip i18n check
        if: github.event_name != 'push' && steps.filter.outputs.i18n != 'true'
        run: echo "No i18n-related changes detected, skipping."

      - name: Setup Node
        if: github.event_name == 'push' || steps.filter.outputs.i18n == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - if: github.event_name == 'push' || steps.filter.outputs.i18n == 'true'
        run: npm ci --ignore-scripts

      - name: Check i18n
        if: github.event_name == 'push' || steps.filter.outputs.i18n == 'true'
        shell: bash
        run: |
          npm run i18n
          GIT_STATUS="$(git status --short --untracked-files locales)"
          if [ -n "$GIT_STATUS" ]; then
            echo "i18n files are not up to date. Commit them to fix."
            git diff
            exit 1
          fi

  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Detect build-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build:
              - '**'
              - '!.github/**'
              - '!.cursor/**'
              - '!.husky/**'
              - '!.vscode/**'
              - '!playwright/**'
              - '!ci-scripts/**'
              - '!i18n-scripts/**'
              - '!locales/**'
              - '!scripts/**'
            package-lock:
              - package-lock.json

      - name: Skip build
        if: github.event_name != 'push' && steps.filter.outputs.build != 'true'
        run: echo "No build-related changes detected, skipping."

      - name: Setup Node
        if: github.event_name == 'push' || steps.filter.outputs.build == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - if: github.event_name == 'push' || steps.filter.outputs.build == 'true'
        run: npm ci --ignore-scripts

      - name: Lint
        if: github.event_name == 'push' || steps.filter.outputs.build == 'true'
        run: npm run lint

      - name: Build
        if: github.event_name == 'push' || steps.filter.outputs.build == 'true'
        run: npm run build

      - name: Prefetch npm dependencies with Hermeto
        if: (github.event_name == 'push' || steps.filter.outputs.build == 'true') && steps.filter.outputs.package-lock == 'true'
        run: |
          git checkout -- package.json package-lock.json
          rm -rf node_modules hermeto-output
          HERMETO_OUTPUT="${{ github.workspace }}/hermeto-output"
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            ghcr.io/hermetoproject/hermeto:latest \
            fetch-deps --source "${{ github.workspace }}" --output "$HERMETO_OUTPUT" npm
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            ghcr.io/hermetoproject/hermeto:latest \
            inject-files "$HERMETO_OUTPUT" --for-output-dir "$HERMETO_OUTPUT"

      - name: Verify offline install
        if: (github.event_name == 'push' || steps.filter.outputs.build == 'true') && steps.filter.outputs.package-lock == 'true'
        run: |
          HUSKY=0 npm ci --offline --ignore-scripts --no-audit

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Detect workflow script changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            scripts:
              - '.github/scripts/**'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --ignore-scripts

      - name: Run unit tests
        run: npm run test-cov

      - name: Coverage upload
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Setup Node for workflow scripts
        if: github.event_name == 'push' || steps.filter.outputs.scripts == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install workflow script dependencies
        if: github.event_name == 'push' || steps.filter.outputs.scripts == 'true'
        working-directory: .github/scripts
        run: npm ci

      - name: Check workflow script types
        if: github.event_name == 'push' || steps.filter.outputs.scripts == 'true'
        working-directory: .github/scripts
        run: npm run check-types

      - name: Run workflow script tests
        if: github.event_name == 'push' || steps.filter.outputs.scripts == 'true'
        working-directory: .github/scripts
        run: npm test

      - name: Skip workflow script tests
        if: github.event_name != 'push' && steps.filter.outputs.scripts != 'true'
        run: echo "No workflow script changes detected, skipping."

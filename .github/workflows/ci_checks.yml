name: CI
on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main

jobs:
  i18n:
    name: i18n
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Check i18n
        shell: bash
        run: |
          npm run i18n
          GIT_STATUS="$(git status --short --untracked-files locales)"
          if [ -n "$GIT_STATUS" ]; then
            echo "i18n files are not up to date. Commit them to fix."
            git diff
            exit 1
          fi

  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Detect package-lock.json changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            package-lock:
              - package-lock.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint:fix

      - name: Check File Changes
        run: git diff --name-only --exit-code && echo "No changes after linting."

      - name: Build
        run: npm run build

      - name: Prefetch npm dependencies with Hermeto
        if: steps.filter.outputs.package-lock == 'true'
        run: |
          git checkout -- package.json package-lock.json
          rm -rf node_modules hermeto-output
          HERMETO_OUTPUT="${{ github.workspace }}/hermeto-output"
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            ghcr.io/hermetoproject/hermeto:latest \
            fetch-deps --source "${{ github.workspace }}" --output "$HERMETO_OUTPUT" npm
          docker run --rm \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            ghcr.io/hermetoproject/hermeto:latest \
            inject-files "$HERMETO_OUTPUT" --for-output-dir "$HERMETO_OUTPUT"

      - name: Verify offline install
        if: steps.filter.outputs.package-lock == 'true'
        run: |
          HUSKY=0 npm ci --offline --ignore-scripts --no-audit

  unit-test:
    name: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Run Unit Tests
        run: npm run test-cov

      - name: Coverage Upload
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  workflow-scripts-test:
    name: workflow-scripts-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Check types
        working-directory: .github/scripts
        run: npm run check-types

      - name: Run workflow script tests
        working-directory: .github/scripts
        run: npm test

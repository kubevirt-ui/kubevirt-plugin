name: DEPLOY
env:
  VERSION_TAG: ${{github.ref_name == 'main' && 'latest' || github.ref_name}}
  REGISTRY_IMAGE: quay.io/kubevirt-ui/kubevirt-plugin
on:
  push:
    branches:
      - main
    tags:
      - v*

concurrency:
  group: deploy-${{ github.ref }}
  # Cancel superseded runs so :latest tracks HEAD. Safe with platform-only
  # build tags below — cancelled runs never reach merge, so Quay digest races
  # from overlapping merges cannot occur.
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/s390x
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          sparse-checkout: ci-scripts/hot-cluster/ts

      - name: Prepare
        working-directory: ci-scripts/hot-cluster/ts
        env:
          PLATFORM: ${{ matrix.platform }}
        run: npx tsx src/scripts/prepare-platform-pair.ts

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Login to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASS }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Platform tags only — keep digests referenced until merge publishes :latest.
          # Do not push bare REGISTRY_IMAGE (:latest); concurrent runs would race and
          # mid-deploy :latest would be a single-arch image until the merge job finishes.
          tags: ${{ env.REGISTRY_IMAGE }}:${{ env.VERSION_TAG }}-${{ env.PLATFORM_PAIR }}
          push: true
          outputs: type=image,name-canonical=true,push=true

      - name: Export digest
        working-directory: ci-scripts/hot-cluster/ts
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          DIGEST_DIR: ${{ runner.temp }}/digests
        run: npx tsx src/scripts/export-digest.ts

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          sparse-checkout: ci-scripts/hot-cluster/ts

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        working-directory: ci-scripts/hot-cluster/ts
        env:
          DIGEST_DIR: ${{ runner.temp }}/digests
        run: npx tsx src/scripts/create-manifest-list.ts

      - name: Inspect image
        working-directory: ci-scripts/hot-cluster/ts
        run: npx tsx src/scripts/inspect-image.ts

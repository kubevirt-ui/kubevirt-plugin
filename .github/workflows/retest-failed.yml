name: Retest Failed

# Unlike /retest-e2e (always forces a fresh E2E run, and lifts /hold-e2e),
# /retest-failed only acts on parts of this PR's CI that are *currently*
# failing/stale -- it never forces a fresh run of something already
# passing, and never lifts a /hold-e2e hold. See ci-scripts/README.md
# ("Check-Run & Retest Model") for the full design.
on:
  issue_comment:
    types: [created]

# checks: read is genuinely used here via the ambient token (see the
# "Read PR context and gating state" step below) -- checks/statuses reads
# are unaffected by the issues/actions read-only restriction that applies
# to a PR from a fork (confirmed live, see ci-scripts/README.md). Nothing
# else reads the ambient GITHUB_TOKEN for any write -- every write below
# explicitly uses the bot app token instead (see "Generate bot token").
permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  retest-failed:
    name: Retest Failed Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # !endsWith(...'[bot]') -- report comments mention sibling commands as
    # guidance text (e.g. "comment /retest-e2e"), which could otherwise
    # re-trigger those workflows against the bot's own comments.
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/retest-failed') &&
      !endsWith(github.event.comment.user.login, '[bot]')
    steps:
      # No ref override: reads OWNERS from the default branch, not the commenter's PR.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # OWNERS is the single source of truth for trust, same as /retest-e2e.
      - name: Check trusted author
        id: check-trust
        uses: ./.github/actions/hot-cluster/check-trust
        with:
          author: ${{ github.event.comment.user.login }}

      # Ambient token, not the bot app: the bot app is only installed with
      # Issues + Pull requests write (see ci-scripts/README.md), so it has
      # no Checks permission to grant a token here at all -- and reads
      # (unlike issues/actions writes) work fine on the ambient token
      # regardless of fork origin. Runs unconditionally (cheap, two reads)
      # rather than gating on trust, keeping this step's own logic simple;
      # the untrusted-author rejection happens in the next step instead.
      - name: Read PR context and gating state
        id: context
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: prNumber,
            });
            const headSha = pr.head.sha;
            const baseRef = pr.base.ref;

            core.setOutput('head_sha', headSha);
            core.setOutput('base_ref', baseRef);

            // Hold always wins, regardless of the current gating result --
            // only /retest-e2e lifts a /hold-e2e hold.
            const isHeld = (pr.labels || []).some((label) => label.name === 'e2e-hold');
            if (isHeld) {
              core.info(`PR #${prNumber} is on hold via /hold-e2e -- not evaluating "Run Gating Tests" further.`);
              core.setOutput('e2e_action', 'held');
              return;
            }

            const { data: existing } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: headSha,
              check_name: 'Run Gating Tests',
            });
            const [latest] = existing.check_runs.sort(
              (a, b) => new Date(b.started_at) - new Date(a.started_at),
            );

            if (latest && latest.status !== 'completed') {
              core.info(`PR #${prNumber}: "Run Gating Tests" is still ${latest.status} -- nothing to retest yet.`);
              core.setOutput('e2e_action', 'skip_running');
            } else if (latest && latest.conclusion === 'success') {
              core.info(`PR #${prNumber}: "Run Gating Tests" already passed for ${headSha} -- nothing to retest.`);
              core.setOutput('e2e_action', 'skip_passing');
            } else {
              core.info(`PR #${prNumber}: "Run Gating Tests" is ${latest ? latest.conclusion : 'missing'} for ${headSha} -- eligible for a fresh dispatch.`);
              core.setOutput('e2e_action', 'dispatch');
            }

      # See ci-scripts/README.md ("Check-Run & Retest Model") for why this
      # needs the bot app, not GITHUB_TOKEN. continue-on-error: a bad
      # credential must still let the next step run and report the failure,
      # not skip silently.
      - name: Generate bot token
        id: bot-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          # pull-requests: write, not read -- reacting and commenting target
          # the PR, even though those endpoint paths are /issues/... (see
          # ci-scripts/README.md). actions: write both re-runs failed jobs
          # and dispatches a fresh Hot Cluster E2E run.
          permission-pull-requests: write
          permission-issues: write
          permission-actions: write

      - name: Retest failed CI/PR Validation and dispatch E2E if needed
        id: retest
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          TRUSTED: ${{ steps.check-trust.outputs.trusted }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          BASE_REF: ${{ steps.context.outputs.base_ref }}
          E2E_ACTION: ${{ steps.context.outputs.e2e_action }}
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const { reactToComment, enforceCommentTrust } = require('./ci-scripts/hot-cluster/js/pr-command-helpers.cjs');
            const author = context.payload.comment.user.login;
            const react = (content) => reactToComment(github, context, core, content);

            try {
              const trusted = process.env.TRUSTED === 'true';
              if (!(await enforceCommentTrust(core, react, author, trusted, '/retest-failed'))) return;

              const prNumber = context.issue.number;
              const headSha = process.env.HEAD_SHA;
              const baseRef = process.env.BASE_REF;

              core.info(`/retest-failed requested by ${author} on PR #${prNumber} (HEAD: ${headSha}, base: ${baseRef})`);
              await react('rocket');

              // Re-runs only the failed jobs of the latest run of
              // `workflowId` at this commit -- never a fresh dispatch, so
              // an already-passing or still-running run is left untouched.
              const rerunFailedJobs = async (workflowId, label) => {
                const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                  ...context.repo,
                  workflow_id: workflowId,
                  head_sha: headSha,
                  per_page: 100,
                });
                const [latest] = runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                if (!latest) {
                  return { outcome: 'skip', detail: `no ${label} run found for this commit`, url: '' };
                }
                if (latest.status !== 'completed') {
                  return { outcome: 'skip', detail: `${label} is still ${latest.status}`, url: latest.html_url };
                }
                // 'cancelled' handled separately from 'failure'/'timed_out':
                // reRunWorkflowFailedJobs only targets jobs whose own
                // conclusion is 'failure', so a run that was cancelled
                // outright (no job actually reached 'failure') has nothing
                // eligible and the API call 403s -- which would otherwise
                // bubble up to the outer try/catch and mask both this and
                // the other check's result behind a generic error.
                if (latest.conclusion === 'cancelled') {
                  return { outcome: 'skip', detail: `${label} was cancelled, not failed -- re-run it manually from the Actions tab`, url: latest.html_url };
                }
                if (!['failure', 'timed_out'].includes(latest.conclusion)) {
                  return { outcome: 'skip', detail: `${label} already ${latest.conclusion}`, url: latest.html_url };
                }

                await github.rest.actions.reRunWorkflowFailedJobs({ ...context.repo, run_id: latest.id });
                return { outcome: 'rerun', detail: '', url: latest.html_url };
              };

              // Each check gets its own error boundary: a genuine failure
              // processing CI (e.g. a transient API error) must not skip PR
              // Validation's rerun or the E2E dispatch below -- all three
              // are independent operations for independent surfaces.
              const rerunFailedJobsSafe = async (workflowId, label) => {
                try {
                  return await rerunFailedJobs(workflowId, label);
                } catch (err) {
                  core.warning(`Could not process ${label} at ${headSha}: ${err.message || err}`);
                  return { outcome: 'error', detail: err.message || String(err), url: '' };
                }
              };

              const [ci, prValidation] = await Promise.all([
                rerunFailedJobsSafe('ci_checks.yml', 'CI'),
                rerunFailedJobsSafe('pr_validation.yml', 'PR Validation'),
              ]);

              core.setOutput('ci_outcome', ci.outcome);
              core.setOutput('ci_detail', ci.detail);
              core.setOutput('ci_url', ci.url);
              core.setOutput('prv_outcome', prValidation.outcome);
              core.setOutput('prv_detail', prValidation.detail);
              core.setOutput('prv_url', prValidation.url);

              // e2e_action was already fully decided by the "Read PR context
              // and gating state" step (including the /hold-e2e check) --
              // this only acts on it. Runs regardless of the CI/PR
              // Validation outcomes above -- E2E is an independent surface.
              const e2eAction = process.env.E2E_ACTION;
              if (e2eAction === 'dispatch') {
                await github.rest.actions.createWorkflowDispatch({
                  ...context.repo,
                  workflow_id: 'hot-cluster-e2e.yml',
                  ref: 'main',
                  inputs: {
                    pr_number: String(prNumber),
                    base_ref: baseRef,
                    skip_pool_check: 'true',
                  },
                });
                core.info(`Dispatched a fresh Hot Cluster E2E run for PR #${prNumber} (base_ref=${baseRef}) -- "Run Gating Tests" was not currently passing.`);
              } else {
                core.info(`Skipping Hot Cluster E2E dispatch for PR #${prNumber} (reason: ${e2eAction}).`);
              }
              core.setOutput('e2e_action', e2eAction);

              // Outputs above are already set for the report step to read
              // -- fail the job afterward (not by throwing) so a genuine
              // per-check error is still visible in the Actions UI without
              // losing the other results or skipping this report.
              const erroredLabels = [
                ci.outcome === 'error' && 'CI',
                prValidation.outcome === 'error' && 'PR Validation',
              ].filter(Boolean);
              if (erroredLabels.length > 0) {
                core.setFailed(`Could not process: ${erroredLabels.join(', ')} -- see warnings above.`);
              }
            } catch (err) {
              core.setOutput('unexpected_error', 'true');
              core.setOutput('error_message', err.message || String(err));
              core.setFailed(`Unexpected error while processing /retest-failed: ${err.message || err}`);
            }

      # Bot app token, not secrets.GITHUB_TOKEN: the latter's issues scope
      # is forced read-only for a fork PR regardless of declared permissions.
      # Keyed on e2e_action (the last output set on the happy path) rather
      # than steps.retest.outcome == 'success' -- a per-check error now
      # still lets this step run (outcome is 'failure' in that case, via
      # core.setFailed, but ci_outcome/prv_outcome/e2e_action were all set
      # regardless) so the PR still gets the full picture instead of no
      # comment at all. Still skipped for an untrusted author or a genuine
      # unexpected error before any outputs were set (see the next step).
      - name: Report retest outcome on the PR
        if: steps.retest.outputs.e2e_action != ''
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const ciOutcome = ${{ toJSON(steps.retest.outputs.ci_outcome) }};
            const ciDetail = ${{ toJSON(steps.retest.outputs.ci_detail) }};
            const ciUrl = ${{ toJSON(steps.retest.outputs.ci_url) }};
            const prvOutcome = ${{ toJSON(steps.retest.outputs.prv_outcome) }};
            const prvDetail = ${{ toJSON(steps.retest.outputs.prv_detail) }};
            const prvUrl = ${{ toJSON(steps.retest.outputs.prv_url) }};
            const e2eAction = ${{ toJSON(steps.retest.outputs.e2e_action) }};

            const describe = (name, outcome, detail, url) => {
              if (outcome === 'rerun') {
                return `- **${name}**: re-running failed jobs${url ? ` ([latest run](${url}))` : ''}.`;
              }
              if (outcome === 'error') {
                return `- **${name}**: ⚠️ could not check -- ${detail}.`;
              }
              return `- **${name}**: skipped -- ${detail}${url ? ` ([latest run](${url}))` : ''}.`;
            };

            const e2eLines = {
              dispatch: '- **Hot Cluster E2E**: dispatching a fresh run -- `Run Gating Tests` was not currently passing for this commit.',
              held: '- **Hot Cluster E2E**: skipped -- this PR is on hold via `/hold-e2e`. `/retest-failed` never lifts a hold; comment `/retest-e2e` to lift it and get a fresh result.',
              skip_running: '- **Hot Cluster E2E**: skipped -- a run is already in progress for this commit.',
              skip_passing: '- **Hot Cluster E2E**: skipped -- `Run Gating Tests` already passed for this commit.',
            };

            const body = [
              '🔁 `/retest-failed` processed for this PR:',
              '',
              describe('CI', ciOutcome, ciDetail, ciUrl),
              describe('PR Validation', prvOutcome, prvDetail, prvUrl),
              e2eLines[e2eAction] ?? `- **Hot Cluster E2E**: ${e2eAction}`,
            ].join('\n');

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Report unexpected retest failure on the PR
        if: steps.retest.outputs.unexpected_error == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const errorMessage = ${{ toJSON(steps.retest.outputs.error_message) }};
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                '⚠️ `/retest-failed` hit an unexpected error and did not finish processing:',
                '',
                '```',
                errorMessage,
                '```',
                '',
                'This usually means the `kubevirt-plugin-bot` GitHub App token (BOT_APP_ID / BOT_APP_PRIVATE_KEY) is misconfigured or the app was uninstalled — a maintainer should check it. ' +
                  'In the meantime, re-run the failed workflow manually from the Actions tab.',
              ].join('\n'),
            });

      - name: Fail job if retest did not succeed
        if: steps.retest.outcome == 'failure'
        run: exit 1

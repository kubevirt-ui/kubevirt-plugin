name: PR Validation

# Optional repository variables (Settings → Secrets and variables → Actions → Variables):
# - PR_VALIDATION_LIFECYCLE_ACTIONS
# - PR_VALIDATION_LABEL_ACTIONS
# - AI_CONFIG_VALIDATION_LABELS  (sync with .github/scripts/src/ai-config-validation/constants.ts)
# - JIRA_VALIDATION_LABELS       (sync with .github/scripts/src/types/config.ts)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write
  statuses: write

jobs:
  ai-config-validation:
    name: ai-config-validation
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' &&
      (
        contains(fromJSON(vars.PR_VALIDATION_LIFECYCLE_ACTIONS || '["opened","synchronize","reopened"]'), github.event.action) ||
        (
          contains(fromJSON(vars.PR_VALIDATION_LABEL_ACTIONS || '["labeled","unlabeled"]'), github.event.action) &&
          contains(fromJSON(vars.AI_CONFIG_VALIDATION_LABELS || '["ai-config-changed","do-not-merge/ai-config-review","ai-config-reviewed","skip-ai-config-check"]'), github.event.label.name)
        )
      )
    concurrency:
      group: ai-config-check-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout base branch scripts
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          sparse-checkout: .github/scripts

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Run AI configuration PR validation
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_EVENT_ACTION: ${{ github.event.action }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: npx tsx src/ai-config-validation/index.ts

  jira-validation:
    name: jira-validation
    runs-on: ubuntu-latest
    concurrency:
      group: jira-check-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    if: >
      (
        github.event_name == 'pull_request_target' &&
        (
          contains(fromJSON(vars.PR_VALIDATION_LIFECYCLE_ACTIONS || '["opened","synchronize","reopened"]'), github.event.action) ||
          (
            contains(fromJSON(vars.PR_VALIDATION_LABEL_ACTIONS || '["labeled","unlabeled"]'), github.event.action) &&
            contains(fromJSON(vars.JIRA_VALIDATION_LABELS || '["skip-jira-check","do-not-merge/jira-invalid"]'), github.event.label.name)
          )
        )
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '/recheck-jira')
      )
    steps:
      - name: Get PR info (comment trigger)
        if: github.event_name == 'issue_comment'
        id: pr-info
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('title', pr.title);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_sha', pr.head.sha);

      - name: Checkout base branch scripts
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.ref || steps.pr-info.outputs.base_ref }}
          sparse-checkout: .github/scripts

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install script dependencies
        working-directory: .github/scripts
        run: npm ci

      - name: Run Jira PR validation
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PR_TITLE: ${{ github.event.pull_request.title || steps.pr-info.outputs.title }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || steps.pr-info.outputs.base_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || steps.pr-info.outputs.head_sha }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: npx tsx src/jira-validation/index.ts

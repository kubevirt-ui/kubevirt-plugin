name: OK to Test Gate

# hot-cluster-e2e.yml used to listen for labeled directly, so every bot
# label (lgtm, approved, jira/valid-reference, ...) re-triggered its full
# 5-job graph just to skip all 5 -- 5 "Skipped" rows in the merge box per
# irrelevant label. ok-to-test is the only label that needs to trigger a
# real run, so this one-job gatekeeper is now the only thing listening for
# labeled at all, dispatching the real workflow only when it matters. See
# ci-scripts/README.md ("Check-Run & Retest Model").
on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  actions: write

jobs:
  dispatch-if-ok-to-test:
    name: Dispatch Hot Cluster E2E if ok-to-test
    # Also skipped while /hold-e2e is active -- see hot-cluster-e2e-pr-gate.yml's
    # identical guard for why.
    if: github.event.label.name == 'ok-to-test' && !contains(github.event.pull_request.labels.*.name, 'e2e-hold')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Setup scripts
        uses: ./.github/actions/setup-gh-scripts
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Dispatch hot-cluster-e2e.yml
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        working-directory: .github/scripts
        run: npx tsx src/commands/ok-to-test-dispatch.ts

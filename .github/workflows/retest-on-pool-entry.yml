name: Retest On Pool Entry

# retest-stale-gating.yml only re-evaluates the merge pool on main pushes.
# This covers the gap when a PR becomes pool-eligible (lgtm+approved, or a
# blocking label removed) while its "Run Gating Tests" check is still the
# stale marker. See ci-scripts/README.md ("Check-Run & Retest Model").
on:
  pull_request_target:
    types: [labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read
  checks: read
  actions: write

jobs:
  retest-if-newly-pooled-and-stale:
    name: Retest if Newly Pool-Eligible and Stale
    if: |
      (github.event.action == 'labeled' && (github.event.label.name == 'lgtm' || github.event.label.name == 'approved')) ||
      (github.event.action == 'unlabeled' && (
        github.event.label.name == 'hold' ||
        github.event.label.name == 'needs-rebase' ||
        startsWith(github.event.label.name, 'do-not-merge/')
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      # Pin to default branch: pull_request_target checks out the PR base,
      # which may lack ci-scripts/hot-cluster/ on older release branches.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup scripts
        uses: ./.github/actions/setup-gh-scripts
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Dispatch retest if now pool-eligible and check is stale
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels) }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        working-directory: .github/scripts
        run: npx tsx src/merge/pool-entry.ts

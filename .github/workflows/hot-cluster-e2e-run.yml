name: Hot Cluster E2E Run
run-name: "Hot Cluster E2E Run [${{ inputs.cluster_name || inputs.runner_label || 'kubevirt-plugin-ci' }}]"

on:
  workflow_dispatch:
    inputs:
      test_project:
        description: Test project/suite to run (gating, or the features/tier1 equivalent)
        required: true
        default: gating
        type: choice
        options:
          - gating
          - features
      test_engine:
        description: |
          E2E test engine to run against the checked-out code. Defaults to
          playwright -- there's no base branch to auto-detect from outside
          hot-cluster-e2e.yml's pull_request_target path, so set this
          explicitly to cypress when manually testing a release-4.22-or-
          earlier ref.
        required: false
        default: playwright
        type: choice
        options:
          - playwright
          - cypress
      runner_label:
        description: ARC runner label (defaults to kubevirt-plugin-ci)
        required: false
        default: ''
        type: string
      cluster_name:
        description: Cluster name for run tagging (defaults to runner_label)
        required: false
        default: ''
        type: string
      cnv_pin_version:
        description: |
          CNV version pinned for this cluster (e.g. 4.20, 4.21, 4.22), as
          resolved by hot-cluster-e2e.yml's prepare job (resolve-config
          step). Only affects Cypress's TEST_NS/TEST_SECRET_NAME -- see
          this workflow's TEST_NS/TEST_SECRET_NAME env for why. Leave
          empty for a standalone dispatch (falls back to the fixed
          release-4.20-era naming).
        required: false
        default: ''
        type: string
      checkout_ref:
        description: |
          Ref/SHA to check out for the code under test. Leave empty for the
          default (PR head SHA, or the triggering ref for a plain manual
          run). Set to refs/pull/<N>/merge to test a PR merged with the
          current base tip instead of the PR's head commit in isolation
          (used by hot-cluster-e2e.yml's pr_number retest path).
        required: false
        default: ''
        type: string
      progress_status_sha:
        description: |
          Commit SHA to post the "Running gating tests" progress status
          against once the actual test command starts (passed by
          hot-cluster-e2e.yml). Leave empty to skip -- e.g. a standalone
          workflow_dispatch test run of this file alone.
        required: false
        default: ''
        type: string
      progress_status_context:
        description: |
          Commit-status context name to post the above under. Must match
          hot-cluster-e2e.yml's "Hot Cluster E2E Progress" naming
          convention (including its manual-dispatch variant) -- see that
          workflow's progress-check-running-tests job.
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      test_project:
        description: Test project/suite to run (gating, or the features/tier1 equivalent)
        type: string
        required: false
        default: gating
      test_engine:
        description: |
          E2E test engine to run against the checked-out code (playwright or
          cypress). See hot-cluster-e2e.yml's prepare job (resolve-config
          step) for how this is auto-detected from the target branch.
        type: string
        required: false
        default: playwright
      runner_label:
        description: ARC runner label (defaults to kubevirt-plugin-ci)
        type: string
        required: false
        default: ''
      cluster_name:
        description: Cluster name for run tagging (defaults to runner_label)
        type: string
        required: false
        default: ''
      cnv_pin_version:
        description: |
          CNV version pinned for this cluster (e.g. 4.20, 4.21, 4.22), as
          resolved by hot-cluster-e2e.yml's prepare job (resolve-config
          step). Only affects Cypress's TEST_NS/TEST_SECRET_NAME -- see
          this workflow's TEST_NS/TEST_SECRET_NAME env for why. Leave
          empty for a standalone dispatch (falls back to the fixed
          release-4.20-era naming).
        type: string
        required: false
        default: ''
      checkout_ref:
        description: |
          Ref/SHA to check out for the code under test. Leave empty for the
          default (PR head SHA, or the triggering ref for a plain manual
          run). Set to refs/pull/<N>/merge to test a PR merged with the
          current base tip instead of the PR's head commit in isolation
          (used by hot-cluster-e2e.yml's pr_number retest path).
        type: string
        required: false
        default: ''
      is_reusable_call:
        description: |
          Internal marker set only by hot-cluster-e2e.yml's own `uses:` call
          -- never available on the workflow_dispatch trigger, so it's
          reliably false for a standalone dispatch. Distinguishes that case
          (whose test-execution job would otherwise be a top-level,
          bare-named check-run that can collide with an unrelated open PR
          sharing the same SHA -- confirmed live on CNV-92682/PR #4293) from
          being called via `uses:` (where GitHub already composite-prefixes
          the check name, e.g. "Run E2E Tests / Execute tests", so no
          collision is possible regardless of this flag). Named "Execute
          tests" (not "Run Gating Tests") specifically so it can never
          collide with the top-level "Run Gating Tests" required check
          owned solely by hot-cluster-e2e.yml's own verify-gating-tests job
          -- see CNV-92582, which documented this exact naming trap.
        type: boolean
        required: false
        default: false
      progress_status_sha:
        description: |
          Commit SHA to post the "Running gating tests" progress status
          against once the actual test command starts (passed by
          hot-cluster-e2e.yml). Leave empty to skip -- e.g. a standalone
          workflow_dispatch test run of this file alone.
        type: string
        required: false
        default: ''
      progress_status_context:
        description: |
          Commit-status context name to post the above under. Must match
          hot-cluster-e2e.yml's "Hot Cluster E2E Progress" naming
          convention (including its manual-dispatch variant) -- see that
          workflow's progress-check-running-tests job.
        type: string
        required: false
        default: ''

permissions:
  contents: read
  actions: read
  statuses: write

env:
  CNV_NS: openshift-cnv
  OS_IMAGES_NS: openshift-virtualization-os-images
  TEST_NS: kubevirt-plugin-ci-test-${{ github.run_id }}
  TEST_SECRET_NAME: ci-test-secret

  KUBEVIRT_PLUGIN_IMAGE: 'ttl.sh/kubevirt-plugin-ci-${{ github.run_id }}-${{ github.run_attempt }}:2h'

  CI_ENV_NS: ci-env
  CI_ENV_CM: ci-env-${{ github.run_id }}

jobs:
  build-kubevirt-plugin-image:
    name: Build Kubevirt Plugin Image
    runs-on: ubuntu-latest
    outputs:
      kubevirt-plugin-image: ${{ env.KUBEVIRT_PLUGIN_IMAGE }}
    steps:
      # inputs.checkout_ref (set to refs/pull/<N>/merge for the main-push
      # retest path in hot-cluster-e2e.yml) takes priority over the PR's own
      # head SHA -- see the checkout_ref input above for why: testing the
      # merge with the current base tip, not the PR's isolated head commit.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || github.event.pull_request.head.sha || github.ref }}
          allow-unsafe-pr-checkout: true
          # This job's token now carries statuses: write (see
          # hot-cluster-e2e.yml's run-e2e-tests job) -- persisting it to
          # .git/config would let PR-controlled code checked out below
          # (e.g. a malicious test-suite change) read it straight off
          # disk and post arbitrary commit statuses repo-wide. Checkout
          # itself doesn't need the credential to persist afterward (no
          # further git operations happen in this job).
          persist-credentials: false

      - name: Check if kubevirt-plugin image exists in registry
        id: check_image
        run: |
          if skopeo inspect docker://${KUBEVIRT_PLUGIN_IMAGE} &>/dev/null; then
            echo "IMAGE_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate tags for the kubevirt-plugin image
        id: meta
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_SET_OUTPUT_ENV: false
        with:
          images: ${{ env.KUBEVIRT_PLUGIN_IMAGE }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        env:
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          {
            echo "## Labels"
            echo "\`\`\`"
            echo "${LABELS}"
            echo "\`\`\`"
          } | tee -a "$GITHUB_STEP_SUMMARY"

          LABEL_ARGS=()
          while IFS= read -r line; do
            [ -n "$line" ] && LABEL_ARGS+=(--label "$line")
          done <<< "$LABELS"

          podman build "${LABEL_ARGS[@]}" -t ${KUBEVIRT_PLUGIN_IMAGE} -f Dockerfile .
          podman push ${KUBEVIRT_PLUGIN_IMAGE}

  run-gating-tests:
    # inputs.is_reusable_call is only ever true when hot-cluster-e2e.yml
    # calls this workflow via `uses:` -- see that input's own description
    # for why a standalone dispatch needs a distinctly-named check here.
    # Deliberately NOT named "Run Gating Tests" -- that name is reserved
    # exclusively for hot-cluster-e2e.yml's own top-level verify-gating-
    # tests job (the sole required check). See is_reusable_call above.
    name: ${{ inputs.is_reusable_call && 'Execute tests' || 'Execute tests (standalone dispatch)' }}
    needs: [build-kubevirt-plugin-image]
    runs-on: ${{ inputs.runner_label || 'kubevirt-plugin-ci' }}
    timeout-minutes: 120
    # Only the fixed-namespace Cypress case (see TEST_NS/TEST_SECRET_NAME
    # below -- release-4.20, any future/unknown cnv_pin_version, or a bare
    # standalone dispatch) still shares auto-test-ns/auto-test-secret across
    # runs, so serialize same-cluster runs of that case rather than let them
    # clobber each other's namespace mid-run (CNV-92722 finding 6, part B).
    # release-4.21/4.22 already got a genuine per-run namespace above, so
    # they fall into the no-op `no-lock-<run_id>` group instead -- a group
    # that's unique to this run and therefore never queues against anything.
    # cancel-in-progress: false is deliberate: unlike the PR-vs-PR retest
    # concurrency group in hot-cluster-e2e.yml (where cancelling a superseded
    # run is correct), two different PRs sharing a fixed namespace must be
    # queued one after another, not have one silently killed mid-run.
    # queue: max is required for that "queued one after another" intent to
    # actually hold: GitHub's default (queue: single) keeps only a single
    # pending run per group and CANCELS an older pending run outright the
    # moment a third one arrives in the same group -- silently defeating
    # this lock for a 3rd/4th concurrent PR without it (confirmed via
    # GitHub's own concurrency docs).
    # inputs.cluster_name falls back to inputs.runner_label, matching
    # run-gating-tests' own runs-on: above and this workflow's run-name --
    # a bare cluster_name (e.g. a standalone dispatch that only set
    # runner_label) must still land in the same group as an automated run
    # targeting that same physical cluster, or this lock silently no-ops
    # for exactly the case it's meant to protect.
    concurrency:
      group: >-
        ${{
          ((inputs.test_engine || 'playwright') == 'cypress' && inputs.cnv_pin_version != '4.21' && inputs.cnv_pin_version != '4.22') &&
          format('cypress-fixed-ns-{0}', inputs.cluster_name || inputs.runner_label || 'kubevirt-plugin-ci') ||
          format('no-lock-{0}', github.run_id)
        }}
      cancel-in-progress: false
      queue: max
    env:
      PLUGIN_IMAGE: ${{ needs.build-kubevirt-plugin-image.outputs.kubevirt-plugin-image }}
      HEADLESS: 'true'
      RUN_FEATURE_TESTS: ${{ inputs.test_project == 'features' && 'true' || 'false' }}
      # Both playwright/fixtures/ and cypress/fixtures/ have a matching
      # layout, so the engine name doubles as the fixtures directory name.
      TEST_ENGINE: ${{ inputs.test_engine || 'playwright' }}
      # Cypress's frozen release-branch test content (predates the
      # Playwright migration) hardcodes fixed resource names that the
      # dynamic per-run values below can't reach on every branch:
      #   - release-4.20's cypress/utils/const/index.ts hardcodes
      #     TEST_NS = 'auto-test-ns' as a literal string -- no mechanism
      #     to read Cypress.env('TEST_NS') at all.
      #   - release-4.20's TEST_SECRET_NAME is likewise hardcoded to
      #     'auto-test-secret', matching cypress/fixtures/secret.yaml's
      #     own hardcoded metadata.name.
      #   - release-4.21/4.22, by contrast, already read both dynamically
      #     via Cypress.env(...) -- confirmed live during CNV-92722
      #     validation -- so they get a genuine per-run name below
      #     instead of the fixed one, removing the cross-PR namespace-
      #     collision risk entirely for those two (CNV-92722 finding 6):
      #     two concurrent same-branch PRs on the same cluster no longer
      #     share auto-test-ns/auto-test-secret and can't clobber each
      #     other's console mid-run. release-4.20 (and any future/unknown
      #     pin, including a bare standalone dispatch with no
      #     cnv_pin_version at all) keeps the fixed fallback name -- see
      #     the run-gating-tests job-level concurrency block below for
      #     how that fixed-namespace case is instead serialized rather
      #     than made collision-proof.
      # CYPRESS_TEST_NS/CYPRESS_TEST_SECRET_NAME are exported from these
      # further down but were never consumed by release-4.20's frozen
      # code -- override both here to match instead. Playwright keeps
      # the dynamic per-run values from the workflow-level env: above.
      TEST_NS: >-
        ${{
          (inputs.test_engine || 'playwright') != 'cypress' && format('kubevirt-plugin-ci-test-{0}', github.run_id) ||
          (inputs.cnv_pin_version == '4.21' || inputs.cnv_pin_version == '4.22') && format('auto-test-ns-{0}', github.run_id) ||
          'auto-test-ns'
        }}
      TEST_SECRET_NAME: >-
        ${{
          (inputs.test_engine || 'playwright') != 'cypress' && 'ci-test-secret' ||
          (inputs.cnv_pin_version == '4.21' || inputs.cnv_pin_version == '4.22') && format('auto-test-secret-{0}', github.run_id) ||
          'auto-test-secret'
        }}

    steps:
      # Folded in from the former standalone "Check Runner Image" job
      # (same ${{ inputs.runner_label || 'kubevirt-plugin-ci' }} runner
      # this job already runs on) -- merging it into this job's own steps
      # drops one more row from the PR merge box without losing the
      # diagnostics themselves. Failing fast here (before Checkout/image
      # provisioning) still catches a broken ARC runner image before any
      # real test-environment cost is spent.
      - name: Log environment summary
        run: |
          {
            echo "<details><summary>Key Environment Variables</summary>"
            echo ""
            echo "| Variable | Value |"
            echo "| --- | --- |"
            for var in HOME USER RUNNER_NAME RUNNER_OS RUNNER_ARCH \
                       GITHUB_REPOSITORY GITHUB_REF GITHUB_SHA GITHUB_RUN_ID GITHUB_RUN_NUMBER \
                       CNV_NS OS_IMAGES_NS TEST_NS KUBEVIRT_PLUGIN_IMAGE KUBEVIRT_UI_PLUGIN_RUNNER; do
              echo "| \`$var\` | \`${!var:-<unset>}\` |"
            done
            echo "</details>"
            echo ""

            echo "<details><summary>Tool Availability</summary>"
            echo ""
            echo "| Tool | Available |"
            echo "| --- | --- |"
            missing=0
            for cmd in jq yq envsubst curl kubectl oc virtctl helm npm node; do
              if command -v "$cmd" &>/dev/null; then
                echo "| \`$cmd\` | ✅ |"
              else
                echo "| \`$cmd\` | ❌ |"
                missing=1
              fi
            done
            echo "</details>"
            echo ""
            if [[ "${missing}" -ne 0 ]]; then
              echo "::error::Required tools are missing on the ARC runner"
              exit 1
            fi

            echo "<details><summary>npm / Node Versions</summary>"
            echo ""
            echo "\`\`\`json"
            npm version --json 2>/dev/null || echo "npm not found"
            echo "\`\`\`"
            echo "</details>"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Log Client / Server Versions
        run: |
          {
            echo "<details><summary>Client / Server Versions</summary>"
            echo ""
            echo "| Tool | Client Version | Server Version |"
            echo "| --- | --- | --- |"
            failed=0
            for cmd in oc virtctl; do
              if command -v "$cmd" &>/dev/null; then
                if ! version_output=$("$cmd" version 2>/dev/null); then
                  echo "| \`$cmd\` | ❌ version failed | ❌ |"
                  failed=1
                  continue
                fi
                client=$(echo "$version_output" | grep -i "client" | head -1 | sed 's/^[[:space:]]*//')
                server=$(echo "$version_output" | grep -i "server" | head -1 | sed 's/^[[:space:]]*//')
                echo "| \`$cmd\` | ${client:-N/A} | ${server:-N/A} |"
              else
                echo "| \`$cmd\` | ❌ not found | — |"
                failed=1
              fi
            done
            echo "</details>"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"
          if [[ "${failed}" -ne 0 ]]; then
            echo "::error::Client/server version checks failed"
            exit 1
          fi

      - name: Log HCO and managed operator versions
        continue-on-error: true
        run: |
          {
            echo "<details><summary>HCO & Managed Operator Versions</summary>"
            echo ""

            if ! command -v oc &>/dev/null; then
              echo "> ⚠️ \`oc\` not found — skipping cluster version checks."
            else
              echo "### HCO Version (OLM CSV)"
              echo ""
              echo "| Name | Version | Phase |"
              echo "| --- | --- | --- |"
              oc get csv -n openshift-cnv --no-headers 2>/dev/null \
                | grep -i hyperconverged \
                | awk '{ print "| `" $1 "` | `" $2 "` | " $NF " |" }' \
                || echo "| — | HCO CSV not found | — |"
              echo ""

              echo "### HCO Managed Operand Versions"
              echo ""
              echo "| Operand | Version |"
              echo "| --- | --- |"

              HCO_LABEL="app.kubernetes.io/managed-by=hco-operator"

              kv_ver=$(oc get kubevirt -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedKubeVirtVersion}' 2>/dev/null || echo "")
              echo "| \`kubevirt\` | \`${kv_ver:-not found}\` |"

              cdi_ver=$(oc get cdi -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedVersion}' 2>/dev/null || echo "")
              echo "| \`cdi\` | \`${cdi_ver:-not found}\` |"

              ssp_ver=$(oc get ssp -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedVersion}' 2>/dev/null || echo "")
              echo "| \`ssp\` | \`${ssp_ver:-not found}\` |"

              cnao_ver=$(oc get networkaddonsconfig -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedVersion}' 2>/dev/null || echo "")
              echo "| \`cnao\` | \`${cnao_ver:-not found}\` |"

              hpp_ver=$(oc get hostpathprovisioner -A -l "${HCO_LABEL}" \
                -o jsonpath='{.items[0].status.observedVersion}' 2>/dev/null || echo "")
              echo "| \`hostpath-provisioner\` | \`${hpp_ver:-not found}\` |"
            fi
            echo "</details>"
            echo ""
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # See the build-kubevirt-plugin-image job's Checkout step above --
      # same checkout_ref precedence, so the image build and the test run
      # always test the identical tree.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || github.event.pull_request.head.sha || github.ref }}
          allow-unsafe-pr-checkout: true
          # This job's token now carries statuses: write (see
          # hot-cluster-e2e.yml's run-e2e-tests job) -- persisting it to
          # .git/config would let PR-controlled code checked out below
          # (e.g. a malicious test-suite change) read it straight off
          # disk and post arbitrary commit statuses repo-wide. Checkout
          # itself doesn't need the credential to persist afterward (no
          # further git operations happen in this job).
          persist-credentials: false

      # Referenced by owner/repo/path@main rather than the local ./ path --
      # checkout_ref can point at a release branch that predates this CI
      # infra entirely (e.g. release-4.22 and earlier, before hot-cluster
      # CI existed), so the composite action wouldn't exist in the checked-
      # out tree. Both ci-env-request and ci-env-release are self-contained
      # (pure oc/kubectl commands against the already-running ci-env-
      # controller, no other local file references), so pinning to main
      # here is safe regardless of what's checked out above.
      - name: Provision CI test environment
        id: ci-env
        uses: kubevirt-ui/kubevirt-plugin/.github/actions/ci-env-request@main
        with:
          plugin-image: ${{ env.PLUGIN_IMAGE }}
          test-namespace: ${{ env.TEST_NS }}
          configmap-name: ${{ env.CI_ENV_CM }}
          ci-env-namespace: ${{ env.CI_ENV_NS }}
          # configmap only for Cypress: its before-all hook has no way to
          # dismiss OpenShift Console's own "Welcome to the new OpenShift
          # experience" guided-tour modal (unlike Playwright, which already
          # seeds tour-completion into browser localStorage via
          # seedGuidedTourState() -- see playwright/pages/LoginPage.ts).
          # Left empty for Playwright so its console keeps the chart's
          # default (localstorage) and that existing seeding keeps working
          # unchanged. See the "Seed kubevirt-user-settings ConfigMap" step
          # below for the matching server-side seed.
          user-settings-location: ${{ env.TEST_ENGINE == 'cypress' && 'configmap' || '' }}

      - name: Create test secret
        run: |
          yq e '
            .metadata.name = strenv(TEST_SECRET_NAME) |
            .metadata.namespace = strenv(TEST_NS)
          ' "${TEST_ENGINE}/fixtures/secret.yaml" | oc apply -f -

      - name: Seed kubevirt-user-settings ConfigMap
        run: |
          SA_NAME="${CI_ENV_CM}-console"

          SA_UID="$(oc get sa "${SA_NAME}" -n "${TEST_NS}" \
            -o jsonpath='{.metadata.uid}' 2>/dev/null || true)"
          SANITIZED_NAME="system-serviceaccount-${TEST_NS}-${SA_NAME}"

          USER_SETTINGS='{"quickStart":{"dontShowWelcomeModal":true},"onboardingPopoversHidden":{"vmsTab":true,"catalog":true,"createProject":true,"navCollapse":true}}'

          if ! oc get configmap kubevirt-user-settings -n "${CNV_NS}" &>/dev/null; then
            oc create configmap kubevirt-user-settings -n "${CNV_NS}"
          fi

          PATCH=$(jq -cn \
            --arg sa_uid    "${SA_UID}" \
            --arg name_key  "${SANITIZED_NAME}" \
            --arg val       "${USER_SETTINGS}" \
            '{data: (if ($sa_uid | length) > 0 then {($sa_uid): $val, ($name_key): $val} else {($name_key): $val} end)}')

          oc patch configmap kubevirt-user-settings -n "${CNV_NS}" \
            --type merge -p "${PATCH}"

          oc patch configmap kubevirt-ui-features -n "${CNV_NS}" --type=merge \
            --patch '{"data":{"advancedSearch":"true","treeViewFolders":"true"}}'

          # Only meaningful when TEST_ENGINE=cypress (see "Provision CI test
          # environment" step above, which only sets user-settings-location=
          # configmap for that engine) -- Playwright's console stays on
          # localstorage and keeps working via its own browser-side
          # seedGuidedTourState(), so this ConfigMap wouldn't even be read
          # for a Playwright run. Seeds core OpenShift Console's own
          # guided-tour completion state so the "Welcome to the new
          # OpenShift experience" intro modal (a core console feature, not
          # kubevirt-plugin's own onboarding above) never blocks the very
          # first Cypress test. Mirrors playwright/pages/LoginPage.ts's
          # seedGuidedTourState(), adapted for configmap instead of
          # localStorage. ConfigMap name convention (user-settings-<uid>)
          # per openshift/console's getConfigMapName() -- verify live if
          # this ever silently stops working, since the naming convention
          # has evolved across console versions.
          if [[ "${TEST_ENGINE}" == "cypress" && -n "${SA_UID}" ]]; then
            GUIDED_TOUR='{"admin":{"completed":true},"dev":{"completed":true},"virtualization-perspective":{"completed":true}}'
            CONSOLE_CM_NAME="user-settings-${SA_UID}"

            if ! oc get configmap "${CONSOLE_CM_NAME}" -n openshift-console-user-settings &>/dev/null; then
              oc create configmap "${CONSOLE_CM_NAME}" -n openshift-console-user-settings
            fi
            oc patch configmap "${CONSOLE_CM_NAME}" -n openshift-console-user-settings \
              --type merge -p "$(jq -cn --arg v "${GUIDED_TOUR}" '{data: {"console.guidedTour": $v}}')"
          fi

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --no-audit

          if [[ "${TEST_ENGINE}" == "cypress" ]]; then
            # --ignore-scripts above skips Cypress's normal postinstall
            # binary download, so fetch it explicitly.
            npx cypress install
          else
            npm run playwright-install
          fi

      # Best-effort follow-up to hot-cluster-e2e.yml's own progress-check-
      # running-tests job, which already posted "Building plugin image"
      # against the same SHA/context before this reusable workflow even
      # started (that checkpoint covers this job's own runner-diagnostics
      # steps above + build-kubevirt-plugin-image + everything up to here).
      # Only hot-cluster-e2e.yml's `uses:` call ever sets progress_status_sha
      # -- a standalone workflow_dispatch of this file alone leaves it empty,
      # so this is a no-op then.
      - name: Update progress status
        if: inputs.progress_status_sha != '' && inputs.progress_status_context != ''
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          STATUS_SHA: ${{ inputs.progress_status_sha }}
          STATUS_CONTEXT: ${{ inputs.progress_status_context }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.STATUS_SHA,
              context: process.env.STATUS_CONTEXT,
              state: 'pending',
              description: 'Running gating tests',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Run gating tests
        env:
          BRIDGE_BASE_ADDRESS: ${{ steps.ci-env.outputs.bridge-base-address }}
          TEST_PROJECT: ${{ inputs.test_project }}
        run: |
          if [[ "${TEST_ENGINE}" == "cypress" ]]; then
            # Cypress only auto-exposes env vars to Cypress.env(...) when
            # they carry the CYPRESS_ prefix (or via an explicit --env
            # flag) -- the plain TEST_NS/OS_IMAGES_NS/CNV_NS/
            # TEST_SECRET_NAME already set at the job level (used by
            # Playwright and the oc/bash steps directly) are invisible to
            # the test code's Cypress.env('TEST_NS') etc. otherwise.
            export CYPRESS_TEST_NS="${TEST_NS}"
            export CYPRESS_OS_IMAGES_NS="${OS_IMAGES_NS}"
            export CYPRESS_CNV_NS="${CNV_NS}"
            export CYPRESS_TEST_SECRET_NAME="${TEST_SECRET_NAME}"

            # release-4.20/4.21's cy.patchVM/cy.stopVM (support/
            # commands.ts) run `oc patch virtualmachine <name>` with no
            # -n flag at all, relying on the runner's current oc context
            # namespace (release-4.22 passes -n explicitly, so this is a
            # no-op there). That context otherwise points wherever the
            # runner's kubeconfig happens to default (not TEST_NS), so
            # those bare oc calls 404 even though the VM exists --
            # confirmed live: the "Create customized VMs..." suite's
            # `after` hook failed with `virtualmachines.kubevirt.io
            # "vm-it-custom" not found` (CNV-92682 follow-up). Point the
            # runner's current project at TEST_NS so they resolve.
            oc project "${TEST_NS}"
            if [[ "${TEST_PROJECT}" == "features" ]]; then
              npm run test-cypress-headless -- --spec tests/tier1.cy.ts
            else
              npm run test-cypress-headless -- --spec tests/gating.cy.ts
            fi
          else
            if [[ "${TEST_PROJECT}" == "features" ]]; then
              npm run test-playwright-headless -- --project=features
            else
              npm run test-playwright-headless -- --project=gating
            fi
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TEST_ENGINE }}-results-${{ github.run_id }}
          path: |
            ${{ env.TEST_ENGINE == 'cypress' && 'cypress/gui-test-screenshots/' || 'playwright/test-results/' }}
          retention-days: 7
          if-no-files-found: ignore

      - name: e2e CI diagnostics - Collect console and plugin pod logs
        if: always()
        run: |
          TMP=/tmp/e2e-ci-diagnostics/pod-logs
          mkdir -p "${TMP}"

          HELM_RELEASE="$(oc get configmap "${CI_ENV_CM}" -n "${CI_ENV_NS}" \
            -o jsonpath='{.data.helm-release}' 2>/dev/null || true)"
          # The lookup above only falls back on a hard command failure (get
          # 403/404) -- an empty-but-present helm-release field (observed
          # live during PR #4298 attempt 3) succeeds with an empty string,
          # silently turning the selector below into the invalid literal
          # "app=-console" and returning zero logs with no error (CNV-92722
          # finding 8). CI_ENV_CM (the trigger ConfigMap name) is always
          # populated, so fall back to it explicitly whenever HELM_RELEASE
          # comes back empty for either reason.
          HELM_RELEASE="${HELM_RELEASE:-${CI_ENV_CM}}"

          oc logs -n "${TEST_NS}" -l "app=${HELM_RELEASE}-console" --tail=-1 \
            > "${TMP}/console.log" 2>&1 || true
          oc logs -n "${TEST_NS}" -l "app=${HELM_RELEASE}-plugin" --tail=-1 \
            > "${TMP}/kubevirt-plugin.log" 2>&1 || true

      - name: e2e CI diagnostics - Collect OpenShift cluster information
        if: failure()
        run: |
          TMP=/tmp/e2e-ci-diagnostics/cluster
          mkdir -p "${TMP}"

          oc cluster-info dump > "${TMP}/cluster_info.json" 2>/dev/null || true
          oc get pods -n openshift-cnv -o wide > "${TMP}/hco_pods.txt" 2>/dev/null || true
          oc get nodes -o wide > "${TMP}/nodes.txt" 2>/dev/null || true
          oc get events -n "${TEST_NS}" --sort-by='.lastTimestamp' > "${TMP}/test_ns_events.txt" 2>/dev/null || true
          oc get pods -n "${TEST_NS}" -o wide > "${TMP}/test_ns_pods.txt" 2>/dev/null || true

      - name: e2e CI diagnostics - Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-ci-diagnostics-${{ github.run_id }}
          path: /tmp/e2e-ci-diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      - name: Clean up test entities
        if: always()
        run: |
          echo "Cleaning test entities in ${TEST_NS}..."
          # Fetched from main rather than run from the checked-out tree --
          # same reasoning as the ci-env-request/ci-env-release uses:
          # below, this script may not exist on whatever checkout_ref was
          # used (e.g. a pre-hot-cluster-CI release branch).
          curl -sL "https://raw.githubusercontent.com/kubevirt-ui/kubevirt-plugin/main/ci-scripts/hot-cluster/test-cleanup.sh" | bash

      - name: Release CI test environment
        if: always()
        uses: kubevirt-ui/kubevirt-plugin/.github/actions/ci-env-release@main
        with:
          configmap-name: ${{ env.CI_ENV_CM }}
          ci-env-namespace: ${{ env.CI_ENV_NS }}

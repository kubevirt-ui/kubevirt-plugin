name: Hot Cluster E2E Run
run-name: "Hot Cluster E2E Run [${{ inputs.cluster_name || inputs.runner_label || 'kubevirt-plugin-ci' }}]"

on:
  workflow_dispatch:
    inputs:
      test_project:
        description: Test project/suite to run (gating, or the features/tier1 equivalent)
        required: true
        default: gating
        type: choice
        options:
          - gating
          - features
      test_engine:
        description: |
          E2E test engine to run against the checked-out code. Defaults to
          playwright; set explicitly to cypress when manually testing a
          release-4.22-or-earlier ref (there's no base branch to
          auto-detect from outside hot-cluster-e2e.yml's own trigger).
        required: false
        default: playwright
        type: choice
        options:
          - playwright
          - cypress
      runner_label:
        description: ARC runner label (defaults to kubevirt-plugin-ci)
        required: false
        default: ''
        type: string
      cluster_name:
        description: Cluster name for run tagging (defaults to runner_label)
        required: false
        default: ''
        type: string
      cnv_pin_version:
        description: |
          CNV version pinned for this cluster (e.g. 4.20, 4.21, 4.22), as
          resolved by hot-cluster-e2e.yml's prepare job. Only affects
          Cypress's TEST_NS/TEST_SECRET_NAME (see that env below). Leave
          empty for a standalone dispatch.
        required: false
        default: ''
        type: string
      checkout_ref:
        description: |
          Ref/SHA to check out for the code under test. Leave empty for
          the default (PR head SHA, or the triggering ref). Ignored when
          pr_number is set.
        required: false
        default: ''
        type: string
      pr_number:
        description: |
          PR number to merge fresh on top of the current base tip (used
          by hot-cluster-e2e.yml's pr_number retest path). Leave empty
          for a plain checkout_ref/PR-head dispatch.
        required: false
        default: ''
        type: string
      progress_status_sha:
        description: |
          Commit SHA to post the "Running gating tests" progress status
          against (passed by hot-cluster-e2e.yml). Leave empty to skip.
        required: false
        default: ''
        type: string
      progress_status_context:
        description: |
          Commit-status context name to post the above under. Must match
          hot-cluster-e2e.yml's "Hot Cluster E2E Progress" naming.
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      test_project:
        description: Test project/suite to run (gating, or the features/tier1 equivalent)
        type: string
        required: false
        default: gating
      test_engine:
        description: E2E test engine to run (playwright or cypress); see hot-cluster-e2e.yml's prepare job for auto-detection.
        type: string
        required: false
        default: playwright
      runner_label:
        description: ARC runner label (defaults to kubevirt-plugin-ci)
        type: string
        required: false
        default: ''
      cluster_name:
        description: Cluster name for run tagging (defaults to runner_label)
        type: string
        required: false
        default: ''
      cnv_pin_version:
        description: |
          CNV version pinned for this cluster (e.g. 4.20, 4.21, 4.22), as
          resolved by hot-cluster-e2e.yml's prepare job. Only affects
          Cypress's TEST_NS/TEST_SECRET_NAME (see that env below). Leave
          empty for a standalone dispatch.
        type: string
        required: false
        default: ''
      checkout_ref:
        description: |
          Ref/SHA to check out for the code under test. Leave empty for
          the default (PR head SHA, or the triggering ref). Ignored when
          pr_number is set.
        type: string
        required: false
        default: ''
      pr_number:
        description: |
          PR number to merge fresh on top of the current base tip (used
          by hot-cluster-e2e.yml's pr_number retest path). Leave empty
          for a plain checkout_ref/PR-head dispatch.
        type: string
        required: false
        default: ''
      is_reusable_call:
        description: |
          Internal marker, true only when hot-cluster-e2e.yml calls this
          workflow via `uses:`. Distinguishes a standalone dispatch (whose
          test-execution job needs a distinctly-named check to avoid
          colliding with an unrelated PR on the same SHA) from a nested
          call (already composite-prefixed by GitHub). Named "Execute
          tests" (not "Run Gating Tests") so it never collides with the
          top-level required check owned by verify-gating-tests.
        type: boolean
        required: false
        default: false
      progress_status_sha:
        description: |
          Commit SHA to post the "Running gating tests" progress status
          against (passed by hot-cluster-e2e.yml). Leave empty to skip.
        type: string
        required: false
        default: ''
      progress_status_context:
        description: |
          Commit-status context name to post the above under. Must match
          hot-cluster-e2e.yml's "Hot Cluster E2E Progress" naming.
        type: string
        required: false
        default: ''
    outputs:
      test_failure_summary:
        description: Markdown summary of Playwright test failures parsed from JUnit XML (empty when all tests pass or XML is unavailable)
        value: ${{ jobs.run-gating-tests.outputs.test_failure_summary }}

permissions:
  contents: read
  actions: read
  statuses: write

env:
  CNV_NS: openshift-cnv
  OS_IMAGES_NS: openshift-virtualization-os-images
  TEST_NS: kubevirt-plugin-ci-test-${{ github.run_id }}
  TEST_SECRET_NAME: ci-test-secret

  KUBEVIRT_PLUGIN_IMAGE: 'ttl.sh/kubevirt-plugin-ci-${{ github.run_id }}-${{ github.run_attempt }}:2h'

  CI_ENV_NS: ci-env
  CI_ENV_CM: ci-env-${{ github.run_id }}

jobs:
  build-kubevirt-plugin-image:
    name: Build Kubevirt Plugin Image
    runs-on: ubuntu-latest
    outputs:
      kubevirt-plugin-image: ${{ env.KUBEVIRT_PLUGIN_IMAGE }}
    steps:
      # A live PR trigger and an explicit pr_number retest (e.g. a
      # main-push retest) both merge the PR's actual head fresh onto the
      # current base tip -- see the action's own comment for why this
      # can't just be checkout_ref: refs/pull/<N>/merge.
      - name: Checkout
        uses: kubevirt-ui/kubevirt-plugin/.github/actions/hot-cluster/checkout-for-retest@main
        with:
          checkout-ref: ${{ inputs.checkout_ref }}
          pr-number: ${{ inputs.pr_number }}

      - name: Install infra script dependencies
        working-directory: ci-scripts/hot-cluster/ts
        run: npm ci --ignore-scripts --no-audit

      - name: Check if kubevirt-plugin image exists in registry
        id: check_image
        working-directory: ci-scripts/hot-cluster/ts
        run: npx tsx src/scripts/check-image-exists.ts

      - name: Generate tags for the kubevirt-plugin image
        id: meta
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_SET_OUTPUT_ENV: false
        with:
          images: ${{ env.KUBEVIRT_PLUGIN_IMAGE }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push
        if: steps.check_image.outputs.IMAGE_EXISTS == 'false'
        env:
          LABELS: ${{ steps.meta.outputs.labels }}
        working-directory: ci-scripts/hot-cluster/ts
        run: npx tsx src/scripts/build-and-push-image.ts

  run-gating-tests:
    name: ${{ inputs.is_reusable_call && 'Execute tests' || 'Execute tests (standalone dispatch)' }}
    needs: [build-kubevirt-plugin-image]
    runs-on: ${{ inputs.runner_label || 'kubevirt-plugin-ci' }}
    timeout-minutes: 120
    # Cypress on release-4.20 (or any unknown cnv_pin_version) still
    # hardcodes a fixed auto-test-ns/auto-test-secret name, so same-cluster
    # runs of that case are serialized here instead of made namespace-safe.
    # release-4.21/4.22 get a genuine per-run namespace (see TEST_NS below)
    # and fall into the unique no-lock-<run_id> group instead.
    # cancel-in-progress: false + queue: max queue same-namespace runs one
    # after another rather than cancelling or dropping a pending one.
    concurrency:
      group: >-
        ${{
          ((inputs.test_engine || 'playwright') == 'cypress' && inputs.cnv_pin_version != '4.21' && inputs.cnv_pin_version != '4.22') &&
          format('cypress-fixed-ns-{0}', inputs.cluster_name || inputs.runner_label || 'kubevirt-plugin-ci') ||
          format('no-lock-{0}', github.run_id)
        }}
      cancel-in-progress: false
      queue: max
    env:
      PLUGIN_IMAGE: ${{ needs.build-kubevirt-plugin-image.outputs.kubevirt-plugin-image }}
      HEADLESS: 'true'
      RUN_FEATURE_TESTS: ${{ inputs.test_project == 'features' && 'true' || 'false' }}
      TEST_ENGINE: ${{ inputs.test_engine || 'playwright' }}
      # release-4.20's Cypress content hardcodes TEST_NS=auto-test-ns and
      # TEST_SECRET_NAME=auto-test-secret; release-4.21/4.22 read both
      # dynamically, so they get a genuine per-run name instead (avoiding
      # cross-PR collisions on a shared cluster). Playwright always gets a
      # per-run name.
      TEST_NS: >-
        ${{
          (inputs.test_engine || 'playwright') != 'cypress' && format('kubevirt-plugin-ci-test-{0}', github.run_id) ||
          (inputs.cnv_pin_version == '4.21' || inputs.cnv_pin_version == '4.22') && format('auto-test-ns-{0}', github.run_id) ||
          'auto-test-ns'
        }}
      TEST_SECRET_NAME: >-
        ${{
          (inputs.test_engine || 'playwright') != 'cypress' && 'ci-test-secret' ||
          (inputs.cnv_pin_version == '4.21' || inputs.cnv_pin_version == '4.22') && format('auto-test-secret-{0}', github.run_id) ||
          'auto-test-secret'
        }}
    outputs:
      test_failure_summary: ${{ steps.test-summary.outputs.test_summary }}

    steps:
      # Folded in from a former standalone "Check Runner Image" job (same
      # runner) to drop a merge-box row; also fails fast before spending
      # any real test-environment cost.
      - name: Log environment, versions, and HCO operands
        continue-on-error: true
        working-directory: ci-scripts/hot-cluster/ts
        run: npx tsx src/scripts/log-env-summary.ts

      # Pinned to @main (not local ./) since checkout_ref can point at a
      # release branch predating this CI infra, or nothing may be checked
      # out yet. Both this and the actions below it are self-contained, so
      # pinning to main is safe either way.
      - name: Checkout
        uses: kubevirt-ui/kubevirt-plugin/.github/actions/hot-cluster/checkout-for-retest@main
        with:
          checkout-ref: ${{ inputs.checkout_ref }}
          pr-number: ${{ inputs.pr_number }}

      - name: Provision CI test environment
        id: ci-env
        uses: kubevirt-ui/kubevirt-plugin/.github/actions/ci-env-request@main
        with:
          plugin-image: ${{ env.PLUGIN_IMAGE }}
          test-namespace: ${{ env.TEST_NS }}
          configmap-name: ${{ env.CI_ENV_CM }}
          ci-env-namespace: ${{ env.CI_ENV_NS }}
          # Cypress needs the console's welcome-modal dismissed server-side
          # (configmap); Playwright already seeds this client-side.
          user-settings-location: ${{ env.TEST_ENGINE == 'cypress' && 'configmap' || '' }}

      - name: Create test secret
        working-directory: ci-scripts/hot-cluster/ts
        run: npx tsx src/scripts/create-test-secret.ts

      - name: Seed kubevirt-user-settings ConfigMap
        working-directory: ci-scripts/hot-cluster/ts
        run: npx tsx src/scripts/seed-user-settings.ts

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts --no-audit

          if [[ "${TEST_ENGINE}" == "cypress" ]]; then
            npx cypress install
          else
            npm run playwright-install
          fi

      - name: Install GH script dependencies
        if: inputs.progress_status_sha != '' && inputs.progress_status_context != ''
        working-directory: .github/scripts
        run: npm ci --ignore-scripts --no-audit

      # Best-effort follow-up to hot-cluster-e2e.yml's own progress update;
      # no-ops for a standalone dispatch (empty inputs).
      - name: Update progress status
        if: inputs.progress_status_sha != '' && inputs.progress_status_context != ''
        continue-on-error: true
        working-directory: .github/scripts
        env:
          STATUS_SHA: ${{ inputs.progress_status_sha }}
          STATUS_CONTEXT: ${{ inputs.progress_status_context }}
        run: npx tsx src/e2e/progress-running.ts

      - name: Run gating tests
        env:
          BRIDGE_BASE_ADDRESS: ${{ steps.ci-env.outputs.bridge-base-address }}
          TEST_PROJECT: ${{ inputs.test_project }}
        run: |
          if [[ "${TEST_ENGINE}" == "cypress" ]]; then
            # Cypress only exposes CYPRESS_-prefixed env vars to Cypress.env(...).
            export CYPRESS_TEST_NS="${TEST_NS}"
            export CYPRESS_OS_IMAGES_NS="${OS_IMAGES_NS}"
            export CYPRESS_CNV_NS="${CNV_NS}"
            export CYPRESS_TEST_SECRET_NAME="${TEST_SECRET_NAME}"

            # release-4.20/4.21's VM patch/stop commands rely on the
            # runner's current oc project, not an explicit -n flag.
            oc project "${TEST_NS}"
            if [[ "${TEST_PROJECT}" == "features" ]]; then
              npm run test-cypress-headless -- --spec tests/tier1.cy.ts
            else
              npm run test-cypress-headless -- --spec tests/gating.cy.ts
            fi
          else
            # Scenario-based Gating project (HC_E2E auth via playwright-runner-hc-e2e.sh).
            # features is Cypress-only on release branches; Playwright on main has no features project.
            ./playwright-runner-hc-e2e.sh Gating
          fi

      - name: Extract test failure summary
        id: test-summary
        if: always()
        run: |
          RESULTS_FILE="playwright/test-results/results.xml"
          if [[ "${TEST_ENGINE}" != "playwright" || ! -f "${RESULTS_FILE}" ]]; then
            echo "test_summary=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SUMMARY=$(node << 'NODESCRIPT'
          const fs = require('fs');
          try {
            const xml = fs.readFileSync('playwright/test-results/results.xml', 'utf8');

            const decode = (s) => s
              .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
              .replace(/&quot;/g, '"').replace(/&apos;/g, "'")
              .replace(/&#10;/g, ' ').replace(/&#13;/g, '');

            const attr = (el, name) => {
              const m = el.match(new RegExp(name + '="([^"]*)"'));
              return m ? decode(m[1]) : '';
            };

            const root = xml.match(/<testsuites[^>]*>/);
            const total = root ? attr(root[0], 'tests') : '?';
            const failed = root ? attr(root[0], 'failures') : '?';
            const skipped = root ? attr(root[0], 'skipped') : '0';
            const passed = (total !== '?' && failed !== '?')
              ? String(Number(total) - Number(failed) - Number(skipped))
              : '?';

            if (failed === '0') process.exit(0);

            const failures = [];
            const re = /<testcase\s+([\s\S]*?)>([\s\S]*?)<\/testcase>/g;
            let m;
            while ((m = re.exec(xml)) !== null) {
              if (!m[2].includes('<failure')) continue;
              const failTag = m[2].match(/<failure\s+([\s\S]*?)(?:\/>|>[\s\S]*?<\/failure>)/);
              failures.push({
                name: attr(m[1], 'name'),
                suite: attr(m[1], 'classname'),
                msg: failTag ? attr(failTag[1], 'message') : '',
              });
            }

            if (failures.length === 0) process.exit(0);

            const MAX = 25;
            let out = `**${failed}** of **${total}** tests failed, **${passed}** passed`;
            if (skipped !== '0') out += `, ${skipped} skipped`;
            out += '\n\n| Test | Error |\n| --- | --- |\n';
            for (const f of failures.slice(0, MAX)) {
              const name = f.name.replace(/\|/g, '\\|').replace(/\n/g, ' ');
              const msg = f.msg.replace(/\|/g, '\\|').replace(/\n/g, ' ').substring(0, 200);
              out += `| ${name} | ${msg} |\n`;
            }
            if (failures.length > MAX) {
              out += `\n_...and ${failures.length - MAX} more failures (see workflow artifacts for full report)_\n`;
            }
            if (out.length > 60000) {
              out = out.substring(0, 60000) + '\n\n_...truncated_\n';
            }
            process.stdout.write(out);
          } catch (e) {
            process.exit(0);
          }
          NODESCRIPT
          )

          {
            echo 'test_summary<<SUMMARY_DELIM'
            echo "${SUMMARY}"
            echo 'SUMMARY_DELIM'
          } >> "$GITHUB_OUTPUT"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.TEST_ENGINE }}-results-${{ github.run_id }}
          path: |
            ${{ env.TEST_ENGINE == 'cypress' && 'cypress/gui-test-screenshots/' || 'playwright/test-results/' }}
          retention-days: 7
          if-no-files-found: ignore

      - name: e2e CI diagnostics - Collect pod logs and cluster info
        if: always()
        continue-on-error: true
        env:
          COLLECT_CLUSTER_INFO: ${{ failure() && 'true' || 'false' }}
        working-directory: ci-scripts/hot-cluster/ts
        run: npx tsx src/scripts/collect-diagnostics.ts

      - name: e2e CI diagnostics - Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-ci-diagnostics-${{ github.run_id }}
          path: /tmp/e2e-ci-diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      - name: Clean up test entities
        if: always()
        continue-on-error: true
        working-directory: ci-scripts/hot-cluster/ts
        run: npx tsx src/scripts/test-cleanup.ts

      - name: Release CI test environment
        if: always()
        uses: kubevirt-ui/kubevirt-plugin/.github/actions/ci-env-release@main
        with:
          configmap-name: ${{ env.CI_ENV_CM }}
          ci-env-namespace: ${{ env.CI_ENV_NS }}

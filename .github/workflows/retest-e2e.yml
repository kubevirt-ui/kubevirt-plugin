name: Retest E2E

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  issues: write
  pull-requests: write

jobs:
  retest:
    name: Retest Hot Cluster E2E
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/retest-e2e')
    steps:
      # No ref override: reads OWNERS from the default branch, not the commenter's PR.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # OWNERS is the single source of truth for trust, same as Prow's
      # /lgtm and /approve.
      - name: Check trusted author
        id: check-trust
        uses: ./.github/actions/hot-cluster/check-trust
        with:
          author: ${{ github.event.comment.user.login }}

      # continue-on-error: a bad app credential must still let the retest
      # step run, fail its first API call, and get reported below -- not
      # skip silently. Scoped to just what the script below needs: reading
      # the PR (pull-requests: read) and re-running/dispatching the E2E
      # workflow (actions: write). issues: write is deliberately omitted --
      # the bot app doesn't have it, so reactions below stay best-effort.
      - name: Generate bot token
        id: bot-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-pull-requests: read
          permission-actions: write

      - name: Re-run E2E workflow
        id: retest
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          TRUSTED: ${{ steps.check-trust.outputs.trusted }}
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const author = context.payload.comment.user.login;

            // kubevirt-plugin-bot has no `issues: write`, so reactions are
            // best-effort cosmetic feedback, never load-bearing.
            const react = async (content) => {
              try {
                await github.rest.reactions.createForIssueComment({
                  ...context.repo,
                  comment_id: context.payload.comment.id,
                  content,
                });
              } catch (err) {
                core.warning(`Could not react to comment with "${content}": ${err.message || err}`);
              }
            };

            try {
              const trusted = process.env.TRUSTED === 'true';
              core.info(`${author} is ${trusted ? '' : 'not '}listed in OWNERS (approvers/reviewers) — ${trusted ? 'trusted' : 'untrusted, ignoring /retest-e2e'}.`);

              if (!trusted) {
                await react('-1');
                core.setFailed(`${author} is not authorized to use /retest-e2e`);
                return;
              }

              const prNumber = context.issue.number;
              const pr = await github.rest.pulls.get({
                ...context.repo,
                pull_number: prNumber,
              });
              const headSha = pr.data.head.sha;

              core.info(`/retest-e2e requested by ${author} on PR #${prNumber} (HEAD: ${headSha})`);

              // Paginate a bounded lookback window (not a flat per_page:10)
              // since other PRs' activity can push this PR's run far down
              // the repo-wide list within an hour.
              const lookbackDate = new Date(Date.now() - 3 * 60 * 60 * 1000).toISOString();
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                ...context.repo,
                workflow_id: 'hot-cluster-e2e.yml',
                event: 'pull_request_target',
                created: `>=${lookbackDate}`,
                per_page: 100,
              });

              const candidates = runs.filter(r => {
                const prMatch = r.pull_requests?.some(p => p.number === prNumber);
                const shaMatch = r.head_sha === headSha;
                // Branch name alone isn't unique across forks.
                const branchMatch = r.head_branch === pr.data.head.ref &&
                  r.head_repository?.id === pr.data.head.repo?.id;
                return prMatch || shaMatch || branchMatch;
              });

              // Bot labels (lgtm, approved, ...) each trigger their own
              // no-op run marked via run-name (display_title), and are
              // always newer than the real run -- walk newest-to-oldest and
              // skip those so a genuine result isn't re-run over. That
              // marker is a string contract with hot-cluster-e2e.yml's
              // `run-name:`.
              const isIrrelevantLabelNoop = (run) =>
                run.display_title?.includes('(skipped: irrelevant label)');
              const prRun = candidates.find(candidate => !isIrrelevantLabelNoop(candidate)) ?? null;

              if (prRun) {
                core.info(`Re-running workflow run ${prRun.id} (attempt ${prRun.run_attempt})...`);

                await react('rocket');

                await github.rest.actions.reRunWorkflow({
                  ...context.repo,
                  run_id: prRun.id,
                });

                core.info(`Re-run triggered: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${prRun.id}`);
                return;
              }

              // No existing run to re-run within the lookback window --
              // dispatch a fresh one instead, the same pr_number mechanism
              // retest-stale-gating.yml uses for merge-pool PRs.
              // skip_pool_check: true since /retest-e2e must work
              // regardless of review state. base_ref lets the resolver
              // auto-select Cypress + a version-matched cluster.
              const baseRef = pr.data.base.ref;
              core.warning(`No recent Hot Cluster E2E workflow run with real gating-test results found for PR #${prNumber} (base: ${baseRef}) -- only irrelevant-label no-ops, if anything, matched. Dispatching a fresh run instead.`);
              await react('rocket');

              await github.rest.actions.createWorkflowDispatch({
                ...context.repo,
                workflow_id: 'hot-cluster-e2e.yml',
                ref: 'main',
                inputs: {
                  pr_number: String(prNumber),
                  base_ref: baseRef,
                  skip_pool_check: 'true',
                },
              });

              core.info(`Fresh run dispatched for PR #${prNumber} (base_ref=${baseRef}).`);
              core.setOutput('fallback_dispatched', 'true');
            } catch (err) {
              core.setOutput('unexpected_error', 'true');
              core.setOutput('error_message', err.message || String(err));
              core.setFailed(`Unexpected error while processing /retest-e2e: ${err.message || err}`);
            }

      - name: Report fallback retest dispatch on the PR
        if: steps.retest.outputs.fallback_dispatched == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                '🚀 No recent Hot Cluster E2E run with real gating-test results was found to re-run (bot-label events don\'t count), so `/retest-e2e` dispatched a fresh one instead ' +
                  '(this also re-provisions the cluster automatically if it was torn down).',
                '',
                `See the [Actions tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/hot-cluster-e2e.yml) for progress.`,
              ].join('\n'),
            });

      - name: Report unexpected retest failure on the PR
        if: steps.retest.outputs.unexpected_error == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const errorMessage = ${{ toJSON(steps.retest.outputs.error_message) }};
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                '⚠️ `/retest-e2e` hit an unexpected error and did not re-run the Hot Cluster E2E workflow:',
                '',
                '```',
                errorMessage,
                '```',
                '',
                'This usually means the `kubevirt-plugin-bot` GitHub App token (BOT_APP_ID / BOT_APP_PRIVATE_KEY) is misconfigured or the app was uninstalled — a maintainer should check it. ' +
                  'In the meantime, re-run the failed workflow manually from the Actions tab.',
              ].join('\n'),
            });

      - name: Fail job if retest did not succeed
        if: steps.retest.outcome == 'failure'
        run: exit 1

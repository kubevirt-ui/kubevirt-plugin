name: Retest E2E

on:
  issue_comment:
    types: [created]

# Nothing in this workflow actually reads the ambient GITHUB_TOKEN for any
# scope anymore -- every API call explicitly uses the bot app token (see
# "Generate bot token" below) instead, since GITHUB_TOKEN's issues/actions
# scopes are forced read-only for a PR from a fork. contents: read is kept
# only for actions/checkout's own sake (harmless even though this repo is
# public and checkout works without it).
permissions:
  contents: read

jobs:
  retest:
    name: Retest Hot Cluster E2E
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # !endsWith(...'[bot]') -- report comments mention sibling commands as
    # guidance text (e.g. "comment /hold-e2e"), which could otherwise
    # re-trigger those workflows against the bot's own comments.
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/retest-e2e') &&
      !endsWith(github.event.comment.user.login, '[bot]')
    steps:
      # No ref override: reads OWNERS from the default branch, not the commenter's PR.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      # OWNERS is the single source of truth for trust, same as Prow's
      # /lgtm and /approve.
      - name: Check trusted author
        id: check-trust
        uses: ./.github/actions/hot-cluster/check-trust
        with:
          author: ${{ github.event.comment.user.login }}

      # See ci-scripts/README.md ("Check-Run & Retest Model") for why this
      # needs the bot app, not GITHUB_TOKEN. continue-on-error: a bad
      # credential must still let the retest step run and report the
      # failure below, not skip silently.
      - name: Generate bot token
        id: bot-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          # pull-requests: write, not read -- reacting, commenting, and
          # removing e2e-hold all target the PR, even though those endpoint
          # paths are /issues/... (see ci-scripts/README.md).
          permission-pull-requests: write
          permission-actions: write
          permission-issues: write

      - name: Re-run E2E workflow
        id: retest
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          TRUSTED: ${{ steps.check-trust.outputs.trusted }}
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const { reactToComment, enforceCommentTrust } = require('./ci-scripts/hot-cluster/pr-command-helpers.cjs');
            const author = context.payload.comment.user.login;
            const react = (content) => reactToComment(github, context, core, content);

            try {
              const trusted = process.env.TRUSTED === 'true';
              if (!(await enforceCommentTrust(core, react, author, trusted, '/retest-e2e'))) return;

              const prNumber = context.issue.number;
              const pr = await github.rest.pulls.get({
                ...context.repo,
                pull_number: prNumber,
              });
              const headSha = pr.data.head.sha;
              const baseRef = pr.data.base.ref;

              core.info(`/retest-e2e requested by ${author} on PR #${prNumber} (HEAD: ${headSha}, base: ${baseRef})`);

              // /retest-e2e always dispatches a fresh run below -- never
              // reRunWorkflow, which reuses the original dispatch's cached
              // base SHA instead of merging with the current base tip (the
              // same reason retest-stale-gating.yml always dispatches fresh
              // rather than re-running). This scan only detects whether a
              // run is still in-progress/queued for this PR, so the PR
              // comment can say so and explain the concurrency-group
              // cancellation that's about to happen below.
              //
              // Lookback covers the longest a real run can stay
              // non-terminal (cluster-check + run-e2e-tests' 120m timeout),
              // plus buffer for queueing -- not a search for *any* past
              // run, so it doesn't need to look back further than that. A
              // shorter, fixed 3h window here previously caused a live,
              // still-running match to go undetected once a run happened
              // to start more than 3h before the lookback recomputed at
              // comment time, but that only affected the *comment wording*
              // -- the fresh dispatch below always ran regardless.
              const lookbackDate = new Date(Date.now() - 4 * 60 * 60 * 1000).toISOString();
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                ...context.repo,
                workflow_id: 'hot-cluster-e2e.yml',
                created: `>=${lookbackDate}`,
                per_page: 100,
              });

              const candidates = runs.filter(r => {
                if (r.event === 'workflow_dispatch') {
                  // Runs against ref: main -- none of the PR/SHA/branch
                  // signals below apply. Match via run-name instead.
                  return r.display_title?.includes(`@ PR#${prNumber} retest`);
                }
                const prMatch = r.pull_requests?.some(p => p.number === prNumber);
                const shaMatch = r.head_sha === headSha;
                // Branch name alone isn't unique across forks.
                const branchMatch = r.head_branch === pr.data.head.ref &&
                  r.head_repository?.id === pr.data.head.repo?.id;
                return prMatch || shaMatch || branchMatch;
              });

              const runningCandidate = candidates.find(candidate => candidate.status !== 'completed') ?? null;

              if (runningCandidate) {
                core.warning(`Run ${runningCandidate.id} for PR #${prNumber} is still ${runningCandidate.status} -- cancelling it and dispatching a fresh run instead.`);
              } else {
                core.info(`No in-progress Hot Cluster E2E run found for PR #${prNumber} (base: ${baseRef}) -- dispatching a fresh run.`);
              }

              await react('rocket');

              // skip_pool_check: /retest-e2e must work regardless of review
              // state. Shares hot-cluster-e2e.yml's concurrency groups, so
              // if runningCandidate is still executing, this dispatch
              // cancels it rather than racing it.
              await github.rest.actions.createWorkflowDispatch({
                ...context.repo,
                workflow_id: 'hot-cluster-e2e.yml',
                ref: 'main',
                inputs: {
                  pr_number: String(prNumber),
                  base_ref: baseRef,
                  skip_pool_check: 'true',
                },
              });

              core.info(`Fresh run dispatched for PR #${prNumber} (base_ref=${baseRef}).`);
              core.setOutput('dispatched', 'true');
              core.setOutput('was_running', runningCandidate ? 'true' : 'false');
            } catch (err) {
              core.setOutput('unexpected_error', 'true');
              core.setOutput('error_message', err.message || String(err));
              core.setFailed(`Unexpected error while processing /retest-e2e: ${err.message || err}`);
            }

      # /retest-e2e is the only way to lift a /hold-e2e hold -- removing the
      # label (not just dispatching above) stops future pushes from silently
      # re-holding. Gated on dispatched == 'true' so a failed dispatch leaves
      # the hold in place. continue-on-error + setFailed on a non-404 error:
      # fails this step's outcome (queryable below) without failing the job;
      # removal_failed lets report avoid claiming a stuck label was lifted.
      - name: Lift any /hold-e2e hold
        id: lift-hold
        if: steps.check-trust.outputs.trusted == 'true' && steps.retest.outputs.dispatched == 'true'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            try {
              await github.rest.issues.removeLabel({
                ...context.repo,
                issue_number: context.issue.number,
                name: 'e2e-hold',
              });
              core.info('Removed e2e-hold label -- /retest-e2e lifts any prior /hold-e2e.');
              core.setOutput('was_held', 'true');
            } catch (err) {
              if (err.status === 404) {
                core.setOutput('was_held', 'false');
                return;
              }
              core.setOutput('removal_failed', 'true');
              core.setFailed(`Could not remove e2e-hold label: ${err.message || err}`);
            }

      # Bot app token, not secrets.GITHUB_TOKEN: the latter's issues scope
      # is forced read-only for a fork PR regardless of declared permissions.
      - name: Report retest dispatch on the PR
        if: steps.retest.outputs.dispatched == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            // wasRunning wording/behavior is unchanged from before this
            // step always fresh-dispatched (see PR #4294) -- only the
            // "nothing was running" branch's wording changed, since /retest-e2e
            // now always dispatches fresh rather than only falling back to
            // it when no completed run could be found.
            const wasRunning = ${{ steps.retest.outputs.was_running == 'true' }};
            const wasHeld = ${{ steps.lift-hold.outputs.was_held == 'true' }};
            const holdLiftFailed = ${{ steps.lift-hold.outputs.removal_failed == 'true' }};
            const reason = wasRunning
              ? 'A Hot Cluster E2E run was already in progress for this PR, so `/retest-e2e` cancelled it and dispatched a fresh one instead'
              : '`/retest-e2e` dispatched a fresh Hot Cluster E2E run for this PR, merged with the current base branch tip';
            const heldNote = wasHeld ? ' This also lifts the `/hold-e2e` hold that was active on this PR.' : '';
            const body = [
              `🚀 ${reason} (this also re-provisions the cluster automatically if it was torn down).${heldNote}`,
              '',
              `See the [Actions tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/hot-cluster-e2e.yml) for progress.`,
            ];
            // A stuck label isn't silently masked: verify-gating-tests
            // re-checks it live and keeps publishing held/neutral instead.
            if (holdLiftFailed) {
              body.push(
                '',
                '⚠️ Could not remove the `e2e-hold` label -- this PR may still report as held (`Run Gating Tests` will keep publishing a held/neutral result even after this run finishes) until the label is removed. Remove it manually, or comment `/retest-e2e` again.',
              );
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: body.join('\n'),
            });

      - name: Report unexpected retest failure on the PR
        if: steps.retest.outputs.unexpected_error == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const errorMessage = ${{ toJSON(steps.retest.outputs.error_message) }};
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                '⚠️ `/retest-e2e` hit an unexpected error and did not re-run the Hot Cluster E2E workflow:',
                '',
                '```',
                errorMessage,
                '```',
                '',
                'This usually means the `kubevirt-plugin-bot` GitHub App token (BOT_APP_ID / BOT_APP_PRIVATE_KEY) is misconfigured or the app was uninstalled — a maintainer should check it. ' +
                  'In the meantime, re-run the failed workflow manually from the Actions tab.',
              ].join('\n'),
            });

      - name: Fail job if retest did not succeed
        if: steps.retest.outcome == 'failure'
        run: exit 1

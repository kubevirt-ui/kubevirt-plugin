name: Retest E2E

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  issues: write
  pull-requests: write

jobs:
  retest:
    name: Retest Hot Cluster E2E
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/retest-e2e')
    steps:
      # No ref override: reads OWNERS from the default branch, not whatever the
      # commenter's PR branch might contain.
      - name: Checkout
        uses: actions/checkout@v7

      # Short-lived installation token from the kubevirt-plugin-bot GitHub
      # App (Pull requests: Read, Actions: Read and write).
      #
      # continue-on-error: if BOT_APP_ID/BOT_APP_PRIVATE_KEY themselves ever
      # go bad, this must not skip the retest step below — an empty token
      # input still lets that step run, fail its first API call, and get
      # caught by its own try/catch, which is what actually drives the PR
      # comment in the reporting step further down. Without this, a broken
      # app credential would reproduce the exact silent-failure bug we're
      # fixing here, just one level up.
      - name: Generate bot token
        id: bot-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          # app-id is deprecated in favor of client-id (the action now warns
          # about it at runtime), but actionlint pins its bundled action
          # metadata to v1.7.12 here, which predates that input -- switching
          # would fail the actionlint CI check over a harmless warning. Revisit
          # once actionlint's metadata (or this repo's pinned version) catches up.
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      # OWNERS (approvers/reviewers) is the single source of truth for trust —
      # the same source Prow uses for /lgtm, /approve. author_association and
      # org membership are unreliable proxies (misreport private membership,
      # need extra token scope), so we don't use them here.
      #
      # continue-on-error: an unforeseen failure here must not fail silently —
      # steps.retest.outcome still reports 'failure' for the final step below,
      # while the reporting step in between uses the default GITHUB_TOKEN
      # (independent of the bot token) to explain what went wrong on the PR
      # itself.
      - name: Check trusted author and re-run E2E workflow
        id: retest
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const fs = require('fs');
            const author = context.payload.comment.user.login;

            // kubevirt-plugin-bot deliberately doesn't have `issues: write`
            // (PR comments are "issue comments" under the hood, so reacting
            // to one needs that permission, not `pull-requests`). Reactions
            // are cosmetic feedback on the /retest-e2e comment — a missing
            // reaction must never be mistaken for the retest itself failing.
            const react = async (content) => {
              try {
                await github.rest.reactions.createForIssueComment({
                  ...context.repo,
                  comment_id: context.payload.comment.id,
                  content,
                });
              } catch (err) {
                core.warning(`Could not react to comment with "${content}": ${err.message || err}`);
              }
            };

            try {
              let trusted = false;
              try {
                const owners = fs.readFileSync('OWNERS', 'utf8');
                trusted = new RegExp(`^\\s*-\\s*${author}\\s*$`, 'm').test(owners);
              } catch (err) {
                core.warning(`Could not read OWNERS file: ${err.message}`);
              }

              core.info(`${author} is ${trusted ? '' : 'not '}listed in OWNERS (approvers/reviewers) — ${trusted ? 'trusted' : 'untrusted, ignoring /retest-e2e'}.`);

              if (!trusted) {
                await react('-1');
                core.setFailed(`${author} is not authorized to use /retest-e2e`);
                return;
              }

              const prNumber = context.issue.number;
              const pr = await github.rest.pulls.get({
                ...context.repo,
                pull_number: prNumber,
              });
              const headSha = pr.data.head.sha;

              core.info(`/retest-e2e requested by ${author} on PR #${prNumber} (HEAD: ${headSha})`);

              // A flat per_page: 10 (the original approach here) only looks
              // at the 10 most recent pull_request_target runs of
              // hot-cluster-e2e.yml *repo-wide* -- on an active repo, other
              // PRs' pushes/labels routinely push this PR's own run out of
              // that window within the hour (confirmed on PR #4143: its run
              // had fallen to position 12 by the time /retest-e2e ran).
              // Paginate further, bounded by a recent lookback window so
              // this stays cheap -- if the PR's own run is older than that,
              // the fallback dispatch below still guarantees correctness.
              const lookbackDate = new Date(Date.now() - 3 * 60 * 60 * 1000).toISOString();
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                ...context.repo,
                workflow_id: 'hot-cluster-e2e.yml',
                event: 'pull_request_target',
                created: `>=${lookbackDate}`,
                per_page: 100,
              });

              const candidates = runs.filter(r => {
                const prMatch = r.pull_requests?.some(p => p.number === prNumber);
                const shaMatch = r.head_sha === headSha;
                // Branch name alone isn't unique across forks -- a same-named
                // branch in a different fork must not be mistaken for this
                // PR's run, so also require the run's head repo to match.
                const branchMatch = r.head_branch === pr.data.head.ref &&
                  r.head_repository?.id === pr.data.head.repo?.id;
                return prMatch || shaMatch || branchMatch;
              });

              // Bot labels (jira/valid-reference, approved, lgtm, ...) land
              // on a PR seconds after it's opened, and each one triggers its
              // own hot-cluster-e2e.yml run that internally no-ops as
              // "Run Gating Tests (skipped - irrelevant label event)" since
              // it doesn't represent a real code change. A bot can only
              // react to a PR that already exists, so these no-op runs are
              // always *newer* than the real "opened"-triggered run --
              // picking the newest match alone (the original approach here)
              // would almost always grab the no-op instead of the real run.
              // Confirmed live on PR #4298: /retest-e2e re-ran the
              // "approved"-label no-op run while the genuinely-failed real
              // run sat untouched, with no visible sign anything was wrong.
              // Walk newest-to-oldest (still preferring the most recent
              // match when there's a genuine tie) and skip any candidate
              // whose jobs show that no-op marker.
              //
              // 'skipped - irrelevant label event' is a string contract
              // with hot-cluster-e2e.yml's verify-gating-tests job, whose
              // dynamic `name:` is the only place that exact suffix comes
              // from -- if that naming ever changes, this check must
              // change with it (and vice versa).
              let prRun = null;
              for (const candidate of candidates) {
                // A single run realistically has on the order of ~10-15
                // jobs here (well under the API's default page size), but
                // paginate defensively rather than assume that holds
                // forever -- a truncated jobs list could otherwise miss
                // the no-op marker and misclassify a skip run as real.
                const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
                  ...context.repo,
                  run_id: candidate.id,
                  per_page: 100,
                });
                const isIrrelevantLabelNoop = jobs.some(
                  j => j.name.includes('skipped - irrelevant label event'),
                );
                if (!isIrrelevantLabelNoop) {
                  prRun = candidate;
                  break;
                }
              }

              if (prRun) {
                core.info(`Re-running workflow run ${prRun.id} (attempt ${prRun.run_attempt})...`);

                await react('rocket');

                await github.rest.actions.reRunWorkflow({
                  ...context.repo,
                  run_id: prRun.id,
                });

                core.info(`Re-run triggered: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${prRun.id}`);
                return;
              }

              // No existing run to re-run within the lookback window --
              // rather than silently giving up (the original behavior:
              // just a job log warning and a best-effort reaction, which
              // itself silently fails since this bot lacks issues: write --
              // see react() above), dispatch a fresh run instead. This is
              // the same workflow_dispatch + pr_number mechanism
              // retest-stale-gating.yml already uses for merge-pool PRs,
              // which already provisions the cluster if it's down or queues
              // behind an in-progress provision (ibmc-cluster-setup.yml's
              // hot-cluster-provision-<cluster_name> concurrency group) --
              // no new queueing logic needed here. skip_pool_check: true
              // because /retest-e2e must work for any PR on demand,
              // regardless of lgtm/approved review state -- unlike
              // retest-stale-gating.yml's dispatch, which intentionally
              // only retests merge-pool PRs. base_ref is required so
              // resolve-cluster-config can auto-select Cypress + a
              // version-matched cluster for release-4.22-and-earlier PRs
              // (workflow_dispatch has no github.base_ref of its own).
              const baseRef = pr.data.base.ref;
              core.warning(`No recent Hot Cluster E2E workflow run with real gating-test results found for PR #${prNumber} (base: ${baseRef}) -- only irrelevant-label no-ops, if anything, matched. Dispatching a fresh run instead.`);
              await react('rocket');

              await github.rest.actions.createWorkflowDispatch({
                ...context.repo,
                workflow_id: 'hot-cluster-e2e.yml',
                ref: 'main',
                inputs: {
                  pr_number: String(prNumber),
                  base_ref: baseRef,
                  skip_pool_check: 'true',
                },
              });

              core.info(`Fresh run dispatched for PR #${prNumber} (base_ref=${baseRef}).`);
              core.setOutput('fallback_dispatched', 'true');
            } catch (err) {
              // Distinct from the expected "not authorized" rejection above:
              // this is an unforeseen failure (bad bot token, API outage,
              // ...) that the PR author has no way to diagnose from a
              // missing reaction alone.
              core.setOutput('unexpected_error', 'true');
              core.setOutput('error_message', err.message || String(err));
              core.setFailed(`Unexpected error while processing /retest-e2e: ${err.message || err}`);
            }

      # Reactions on this bot's token silently fail (see react() above), so
      # a fallback dispatch needs its own visible confirmation on the PR --
      # otherwise the author sees no difference between "a fresh run was
      # just dispatched" and "nothing happened at all".
      - name: Report fallback retest dispatch on the PR
        if: steps.retest.outputs.fallback_dispatched == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                '🚀 No recent Hot Cluster E2E run with real gating-test results was found to re-run (bot-label events don\'t count), so `/retest-e2e` dispatched a fresh one instead ' +
                  '(this also re-provisions the cluster automatically if it was torn down).',
                '',
                `See the [Actions tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/hot-cluster-e2e.yml) for progress.`,
              ].join('\n'),
            });

      - name: Report unexpected retest failure on the PR
        if: steps.retest.outputs.unexpected_error == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const errorMessage = ${{ toJSON(steps.retest.outputs.error_message) }};
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                '⚠️ `/retest-e2e` hit an unexpected error and did not re-run the Hot Cluster E2E workflow:',
                '',
                '```',
                errorMessage,
                '```',
                '',
                'This usually means the `kubevirt-plugin-bot` GitHub App token (BOT_APP_ID / BOT_APP_PRIVATE_KEY) is misconfigured or the app was uninstalled — a maintainer should check it. ' +
                  'In the meantime, re-run the failed workflow manually from the Actions tab.',
              ].join('\n'),
            });

      # Re-fail the job for both the "not authorized" and "unexpected error"
      # cases above: continue-on-error on the retest step only exists so the
      # reporting step can run afterwards, not to hide a genuine failure from
      # the job's overall status.
      - name: Fail job if retest did not succeed
        if: steps.retest.outcome == 'failure'
        run: exit 1

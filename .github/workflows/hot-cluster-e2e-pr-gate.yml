name: Hot Cluster E2E PR Gate

# Thin gatekeeper for PR events: dispatches hot-cluster-e2e.yml via
# workflow_dispatch so only this job (plus Progress/Run Gating Tests) shows
# in the merge box, not the full nested job graph. See ci-scripts/README.md
# ("Check-Run & Retest Model").
#
# When e2e-hold is present, skip dispatch but re-publish the held marker onto
# the new HEAD so the required check doesn't sit stuck on "Expected".
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# checks: write -- republish-hold posts the held marker via GITHUB_TOKEN.
permissions:
  contents: read
  actions: write
  checks: write

jobs:
  dispatch:
    name: Dispatch Hot Cluster E2E
    # Skip while e2e-hold is active (durable across pushes; only /retest-e2e
    # lifts it) -- republish-hold handles the required-check side.
    if: "!contains(github.event.pull_request.labels.*.name, 'e2e-hold')"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      # e2e-passed/e2e-failed mirror the *last real* result -- only clear on
      # synchronize, since neither label reflects the new HEAD until the
      # fresh dispatch below reports one (opened/reopened have no prior diff
      # to invalidate). Shared with retest-stale-gating.yml via
      # clear-e2e-result-labels (inline composite steps, no new merge-box check).
      - name: Generate bot token
        id: bot-token
        if: github.event.action == 'synchronize'
        uses: ./.github/actions/create-bot-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Clear stale e2e-passed/e2e-failed on push
        if: github.event.action == 'synchronize'
        continue-on-error: true
        uses: ./.github/actions/clear-e2e-result-labels
        with:
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ steps.bot-token.outputs.token || github.token }}

      - name: Dispatch hot-cluster-e2e.yml
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;

            // skip_pool_check: open/sync/reopen isn't merge-readiness --
            // gating runs regardless of lgtm/approved.
            // base_ref: resolves the right cluster/test-engine for
            // release-branch PRs.
            await github.rest.actions.createWorkflowDispatch({
              ...context.repo,
              workflow_id: 'hot-cluster-e2e.yml',
              ref: 'main',
              inputs: {
                pr_number: String(pr.number),
                base_ref: pr.base.ref,
                skip_pool_check: 'true',
              },
            });

  # Re-attach the held marker to the new HEAD when dispatch is skipped.
  republish-hold:
    name: Republish Held Gating Check
    if: contains(github.event.pull_request.labels.*.name, 'e2e-hold')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Pin to default branch: publish-gating-check may be missing from
      # older release branches that pull_request_target would check out.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Publish held marker for current HEAD
        uses: ./.github/actions/publish-gating-check
        with:
          head-sha: ${{ github.event.pull_request.head.sha }}
          status: completed
          conclusion: neutral
          title: 'Hot Cluster E2E: held via /hold-e2e'
          summary: |
            Required check not satisfied -- hold active. Testing is on hold for this PR.

            No new run will be dispatched automatically -- neither by a push, the `ok-to-test` label, nor `main` advancing -- while this hold is active. Comment `/retest-e2e` to lift the hold and get a fresh result.

            Removing the `e2e-hold` label directly (e.g. from the UI) does **not** lift the hold or refresh this result -- only `/retest-e2e` does both.

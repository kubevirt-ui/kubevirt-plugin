name: Auto Merge

# Evaluates merge-pool eligibility and publishes the "Merge Gate" check-run.
# The job itself always succeeds (green). The real merge blocker is the
# API-published "Merge Gate" check-run with conclusion: action_required
# (orange) when not eligible, or success (green) when eligible.
#
# Branch protection requires the "Merge Gate" check-run name (API-published),
# NOT this job's own name.
on:
  pull_request_target:
    types: [opened, labeled, unlabeled, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: write

jobs:
  evaluate:
    name: Evaluate Merge Eligibility
    runs-on: ubuntu-latest
    timeout-minutes: 2
    concurrency:
      group: auto-merge-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Generate bot token
        id: bot-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Setup scripts
        uses: ./.github/actions/setup-gh-scripts
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Determine eligibility and toggle auto-merge
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        working-directory: .github/scripts
        run: npx tsx src/merge/auto-merge.ts
